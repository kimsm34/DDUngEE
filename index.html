<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDungEE Cabin Diary</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%2314385f'/%3E%3Ctext x='10' y='31' fill='%23fffdf8' font-family='Georgia' font-size='17' font-weight='900'%3EDD%3C/text%3E%3C/svg%3E" />
    <meta
      name="description"
      content="정민이의 승무원 세계관으로 토익 단어를 긴 장면처럼 익히는 모바일 단어장"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #14243a;
        --muted: #687384;
        --paper: #fbf6ec;
        --paper-2: #fffdf8;
        --surface: #fffaf2;
        --line: #e6ddce;
        --navy: #14385f;
        --blue: #2f6b9e;
        --sky: #dfeff5;
        --coral: #e7745d;
        --gold: #b88939;
        --green: #2d7c6d;
        --shadow: 0 16px 44px rgba(27, 42, 61, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(223, 239, 245, 0.58), transparent 250px),
          var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.72;
      }

      button {
        font: inherit;
      }

      .app {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.92);
        backdrop-filter: blur(18px);
      }

      .topbar-inner {
        max-width: 1120px;
        min-height: 68px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        filter: drop-shadow(0 8px 14px rgba(20, 56, 95, 0.18));
      }

      .brand-title {
        margin: 0;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.15rem;
        font-weight: 900;
        line-height: 1.05;
        white-space: nowrap;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.2;
      }

      .top-progress {
        min-width: max-content;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.9rem;
        font-weight: 900;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .menu-button {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.74);
        color: var(--navy);
        cursor: pointer;
        padding: 0;
        border-radius: 8px;
      }

      .menu-button svg {
        width: 20px;
        height: 20px;
      }

      .menu-button:hover,
      .menu-button:focus-visible {
        outline: 3px solid rgba(231, 116, 93, 0.2);
        outline-offset: 2px;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 680px);
        justify-content: center;
        gap: 22px;
        padding: 18px 14px 42px;
      }

      .lesson-strip {
        display: grid;
        gap: 12px;
      }

      .level-shelf {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(132px, 1fr);
        gap: 10px;
        overflow-x: auto;
        padding: 2px 2px 6px;
        scrollbar-width: thin;
      }

      .level-card {
        min-height: 72px;
        border: 1px solid rgba(20, 56, 95, 0.13);
        background: rgba(255, 253, 248, 0.88);
        color: var(--ink);
        padding: 11px 12px;
        text-align: left;
        cursor: pointer;
        border-radius: 8px;
      }

      .level-card.active {
        background: var(--navy);
        color: #fff;
        border-color: transparent;
      }

      .level-card.locked {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .level-label,
      .level-status {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.74rem;
        font-weight: 900;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .level-title {
        display: block;
        margin-top: 4px;
        font-size: 0.9rem;
        font-weight: 900;
        line-height: 1.25;
      }

      .level-status {
        margin-top: 7px;
        color: var(--green);
      }

      .level-card.active .level-status {
        color: #f6d9a6;
      }

      .level-card.locked .level-status {
        color: var(--muted);
      }

      .reader-intro {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: end;
        padding: 4px 2px 0;
      }

      .day-label {
        margin: 0;
        color: var(--green);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.8rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .reader-title {
        margin: 4px 0 0;
        color: var(--navy);
        font-size: clamp(1.5rem, 7vw, 2.3rem);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .progress-chip {
        border: 1px solid rgba(20, 56, 95, 0.14);
        background: rgba(255, 253, 248, 0.8);
        padding: 8px 10px;
        color: var(--navy);
        font-weight: 900;
        border-radius: 8px;
      }

      .progress-track {
        height: 3px;
        background: rgba(20, 56, 95, 0.13);
      }

      .progress-fill {
        display: block;
        width: var(--progress, 20%);
        height: 100%;
        background: var(--navy);
      }

      .episode-tabs {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(176px, 1fr);
        gap: 10px;
        overflow-x: auto;
        padding: 2px 2px 8px;
        scrollbar-width: thin;
      }

      .episode-tab {
        position: relative;
        min-height: 74px;
        border: 1px solid rgba(20, 56, 95, 0.13);
        background: rgba(255, 253, 248, 0.86);
        color: var(--ink);
        padding: 12px 14px 12px 16px;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
        border-radius: 8px;
      }

      .episode-tab::before,
      .episode-tab::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 9px;
        height: 18px;
        background: var(--paper);
        border: 1px solid rgba(20, 56, 95, 0.08);
        transform: translateY(-50%);
      }

      .episode-tab::before {
        left: -1px;
        border-left: 0;
        border-radius: 0 12px 12px 0;
      }

      .episode-tab::after {
        right: -1px;
        border-right: 0;
        border-radius: 12px 0 0 12px;
      }

      .episode-tab.active {
        background: linear-gradient(135deg, var(--navy), #255f96);
        color: #fff;
        border-color: transparent;
      }

      .episode-tab:hover,
      .episode-tab:focus-visible {
        border-color: rgba(20, 56, 95, 0.45);
        outline: none;
      }

      .tab-day {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .tab-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .tab-plane {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.92);
      }

      .tab-plane.empty {
        color: rgba(20, 56, 95, 0.3);
      }

      .episode-tab:not(.active) .tab-plane {
        color: rgba(20, 56, 95, 0.32);
      }

      .tab-plane svg {
        width: 20px;
        height: 20px;
      }

      .tab-title {
        display: block;
        margin-top: 3px;
        font-weight: 900;
        line-height: 1.22;
      }

      .tab-route {
        display: block;
        margin-top: 3px;
        opacity: 0.72;
        font-size: 0.76rem;
      }

      .story-card {
        overflow: hidden;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.96);
        box-shadow: var(--shadow);
        border-radius: 8px;
      }

      .hero {
        position: relative;
        min-height: 210px;
        padding: 22px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.9), rgba(255, 253, 248, 0.24) 58%, rgba(255, 253, 248, 0.06)),
          url("assets/flight-sky-window.jpg");
        background-size: cover;
        background-position: center;
      }

      .stamp-svg {
        width: 112px;
        height: auto;
        transform: rotate(-8deg);
        color: var(--coral);
        filter: drop-shadow(0 8px 12px rgba(113, 51, 42, 0.08));
      }

      .route-card {
        width: max-content;
        max-width: 100%;
        display: flex;
        align-items: center;
        gap: 9px;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.88);
        padding: 8px 10px;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.82rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .route-line {
        width: 62px;
        height: 18px;
        display: block;
        color: var(--coral);
      }

      .route-line svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .story-body {
        padding: 24px 20px 20px;
      }

      .section {
        padding: 22px 0;
        border-top: 1px dashed rgba(20, 56, 95, 0.16);
      }

      .section:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .section-label {
        margin: 0;
        color: var(--gold);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 10px;
      }

      .section-icon {
        width: 18px;
        height: 18px;
        color: var(--gold);
        flex: 0 0 auto;
      }

      .episode-title {
        margin: 0 0 16px;
        color: var(--navy);
        font-size: clamp(1.7rem, 8.5vw, 2.75rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .scene {
        margin: 0;
        color: #2b3745;
        font-size: 1.03rem;
        line-height: 1.9;
        white-space: pre-line;
      }

      .sentence-panel,
      .reveal-panel {
        background: var(--surface);
        border: 1px solid rgba(20, 56, 95, 0.11);
        padding: 15px;
        border-radius: 8px;
      }

      .sentence-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .sentence-top .section-heading {
        margin-bottom: 0;
      }

      .sentence-text {
        margin: 0;
        color: var(--navy);
        font-size: 1.04rem;
        font-weight: 900;
      }

      .sentence-hidden {
        display: block;
        min-height: 36px;
        color: #2d638d;
        letter-spacing: 0.18em;
        overflow-wrap: anywhere;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        align-items: center;
      }

      .primary-button,
      .ghost-button {
        min-height: 44px;
        border: 1px solid var(--navy);
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.92rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .primary-button {
        background: var(--navy);
        color: #fff;
      }

      .ghost-button {
        background: #fff;
        color: var(--navy);
      }

      .primary-button:hover,
      .primary-button:focus-visible,
      .ghost-button:hover,
      .ghost-button:focus-visible {
        outline: 3px solid rgba(231, 116, 93, 0.24);
        outline-offset: 2px;
      }

      .reveal-panel[hidden] {
        display: none;
      }

      .word-reveal {
        margin: 0;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.9rem, 15vw, 5rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .word-meaning {
        margin: 10px 0 0;
        color: #4d6d8f;
        font-weight: 900;
      }

      .feeling {
        margin: 18px 0 0;
        color: #2d3746;
        font-size: 0.98rem;
        line-height: 1.78;
      }

      .phrases {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }

      .phrase-heading {
        margin-top: 20px;
      }

      .phrases li {
        background: #edf5f8;
        color: #315a7a;
        padding: 7px 10px;
        font-size: 0.84rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .bottom-nav {
        position: sticky;
        bottom: 0;
        z-index: 10;
        margin: 24px -20px -20px;
        border-top: 1px solid rgba(20, 56, 95, 0.1);
        background: rgba(255, 253, 248, 0.94);
        backdrop-filter: blur(16px);
        padding: 12px 20px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .word-count {
        color: var(--muted);
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 900;
        text-align: center;
      }

      @media (min-width: 820px) {
        .page {
          grid-template-columns: 320px minmax(0, 740px);
          align-items: start;
          padding: 28px 22px 56px;
        }

        .reader-title {
          font-size: 1.82rem;
        }

        .lesson-strip {
          position: sticky;
          top: 92px;
          align-self: start;
        }

        .episode-tabs {
          grid-auto-flow: row;
          grid-auto-columns: unset;
          overflow: visible;
          max-height: calc(100vh - 284px);
          overflow-y: auto;
          padding-right: 6px;
        }

        .hero {
          min-height: 248px;
          padding: 28px;
        }

        .story-body {
          padding: 32px 34px 24px;
        }

        .scene {
          font-size: 1.07rem;
        }

        .bottom-nav {
          margin-left: -34px;
          margin-right: -34px;
          margin-bottom: -24px;
          padding-left: 34px;
          padding-right: 34px;
        }
      }

      @media (max-width: 420px) {
        .topbar-inner {
          padding-left: 14px;
          padding-right: 14px;
        }

        .brand-title {
          font-size: 0.95rem;
        }

        .page {
          padding-left: 12px;
          padding-right: 12px;
        }

        .hero {
          min-height: 188px;
          padding: 18px;
        }

        .story-body {
          padding: 22px 18px 18px;
        }

        .scene {
          font-size: 1rem;
          line-height: 1.86;
        }

        .episode-title {
          font-size: clamp(1.55rem, 8vw, 2.2rem);
        }
      }
    </style>
  </head>
  <body>
    <svg aria-hidden="true" focusable="false" style="position: absolute; width: 0; height: 0; overflow: hidden">
      <symbol id="icon-menu" viewBox="0 0 24 24">
        <path d="M5 7.5h14M5 12h14M5 16.5h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

    <div class="app">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <svg class="brand-logo" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="3" y="3" width="42" height="42" rx="11" fill="#14385f" />
              <path d="M9 30c9-10 20-13 30-9" fill="none" stroke="#f6d9a6" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="2.5 3.8" />
              <circle cx="38.4" cy="20.7" r="2" fill="#e7745d" />
              <text x="9" y="31.5" fill="#fffdf8" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="900" letter-spacing="0">DD</text>
            </svg>
            <div>
              <p class="brand-title">DDungEE Cabin Diary</p>
              <p class="brand-subtitle">정민이의 승무원 토익 단어장</p>
            </div>
          </div>
          <div class="header-actions">
            <div class="top-progress" id="topProgress">01 / 05</div>
            <button class="menu-button" id="menuButton" type="button" aria-label="에피소드 목록으로 이동">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-menu"></use>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="page">
        <aside class="lesson-strip" aria-label="episode navigation">
          <nav class="level-shelf" id="levelShelf" aria-label="레벨 선택"></nav>
          <div class="reader-intro">
            <div>
              <p class="day-label" id="dayLabel">DAY 01</p>
              <h1 class="reader-title">정민이의 오늘 비행 장면</h1>
            </div>
            <div class="progress-chip" id="progressText">1 / 5</div>
          </div>
          <div class="progress-track">
            <span class="progress-fill" id="progressFill"></span>
          </div>
          <nav class="episode-tabs" id="episodeTabs" aria-label="에피소드 목록"></nav>
        </aside>

        <article class="story-card" id="storyCard">
          <div class="hero">
            <svg class="stamp-svg" viewBox="0 0 128 84" aria-hidden="true">
              <ellipse cx="64" cy="42" rx="55" ry="30" fill="rgba(255, 253, 248, 0.32)" stroke="currentColor" stroke-width="3" />
              <ellipse cx="64" cy="42" rx="45" ry="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.78" />
              <path d="M31 31c18-9 42-9 66 0M31 53c18 9 42 9 66 0" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" opacity="0.7" />

      function buildScene(entry, index) {
        const texture = storyTextures[index % storyTextures.length];
        return `${texture.opening}\n\n${entry.sceneSeed}. ${texture.middle}\n\n한국어 뜻으로는 '${entry.korean}'. 그런데 정민에게는 먼저 이런 이미지가 붙었다. ${entry.feel}. 머리로 번역하기 전에 맛있는 냄새, 귀여운 색감, 손에 잡힌 물건, 사람들의 작은 표정이 먼저 떠오르는 느낌이었다.\n\n${texture.ending}`;
      }

      function makeQuiz(sentence, answer) {
        return sentence.replace(new RegExp(escapeRegExp(answer), "i"), "_____");
      }

      function parseSeed(line) {
        const [word, korean, title, sentence, feel, phraseText, sceneSeed] = line.split("|");
        return {
          word,
          korean,
          title,
          sentence,
          feel,
          sceneSeed,
          phrases: phraseText.split(";"),
        };
      }

      const generatedEpisodes = toeicLevelOneSeedText.split("\n").map((line) => parseSeed(line));
      const levelOneRawEpisodes = generatedEpisodes;
      const answerPool = levelOneRawEpisodes.map((episode) => episode.answer || episode.word);

      function buildOptions(answer, index) {
        const decoys = answerPool.filter((item) => item !== answer);
        return [
          answer,
          decoys[(index + 11) % decoys.length],
          decoys[(index + 37) % decoys.length],
          decoys[(index + 61) % decoys.length],
        ];
      }

      const levelOneEpisodes = levelOneRawEpisodes.map((episode, index) => {
        const answer = episode.answer || episode.word;
        return {
          ...episode,
          day: `WORD ${storyNumber(index + 1)}`,
          route: episode.route || storyRoutes[index % storyRoutes.length],
          scene: episode.scene || buildScene(episode, index),
          quiz: episode.quiz || makeQuiz(episode.sentence, answer),
          options: episode.options || buildOptions(answer, index),
          answer,
          feeling:
            episode.feeling ||
            `이 단어는 이런 장면으로 잡으면 좋아요. ${episode.word}: ${episode.feel}. 뜻을 먼저 외우기보다, 정민이가 실제로 보고 만지는 장면 안에서 잡으면 독해할 때 훨씬 빨리 살아납니다.`,
        };
      });

      const levels = [
        {
          id: "level-1",
          label: "Level 1",
          title: "TOEIC 기본 단어",
          status: "open",
          episodes: levelOneEpisodes,
        },
        {
          id: "level-2",
          label: "Level 2",
          title: "업무와 쇼핑 표현",
          status: "locked",
          count: 100,
        },
        {
          id: "level-3",
          label: "Level 3",
          title: "문서와 일정 관리",
          status: "locked",
          count: 100,
        },
        {
          id: "level-4",
          label: "Level 4",
          title: "면접과 긴 독해",
          status: "locked",
          count: 100,
        },
      ];

      const activeLevel = levels[0];
      const episodes = activeLevel.episodes;

      const state = {
        index: Math.min(
          Number(localStorage.getItem("ddungee-toeic-level-1-index") || 0),
          episodes.length - 1,
        ),
        sentenceShown: false,
        revealed: false,
      };

      const levelShelf = document.querySelector("#levelShelf");
      const episodeTabs = document.querySelector("#episodeTabs");
      const menuButton = document.querySelector("#menuButton");
      const topProgress = document.querySelector("#topProgress");
      const progressText = document.querySelector("#progressText");
      const progressFill = document.querySelector("#progressFill");
      const dayLabel = document.querySelector("#dayLabel");
      const routeFrom = document.querySelector("#routeFrom");
      const routeTo = document.querySelector("#routeTo");
      const episodeTitle = document.querySelector("#episodeTitle");
      const sceneText = document.querySelector("#sceneText");
      const sentenceText = document.querySelector("#sentenceText");
      const sentenceButton = document.querySelector("#sentenceButton");
      const revealButton = document.querySelector("#revealButton");
      const revealPanel = document.querySelector("#revealPanel");
      const wordText = document.querySelector("#wordText");
      const koreanText = document.querySelector("#koreanText");
      const feelingText = document.querySelector("#feelingText");
      const phraseList = document.querySelector("#phraseList");
      const prevButton = document.querySelector("#prevButton");
      const nextButton = document.querySelector("#nextButton");
      const wordCount = document.querySelector("#wordCount");

      function moveToStoryTop() {
        requestAnimationFrame(() => {
          document.querySelector("#storyCard").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        });
      }

      function selectEpisode(index) {
        state.index = Math.max(0, Math.min(index, episodes.length - 1));
        state.sentenceShown = false;
        state.revealed = false;
        localStorage.setItem("ddungee-toeic-level-1-index", String(state.index));
        render();
        moveToStoryTop();
      }

      function renderLevels() {
        levelShelf.innerHTML = "";
        levels.forEach((level) => {
          const button = document.createElement("button");
          const isActive = level.id === activeLevel.id;
          const isLocked = level.status === "locked";
          button.type = "button";
          button.disabled = isLocked;
          button.className = `level-card${isActive ? " active" : ""}${isLocked ? " locked" : ""}`;
          button.innerHTML = `
            <span class="level-label">${level.label}</span>
            <span class="level-title">${level.title}</span>
            <span class="level-status">${isLocked ? `잠김 · ${level.count} words` : `${level.episodes.length} words open`}</span>
          `;
          levelShelf.appendChild(button);
        });
      }

      function renderTabs() {
        episodeTabs.innerHTML = "";
        episodes.forEach((episode, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `episode-tab${index === state.index ? " active" : ""}`;
          button.innerHTML = `
            <span class="tab-head">
              <span class="tab-day">${episode.day}</span>
              <span class="tab-plane${index === state.index ? "" : " empty"}" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <use href="#icon-plane"></use>
                </svg>
              </span>
            </span>
            <span class="tab-title">${episode.title}</span>
            <span class="tab-route">${episode.route[0]} → ${episode.route[1]}</span>
          `;
          button.addEventListener("click", () => selectEpisode(index));
          episodeTabs.appendChild(button);
        });
      }

      function render() {
        const episode = episodes[state.index];
        const current = state.index + 1;
        const progress = (current / episodes.length) * 100;

        topProgress.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;
        progressText.textContent = `${current} / ${episodes.length}`;
        progressFill.style.setProperty("--progress", `${progress}%`);
        dayLabel.textContent = `${activeLevel.label} · ${episode.day}`;
        routeFrom.textContent = episode.route[0];
        routeTo.textContent = episode.route[1];
        episodeTitle.textContent = episode.title;
        sceneText.textContent = episode.scene;
        sentenceText.textContent = state.sentenceShown
          ? episode.sentence
          : "••••••••••••••••••••••••••••";
        sentenceText.className = state.sentenceShown ? "sentence-text" : "sentence-hidden";
        sentenceButton.textContent = state.sentenceShown ? "문장 숨기기" : "문장 보기";
        revealButton.textContent = state.revealed ? "단어 숨기기" : "단어 공개";
        revealPanel.hidden = !state.revealed;
        wordText.textContent = episode.word;
        koreanText.textContent = episode.korean;
        feelingText.textContent = episode.feeling;
        wordCount.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;

        phraseList.innerHTML = "";
        episode.phrases.forEach((phrase) => {
          const item = document.createElement("li");
          item.textContent = phrase;
          phraseList.appendChild(item);
        });

        renderLevels();
        renderTabs();
      }

      sentenceButton.addEventListener("click", () => {
        state.sentenceShown = !state.sentenceShown;
        render();
      });

      revealButton.addEventListener("click", () => {
        state.revealed = !state.revealed;
        render();
      });

      prevButton.addEventListener("click", () => {
        selectEpisode((state.index - 1 + episodes.length) % episodes.length);
      });

      nextButton.addEventListener("click", () => {
        selectEpisode((state.index + 1) % episodes.length);
      });

      menuButton.addEventListener("click", () => {
        episodeTabs.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      });

      render();
    </script>
  </body>
</html>
