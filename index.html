<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDungEE Cabin Diary</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%2314385f'/%3E%3Ctext x='10' y='31' fill='%23fffdf8' font-family='Georgia' font-size='17' font-weight='900'%3EDD%3C/text%3E%3C/svg%3E" />
    <meta
      name="description"
      content="정민이의 승무원 세계관으로 토익 단어를 긴 장면처럼 익히는 모바일 단어장"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #14243a;
        --muted: #687384;
        --paper: #fbf6ec;
        --paper-2: #fffdf8;
        --surface: #fffaf2;
        --line: #e6ddce;
        --navy: #14385f;
        --blue: #2f6b9e;
        --sky: #dfeff5;
        --coral: #e7745d;
        --gold: #b88939;
        --green: #2d7c6d;
        --shadow: 0 16px 44px rgba(27, 42, 61, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(223, 239, 245, 0.58), transparent 250px),
          var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.72;
      }

      button {
        font: inherit;
      }

      .app {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.92);
        backdrop-filter: blur(18px);
      }

      .topbar-inner {
        max-width: 1120px;
        min-height: 68px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        filter: drop-shadow(0 8px 14px rgba(20, 56, 95, 0.18));
      }

      .brand-title {
        margin: 0;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.15rem;
        font-weight: 900;
        line-height: 1.05;
        white-space: nowrap;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.2;
      }

      .top-progress {
        min-width: max-content;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.9rem;
        font-weight: 900;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .menu-button {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.74);
        color: var(--navy);
        cursor: pointer;
        padding: 0;
        border-radius: 8px;
      }

      .menu-button svg {
        width: 20px;
        height: 20px;
      }

      .menu-button:hover,
      .menu-button:focus-visible {
        outline: 3px solid rgba(231, 116, 93, 0.2);
        outline-offset: 2px;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 680px);
        justify-content: center;
        gap: 22px;
        padding: 18px 14px 42px;
      }

      .lesson-strip {
        display: grid;
        gap: 12px;
      }

      .level-shelf {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(132px, 1fr);
        gap: 10px;
        overflow-x: auto;
        padding: 2px 2px 6px;
        scrollbar-width: thin;
      }

      .level-card {
        min-height: 72px;
        border: 1px solid rgba(20, 56, 95, 0.13);
        background: rgba(255, 253, 248, 0.88);
        color: var(--ink);
        padding: 11px 12px;
        text-align: left;
        cursor: pointer;
        border-radius: 8px;
      }

      .level-card.active {
        background: var(--navy);
        color: #fff;
        border-color: transparent;
      }

      .level-card.locked {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .level-label,
      .level-status {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.74rem;
        font-weight: 900;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .level-title {
        display: block;
        margin-top: 4px;
        font-size: 0.9rem;
        font-weight: 900;
        line-height: 1.25;
      }

      .level-status {
        margin-top: 7px;
        color: var(--green);
      }

      .level-card.active .level-status {
        color: #f6d9a6;
      }

      .level-card.locked .level-status {
        color: var(--muted);
      }

      .reader-intro {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: end;
        padding: 4px 2px 0;
      }

      .day-label {
        margin: 0;
        color: var(--green);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.8rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .reader-title {
        margin: 4px 0 0;
        color: var(--navy);
        font-size: clamp(1.5rem, 7vw, 2.3rem);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .progress-chip {
        border: 1px solid rgba(20, 56, 95, 0.14);
        background: rgba(255, 253, 248, 0.8);
        padding: 8px 10px;
        color: var(--navy);
        font-weight: 900;
        border-radius: 8px;
      }

      .progress-track {
        height: 3px;
        background: rgba(20, 56, 95, 0.13);
      }

      .progress-fill {
        display: block;
        width: var(--progress, 20%);
        height: 100%;
        background: var(--navy);
      }

      .progress-summary {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 0 2px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .progress-summary strong {
        color: var(--green);
      }

      .episode-tabs {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(176px, 1fr);
        gap: 10px;
        overflow-x: auto;
        padding: 2px 2px 8px;
        scrollbar-width: thin;
      }

      .episode-tab {
        position: relative;
        min-height: 74px;
        border: 1px solid rgba(20, 56, 95, 0.13);
        background: rgba(255, 253, 248, 0.86);
        color: var(--ink);
        padding: 12px 14px 12px 16px;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
        border-radius: 8px;
      }

      .episode-tab::before,
      .episode-tab::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 9px;
        height: 18px;
        background: var(--paper);
        border: 1px solid rgba(20, 56, 95, 0.08);
        transform: translateY(-50%);
      }

      .episode-tab::before {
        left: -1px;
        border-left: 0;
        border-radius: 0 12px 12px 0;
      }

      .episode-tab::after {
        right: -1px;
        border-right: 0;
        border-radius: 12px 0 0 12px;
      }

      .episode-tab.active {
        background: linear-gradient(135deg, var(--navy), #255f96);
        color: #fff;
        border-color: transparent;
      }

      .episode-tab.viewed:not(.active) {
        border-color: rgba(47, 107, 158, 0.24);
      }

      .episode-tab.completed:not(.active) {
        background: rgba(239, 247, 245, 0.96);
        border-color: rgba(45, 124, 109, 0.3);
      }

      .episode-tab:hover,
      .episode-tab:focus-visible {
        border-color: rgba(20, 56, 95, 0.45);
        outline: none;
      }

      .tab-day {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .tab-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .tab-plane {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.92);
      }

      .tab-plane.empty {
        color: rgba(20, 56, 95, 0.3);
      }

      .episode-tab:not(.active) .tab-plane {
        color: rgba(20, 56, 95, 0.32);
      }

      .tab-plane svg {
        width: 20px;
        height: 20px;
      }

      .tab-title {
        display: block;
        margin-top: 3px;
        font-weight: 900;
        line-height: 1.22;
      }

      .tab-route {
        display: block;
        margin-top: 3px;
        opacity: 0.72;
        font-size: 0.76rem;
      }

      .story-card {
        overflow: hidden;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.96);
        box-shadow: var(--shadow);
        border-radius: 8px;
      }

      .hero {
        position: relative;
        min-height: 210px;
        padding: 22px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.9), rgba(255, 253, 248, 0.24) 58%, rgba(255, 253, 248, 0.06)),
          url("assets/flight-sky-window.jpg");
        background-size: cover;
        background-position: center;
      }

      .stamp-svg {
        width: 112px;
        height: auto;
        transform: rotate(-8deg);
        color: var(--coral);
        filter: drop-shadow(0 8px 12px rgba(113, 51, 42, 0.08));
      }

      .route-card {
        width: max-content;
        max-width: 100%;
        display: flex;
        align-items: center;
        gap: 9px;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.88);
        padding: 8px 10px;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.82rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .route-line {
        width: 62px;
        height: 18px;
        display: block;
        color: var(--coral);
      }

      .route-line svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .story-body {
        padding: 24px 20px 20px;
      }

      .section {
        padding: 22px 0;
        border-top: 1px dashed rgba(20, 56, 95, 0.16);
      }

      .section:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .section-label {
        margin: 0;
        color: var(--gold);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 10px;
      }

      .section-icon {
        width: 18px;
        height: 18px;
        color: var(--gold);
        flex: 0 0 auto;
      }

      .episode-title {
        margin: 0 0 16px;
        color: var(--navy);
        font-size: clamp(1.7rem, 8.5vw, 2.75rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .scene {
        margin: 0;
        color: #2b3745;
        font-size: 1.03rem;
        line-height: 1.9;
        white-space: pre-line;
      }

      .sentence-panel,
      .reveal-panel {
        background: var(--surface);
        border: 1px solid rgba(20, 56, 95, 0.11);
        padding: 15px;
        border-radius: 8px;
      }

      .sentence-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .sentence-top .section-heading {
        margin-bottom: 0;
      }

      .sentence-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .sentence-text {
        margin: 0;
        color: var(--navy);
        font-size: 1.04rem;
        font-weight: 900;
      }

      .sentence-hidden {
        display: block;
        min-height: 36px;
        color: #2d638d;
        letter-spacing: 0.18em;
        overflow-wrap: anywhere;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        align-items: center;
      }

      .primary-button,
      .ghost-button {
        min-height: 44px;
        border: 1px solid var(--navy);
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.92rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .primary-button {
        background: var(--navy);
        color: #fff;
      }

      .ghost-button {
        background: #fff;
        color: var(--navy);
      }

      .listen-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .listen-button svg {
        width: 16px;
        height: 16px;
      }

      .primary-button:disabled,
      .ghost-button:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      .primary-button:hover,
      .primary-button:focus-visible,
      .ghost-button:hover,
      .ghost-button:focus-visible {
        outline: 3px solid rgba(231, 116, 93, 0.24);
        outline-offset: 2px;
      }

      .reveal-panel[hidden] {
        display: none;
      }

      .word-reveal {
        margin: 0;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.9rem, 15vw, 5rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .word-meaning {
        margin: 10px 0 0;
        color: #4d6d8f;
        font-weight: 900;
      }

      .feeling {
        margin: 18px 0 0;
        color: #2d3746;
        font-size: 0.98rem;
        line-height: 1.78;
      }

      .phrases {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }

      .phrase-heading {
        margin-top: 20px;
      }

      .phrases li {
        background: #edf5f8;
        color: #315a7a;
        padding: 7px 10px;
        font-size: 0.84rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .bottom-nav {
        position: sticky;
        bottom: 0;
        z-index: 10;
        margin: 24px -20px -20px;
        border-top: 1px solid rgba(20, 56, 95, 0.1);
        background: rgba(255, 253, 248, 0.94);
        backdrop-filter: blur(16px);
        padding: 12px 20px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .word-count {
        color: var(--muted);
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 900;
        text-align: center;
      }

      @media (min-width: 820px) {
        .page {
          grid-template-columns: 320px minmax(0, 740px);
          align-items: start;
          padding: 28px 22px 56px;
        }

        .reader-title {
          font-size: 1.82rem;
        }

        .lesson-strip {
          position: sticky;
          top: 92px;
          align-self: start;
        }

        .episode-tabs {
          grid-auto-flow: row;
          grid-auto-columns: unset;
          overflow: visible;
          max-height: calc(100vh - 284px);
          overflow-y: auto;
          padding-right: 6px;
        }

        .hero {
          min-height: 248px;
          padding: 28px;
        }

        .story-body {
          padding: 32px 34px 24px;
        }

        .scene {
          font-size: 1.07rem;
        }

        .bottom-nav {
          margin-left: -34px;
          margin-right: -34px;
          margin-bottom: -24px;
          padding-left: 34px;
          padding-right: 34px;
        }
      }

      @media (max-width: 420px) {
        .topbar-inner {
          padding-left: 14px;
          padding-right: 14px;
        }

        .brand-title {
          font-size: 0.95rem;
        }

        .page {
          padding-left: 12px;
          padding-right: 12px;
        }

        .hero {
          min-height: 188px;
          padding: 18px;
        }

        .story-body {
          padding: 22px 18px 18px;
        }

        .scene {
          font-size: 1rem;
          line-height: 1.86;
        }

        .episode-title {
          font-size: clamp(1.55rem, 8vw, 2.2rem);
        }
      }
    </style>
  </head>
  <body>
    <svg aria-hidden="true" focusable="false" style="position: absolute; width: 0; height: 0; overflow: hidden">
      <symbol id="icon-menu" viewBox="0 0 24 24">

        <path d="m10.8 14.6 4-4" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />

      <symbol id="icon-scene" viewBox="0 0 24 24">
        <rect x="4" y="6.5" width="16" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8" />

    <div class="app">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <svg class="brand-logo" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="3" y="3" width="42" height="42" rx="11" fill="#14385f" />
              <path d="M9 30c9-10 20-13 30-9" fill="none" stroke="#f6d9a6" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="2.5 3.8" />
              <circle cx="38.4" cy="20.7" r="2" fill="#e7745d" />
              <text x="9" y="31.5" fill="#fffdf8" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="900" letter-spacing="0">DD</text>
            </svg>
            <div>
              <p class="brand-title">DDungEE Cabin Diary</p>
              <p class="brand-subtitle">정민이의 승무원 토익 단어장</p>
            </div>
          </div>
          <div class="header-actions">
            <div class="top-progress" id="topProgress">01 / 05</div>
            <button class="menu-button" id="menuButton" type="button" aria-label="에피소드 목록으로 이동">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-menu"></use>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="page">
        <aside class="lesson-strip" aria-label="episode navigation">
          <nav class="level-shelf" id="levelShelf" aria-label="레벨 선택"></nav>
          <div class="reader-intro">

        ], `Could you confirm my breakfast reservation for tomorrow morning?`),
        manualStory([
          `나리타의 작은 카페에서 정민이는 새 다이어리를 펼쳤다. 표지는 크림색이었고, 첫 장에는 딸기와 리본 스티커가 붙어 있었다. 창밖으로는 자전거를 탄 사람이 천천히 지나갔다.`,
          `테이블 위에는 라떼 한 잔, 작은 지도, 그리고 친구가 보내준 맛집 목록이 놓여 있었다. 정민이는 펜 뚜껑을 열었다 닫았다. 하고 싶은 게 너무 많으면 오히려 어디서부터 적어야 할지 모르게 된다.`,
          `오전에는 강가 산책. 점심에는 푸딩 가게. 오후에는 고양이 소품샵. 저녁에는 작은 서점. 정민이는 시간 옆에 작은 하트를 그렸다가, 다시 지우개로 살짝 문질렀다. 이동 시간이 생각보다 길었다.`,
          `"여기 문구점도 진짜 귀엽대." 친구가 휴대폰을 보여줬다. 화면 속에는 스티커가 벽처럼 쌓인 가게 사진이 있었다. 정민이의 눈이 바로 커졌다. 토끼 스티커, 딸기 메모지, 조그만 비행기 클립까지 있었다.`,
          `"가고 싶다..." 정민이가 거의 속삭이듯 말했다. 하지만 다이어리 안의 하루는 이미 꽉 차 있었다. 카페 창밖으로 해가 조금씩 기울고 있었고, 오후의 빈칸은 생각보다 작았다.`,
          `친구가 웃었다. "욕심내면 저녁 못 먹어." 정민이는 펜 끝으로 시간표를 톡톡 두드렸다. 어디를 줄이고 어디를 옮겨야 할지, 하루 전체가 퍼즐처럼 보였다.`,
          `그녀는 푸딩 가게 옆에 적어둔 시간을 30분 줄이고, 서점 앞에 붙어 있던 하트 하나를 지웠다. 마음은 아팠지만 문구점은 너무 강했다. 다이어리 한 장 위에서 여행의 숨 쉴 공간을 다시 만드는 중이었다.`,
        ], `Can we fit the stationery shop into the schedule?`),
        manualStory([
          `타이베이의 오후는 축축하고 따뜻했다. 정민이는 수플레 카페 앞에서 번호표를 들고 서 있었다. 가게 유리창 안쪽에는 햇빛이 딱 예쁘게 떨어지는 창가 자리가 하나 보였다.`,
          `그 자리는 이상하게 사진 속 자리처럼 생겼다. 둥근 테이블, 하얀 커튼, 작은 꽃병. 정민이는 아직 메뉴도 못 봤는데 이미 거기 앉아 있는 자기 모습을 상상했다. 수플레 위에 슈가파우더가 내려앉고, 창밖으로 스쿠터가 지나가고.`,
          `하지만 줄은 길었다. 앞사람들은 메뉴판을 들고 사진을 찍었고, 뒤에서는 캐리어 바퀴가 바닥을 달그락거렸다. 직원은 예약 장부와 번호표를 번갈아 보며 사람들을 들여보냈다.`,
          `"저 자리 금방 나갈까?" 정민이가 친구에게 물었다. 친구는 유리창 안을 보더니 어깨를 으쓱했다. "말 안 하면 다른 사람이 앉겠지." 그 말이 너무 맞아서 정민이는 더 초조해졌다.`,
          `차례가 가까워졌을 때 정민이는 직원에게 다가갔다. 괜히 머리카락을 귀 뒤로 넘겼다. 이런 걸 물어보는 게 유난스러워 보일까 봐 잠깐 망설였지만, 오늘은 그 자리가 하루의 분위기를 바꿀 것 같았다.`,
          `"Window table?" 직원이 먼저 알아차린 듯 물었다. 정민이는 고개를 끄덕였다. 직원은 장부를 펼치고 이름을 물었다. 정민이는 자기 이름을 또박또박 말했다.`,
          `작은 표에 이름이 적히는 걸 보자, 아직 앉지도 않은 자리가 잠깐 자기 것이 된 것처럼 느껴졌다. 미래의 한 장면을 미리 살짝 묶어두는 일. 그게 이렇게 설렐 줄은 몰랐다.`,
        ], `Could I reserve the window table under the name Jeongmin?`),
        manualStory([
          `방콕 야시장에 도착했을 때 비가 너무 갑자기 쏟아졌다. 하늘이 한 번에 열리는 것 같았다. 천막 위로 빗방울이 와르르 부딪혔고, 망고 가게 앞 사람들은 우산을 접은 채 좁은 처마 밑으로 몰려들었다.`,
          `정민이는 휴대폰에 저장해둔 시장 지도를 내려다봤다. 꼬치 가게, 리본 핀 가게, 코코넛 아이스크림까지 순서가 완벽했다. 다이어리에 붙여둔 작은 별표들도 떠올랐다. 그런데 길은 순식간에 물빛으로 번지고 있었다.`,
          `샌들 앞쪽이 젖기 시작했다. 친구는 앞머리에 맺힌 물방울을 털며 웃었다. "우리 조금만 기다려볼까?" 정민이는 하늘을 올려다봤다. 대답 대신 천막 끝에서 물이 줄줄 흘러내렸다.`,
          `가게 안쪽에서는 기름 냄새와 젖은 흙냄새가 섞였다. 맛있는 냄새였지만, 사람이 너무 많았다. 누군가는 캐리어를 들고 지나가려다 발을 헛디뎠고, 어떤 아이는 물웅덩이를 피해 엄마 손을 꽉 잡고 있었다.`,
          `"괜찮겠지" 하고 밀어붙일 수도 있었다. 하지만 정민이는 젖은 종이봉투와 미끄러운 길, 다음 날 아침 일정을 생각했다. 기대했던 밤이 아쉬워도, 지금 그 계획을 계속 붙잡는 게 더 피곤할 것 같았다.`,
          `친구가 휴대폰을 보여줬다. "호텔 근처에 라멘집 있어. 평점도 좋아." 화면 속 국물 사진이 김을 내는 것처럼 보였다. 정민이는 잠깐 웃었다. 사라지는 계획 옆에 다른 따뜻한 가능성이 생겼다.`,
          `"오늘은 아닌가 보다." 정민이는 다이어리 속 야시장 별표를 마음속으로 접었다. 예정된 일을 없던 일로 만드는 건 조금 서운했지만, 그 서운함까지 챙겨서 더 안전한 밤으로 옮겨가는 느낌이었다.`,
        ], `I think we should cancel the night market plan for tonight.`),
        manualStory([
          `싱가포르 쇼핑몰은 냉방이 너무 세서 정민이는 가디건 단추를 하나 잠갔다. 디저트 카페 메뉴판에는 말차라떼, 망고 스무디, 딸기 밀크티 사진이 반짝반짝 붙어 있었다.`,
          `정민이는 거의 말차라떼를 고른 상태였다. 그런데 옆 테이블에 놓인 딸기 밀크티 위 분홍 크림을 보는 순간, 마음이 얌전히 다른 쪽으로 기울었다.`,
          `"저기요..." 직원이 고개를 들었다. "아직 만들기 전이면 딸기 밀크티로 바꿔도 될까요?" 포스기 화면의 작은 글자가 바뀌고, 정민이의 기분도 같이 다른 색으로 옮겨갔다.`,
        ], `Can I change my order to the strawberry milk tea?`),
        manualStory([
          `파리행 비행 전, 정민이는 게이트 근처 작은 카페에 앉아 있었다. 구두를 오래 신어서 발끝이 뻐근했고, 테이블 위에는 반쯤 먹은 초콜릿 쿠키가 놓여 있었다.`,
          `직원이 들고 다니는 꽃무늬 접시가 너무 귀여웠다. 정민이는 그냥 종이 접시에 받아도 되는데, 자꾸 그 접시에 눈이 갔다. 말할까 말까 하는 사이 손님 한 명이 빠져나갔다.`,
          `"혹시 저 꽃 접시에 담아주실 수 있을까요?" 정민이가 조심스럽게 물었다. 직원은 접시를 보고 웃었다. "물론이죠." 작은 부탁 하나가 공기를 부드럽게 바꾸었다.`,
        ], `Could I request the flower plate, if it is not too much trouble?`),
        manualStory([
          `제주 숙소 로비에는 귤 향이 은근하게 났다. 비가 조금씩 내렸고, 정민이는 젖은 머리 끝을 손가락으로 꾹꾹 눌렀다.`,
          `프런트 직원은 수건 바구니를 가져오더니, 곧 따뜻한 차와 작은 쿠키까지 내밀었다. 정민이는 양손으로 컵을 받았다. 유리창 밖은 흐렸지만 컵 안에서는 김이 조용히 올라왔다.`,
          `"감사합니다. 진짜 딱 필요했어요." 누군가 말하기 전에 먼저 알아채고 준비해둔 것. 정민이는 서비스라는 게 결국 이런 온도일지도 모른다고 생각했다.`,
        ], `They provide hot tea in the lobby after check-in.`),
        manualStory([
          `오사카 소품샵은 두 사람이 지나가면 어깨가 살짝 닿을 정도로 작았다. 정민이는 고양이 머그컵 앞에서 오래 서 있었다. 손잡이가 꼬리 모양으로 말려 있었고, 컵 안쪽에는 작은 발바닥이 그려져 있었다.`,
          `계산을 마치자 직원은 컵을 뽁뽁이로 감싸 분홍 종이봉투에 넣어주었다. 정민이는 봉투를 받아 들고도 바로 나가지 못했다. 너무 마음에 들어서 한 번 더 들여다보고 싶었다.`,
          `"영수증은 이메일로 보내드릴까요?" 직원이 물었다. 정민이가 주소를 말하자 잠시 뒤 휴대폰 위로 알림이 내려왔다. 작은 기록 하나가 화면 쪽으로 톡, 도착했다.`,
        ], `I just received the receipt by email.`),
        manualStory([
          `후쿠오카 호텔 방 책상 위에는 노트북, 여권, 립밤, 딸기맛 사탕 두 개가 나란히 놓여 있었다. 정민이는 승무원 지원서 마지막 화면 앞에서 발끝을 까딱거렸다.`,
          `이름도 맞고, 연락처도 맞고, 사진도 제대로 올라갔다. 파일명은 조금 웃겼다. jeongmin_resume_final_final.pdf. 정민이는 그걸 보고 혼자 피식 웃었다.`,
          `"나 진짜 누른다?" 통화 중이던 친구가 바로 대답했다. "눌러. 떵이, 너 준비 많이 했잖아." 파란 버튼은 너무 평범했지만, 누르는 순간 마음 한 조각이 공식적인 곳으로 건너갔다.`,
        ], `I think I am ready to submit it.`),
        manualStory([
          `교육장 앞 복도에는 새 종이 냄새가 났다. 정민이는 리본 달린 펜을 들고 체크리스트를 내려다봤다. 이름표, 교재, 안내문, 실습 시간표가 차례로 놓여 있었다.`,
          `처음에는 칸이 너무 많아 보였다. 그런데 하나씩 체크하다 보니 빈칸이 줄었다. 마지막 칸 옆에는 작은 별표 스티커를 붙이고 싶을 만큼 기분이 좋아졌다.`,
          `"여기까지 하면 끝인가요?" 담당자가 서류를 훑어보고 고개를 끄덕였다. "네, 이제 다 됐습니다." 비어 있던 칸들이 닫히고, 시작부터 끝까지 이어진 선이 조용히 완성됐다.`,
        ], `I finally completed the whole checklist.`),
        manualStory([
          `비행 전날 밤, 정민이는 호텔 방 책상 앞에서 메일 창을 열었다. 창밖에는 도시 불빛이 번졌고, 냉장고 안에는 아까 사 온 푸딩이 조용히 기다렸다.`,
          `메일에는 짧은 인사말과 파일 하나가 필요했다. 첨부 버튼을 누른 뒤에도 정민이는 바로 보내지 못했다. 파일명이 맞는지, 버전이 맞는지, 괜히 한 번 더 보고 싶었다.`,
          `"이거 진짜 맞지?" 정민이는 파일 아이콘을 노려보듯 보았다. 메일 아래쪽에 얌전히 붙어 있는 작은 아이콘. 혼자 있던 문서가 이제 말들과 함께 가려는 순간이었다.`,
        ], `Did I attach the right resume file?`),
        manualStory([
          `브런치 가게 메뉴판은 사진이 너무 많아서 오히려 고르기 어려웠다. 정민이는 팬케이크 사진을 확대하고, 다시 샐러드 사진을 보고, 또 옆 테이블 접시를 흘끗 봤다.`,
          `직원은 주문을 기다리며 미소를 지었다. 정민이는 이미 한 번 마음속으로 골랐지만, 메뉴 아래 작은 설명 하나가 계속 신경 쓰였다. 딸기 소스가 따로 나오는지 아닌지가 중요했다.`,
          `"잠깐만요. 메뉴 한 번만 더 볼게요." 정민이는 페이지를 처음부터 다시 훑었다. 바로 넘기지 않고 천천히 살펴보는 동안, 마음이 어디로 가는지 조금 더 분명해졌다.`,
        ], `Let me review the menu one more time.`),
        manualStory([
          `정민이는 휴가 신청 화면을 열어둔 채 침대에 앉아 있었다. 요청을 보낸 지 하루밖에 안 됐는데도, 화면을 새로고침할 때마다 심장이 작게 뛰었다.`,
          `아침에 일어나자마자 휴대폰을 확인했다. 알림 하나가 와 있었다. 화면에는 초록색 표시와 짧은 문장이 떠 있었다. 정민이는 이불 속에서 발을 동동 굴렀다.`,
          `"됐다..." 그녀는 혼자 웃었다. 누군가 공식적으로 괜찮다고 말해준 순간, 머릿속 여행 계획들이 갑자기 진짜 일정처럼 움직이기 시작했다.`,
        ], `Your leave request has been approved.`),
        manualStory([
          `정민이는 여행 앱을 열고 카페 영업시간을 확인했다. 어제까지만 해도 오후 8시까지였는데, 오늘 화면에는 낯선 시간이 떠 있었다.`,
          `그녀는 눈을 가늘게 뜨고 다시 보았다. 임시 영업시간. 오후 6시 마감. 이미 적어둔 다이어리 일정이 살짝 삐끗했다. 그래도 늦게 알아차린 것보다는 나았다.`,
          `"그럼 먼저 가야겠다." 정민이는 스티커를 떼어 다른 칸에 붙였다. 새 정보 하나가 들어오자 하루의 순서가 다시 맞춰졌다.`,
        ], `The cafe updated its hours this morning.`),
        manualStory([
          `딸기 케이크 픽업 알림은 오후 4시에 울리게 맞춰두었다. 정민이는 그 전까지 소품샵을 돌 생각이었다. 그런데 귀여운 접시 앞에서 시간을 잊기 쉬운 사람이 바로 자기라는 것도 잘 알았다.`,
          `휴대폰 알람 제목은 조금 웃겼다. 케이크 데리러 가기. 하트까지 붙여두었다. 알람이 울리면 아무리 예쁜 컵이 보여도 멈춰야 했다.`,
          `"나를 믿을 수 없으니까 알람을 믿어야지." 정민이는 혼자 중얼거리며 가방을 챙겼다. 잊지 않게 다시 잡아끄는 작은 손목끈 같은 장치였다.`,
        ], `This alarm will remind me to pick up the cake.`),
        manualStory([
          `비가 내려 택시가 늦게 잡혔다. 정민이는 호텔 프런트에 체크인 시간이 늦어질 것 같다는 말을 해야 했다. 그냥 가도 되겠지만, 마음 한쪽이 계속 찝찝했다.`,
          `차창 밖으로 젖은 간판들이 지나갔다. 정민이는 예약 메일을 열고 번호를 눌렀다. 신호음이 두 번 울리고 직원이 받았다.`,
          `"안녕하세요. 오늘 체크인이 조금 늦어질 것 같아서요." 필요한 사실을 먼저 말하고 나니 마음이 한결 가벼워졌다. 아직 도착하지 않았지만, 상황은 이미 상대에게 건너가 있었다.`,
        ], `I need to inform the front desk that I will arrive late.`),
        manualStory([
          `정민이는 딸기 케이크 가게 앞에서 주문표를 받았다. 직원은 포장까지 20분 정도 걸린다고 했다. 밖은 추웠고, 근처에는 따뜻한 라떼를 파는 작은 카페가 있었다.`,
          `"준비되면 알림 보내드릴게요." 직원이 말했다. 정민이는 휴대폰 번호를 남기고 카페로 들어갔다. 라떼 위 거품에는 작은 하트가 그려져 있었다.`,
          `컵을 반쯤 비웠을 때 화면이 반짝였다. 케이크 준비 완료. 공식적인 신호처럼 도착한 그 한 줄이 정민이를 다시 골목 밖으로 불러냈다.`,
        ], `The shop will notify me when the cake is ready.`),
        manualStory([
          `정민이와 친구는 지도 앱을 사이에 두고 카페 후보 세 곳을 바라봤다. 하나는 푸딩이 유명했고, 하나는 사진이 예뻤고, 하나는 역에서 가까웠다.`,
          `둘 다 양보하는 척했지만, 사실 각자 마음속 1등이 있었다. 정민이는 딸기 아이콘을 꾹 누르며 말했다. "여긴 진짜 가보고 싶어."`,
          `친구가 웃으며 지도를 확대했다. "그럼 동선을 한번 맞춰보자." 말이 오가자, 막연했던 여행이 둘이 같이 만지는 계획으로 변했다.`,
        ], `Let's discuss the route before we start walking.`),
        manualStory([
          `서비스 교육장 입구에는 이름표가 길게 놓여 있었다. 정민이는 자기 이름을 찾아 리본 달린 펜 옆에 섰다. 손끝이 살짝 차가웠다.`,
          `강의실 안에서는 이미 몇 사람이 조용히 인사를 나누고 있었다. 정민이는 문 앞에서 숨을 한 번 고르고, 머리카락을 귀 뒤로 넘겼다.`,
          `"안녕하세요. 정민입니다." 자리에 앉자 교재 첫 장이 바스락거렸다. 정해진 자리로 들어와 함께 시간을 보내는 느낌이, 생각보다 진지하게 마음에 닿았다.`,
        ], `I am here to attend the service training.`),
        manualStory([
          `공항 팝업스토어 한쪽에서 향수 만들기 행사가 열리고 있었다. 작은 유리병, 라벨 스티커, 시향지가 가지런히 놓여 있었다. 정민이는 그냥 구경만 하려다 발을 멈췄다.`,
          `직원이 말했다. "직접 향을 골라서 만들어보실 수 있어요." 정민이는 복숭아 향과 비누 향 사이에서 한참 고민했다. 구경만 하는 것과 손을 뻗는 것은 전혀 달랐다.`,
          `"저도 해볼게요." 그녀가 의자에 앉자 직원이 빈 병을 건넸다. 여행의 바깥에 서 있던 사람이 갑자기 작은 장면 안으로 들어간 순간이었다.`,
        ], `I want to participate in the perfume workshop.`),
        manualStory([
          `호텔 책상 위는 금세 엉망이 됐다. 마카롱 상자, 엽서, 영수증, 머리핀, 반쯤 먹은 젤리 봉지가 한꺼번에 펼쳐져 있었다.`,
          `정민이는 침대에 걸터앉아 그걸 보다가 웃었다. "이건 좀 아니지." 그녀는 엽서는 왼쪽, 영수증은 파우치 안, 마카롱은 창가 쪽으로 옮겼다.`,
          `물건들이 제자리를 찾자 방이 갑자기 넓어 보였다. 보기 좋게 놓고 순서를 맞추는 일은 별것 아닌데, 마음의 표면까지 살짝 정돈해주었다.`,
        ], `I arranged everything on the table by color.`),
        manualStory([
          `다음 날 아침 비행을 앞두고 정민이는 작은 파우치를 열었다. 립밤, 손크림, 여권, 사탕, 밴드. 빠뜨리면 꼭 필요해지는 것들만 이상하게 많았다.`,
          `그녀는 침대 위에 물건들을 줄 세웠다. 하나씩 넣으면서도 다시 꺼내 확인했다. 친구가 영상통화 너머로 웃었다. "너 그거 세 번째 보는 중이야."`,
          `"그래도 내일 아침의 나를 살리는 중이야." 정민이는 파우치 지퍼를 닫았다. 아직 오지 않은 시간을 위해 지금 손을 움직여두는 느낌이었다.`,
        ], `I prepared my pouch for tomorrow already.`),
        manualStory([
          `캐리어 안에는 옷과 간식과 기념품이 뒤섞여 있었다. 정민이는 한참을 내려다보다가 작은 파우치 세 개를 꺼냈다. 하나는 옷, 하나는 간식, 하나는 선물.`,
          `딸기 과자는 눌리면 안 되니까 맨 위. 블라우스는 접힌 자국이 덜 보이게 옆쪽. 고양이 컵은 수건 안에 감싸서 가운데.`,
          `다 넣고 나니 캐리어가 조용해진 것 같았다. 흩어져 있던 물건들이 각자의 칸을 얻자, 여행의 끝도 조금 덜 서운하게 느껴졌다.`,
        ], `I organized my suitcase into snacks, clothes, and gifts.`),
        manualStory([
          `면접 전날, 정민이는 호텔 욕실 거울 앞에 섰다. 블라우스 단추를 잠그고, 머리를 정리하고, 미소를 한 번 지어보았다. 어색했다.`,
          `"안녕하십니까." 너무 딱딱했다. "안녕하세요." 이번엔 너무 가벼웠다. 그녀는 두 손을 모으고 목소리의 높이를 조금 바꿨다.`,
          `세 번째 인사는 이상하게 더 부드러웠다. 얼굴도 같이 편해졌다. 이전보다 아주 조금 나아진 그 차이가, 정민이에게는 꽤 크게 느껴졌다.`,
        ], `I want to improve my greeting before the interview.`),
        manualStory([
          `정민이는 자주 가던 디저트 가게 앱을 열었다. 포인트는 별 기대 없이 눌렀는데, 숫자가 생각보다 커져 있었다. 그녀는 화면을 가까이 당겨 다시 봤다.`,
          `"어? 이 정도면 음료 하나 되겠는데?" 작은 숫자가 위로 불어난 것을 보는 일은 이상하게 기분이 좋았다. 그동안 먹은 푸딩과 케이크가 갑자기 착실한 기록처럼 보였다.`,
          `정민이는 쿠폰함까지 열어보고 혼자 웃었다. 달콤한 것들이 그냥 사라진 줄 알았는데, 어딘가에 차곡차곡 남아 있었다.`,
        ], `My points increased more than I expected.`),
        manualStory([
          `공항으로 가기 전, 정민이는 캐리어를 들어보고 얼굴을 찡그렸다. 너무 무거웠다. 입지 않을 것 같은 니트와 여분 구두가 조용히 범인처럼 보였다.`,
          `그녀는 침대 위에 물건을 다시 펼쳤다. "이건 빼자. 이것도." 귀여운 잠옷 하나는 끝까지 고민했지만 결국 쇼핑백으로 옮겼다.`,
          `가방을 다시 들어보니 손목에 걸리는 무게가 달라졌다. 덜어낸다는 건 가끔 포기라기보다, 내일의 나를 조금 편하게 해주는 일이었다.`,
        ], `I reduced the weight of my bag.`),
        manualStory([
          `푸딩 가게 쇼케이스 앞에서 정민이는 바닐라와 말차 사이에 갇혔다. 바닐라는 부드러워 보였고, 말차는 색이 너무 예뻤다.`,
          `그녀는 두 컵을 나란히 바라봤다. 가격, 크기, 위에 올라간 크림, 컵 모양까지 하나씩 따져봤지만 마음은 더 복잡해졌다.`,
          `"이건 공정하게 볼 수가 없네." 정민이는 결국 웃어버렸다. 둘을 옆에 세워놓고 차이를 보려 했는데, 둘 다 너무 자기 방식으로 귀여웠다.`,
        ], `I can't compare these two puddings fairly.`),
        manualStory([
          `소품샵 진열대에는 고양이 키링이 열두 개나 걸려 있었다. 표정도 조금씩 달랐고, 꼬리 모양도 달랐다. 정민이는 손을 뻗었다가 다시 멈췄다.`,
          `가장 동그란 아이는 왼쪽 아래에 있었다. 눈이 살짝 삐뚤어져 있었는데, 그게 오히려 마음에 들었다. 그녀는 다른 것들도 다 봤지만 자꾸 그쪽으로 돌아왔다.`,
          `"너다." 정민이는 조심스럽게 키링 하나를 집었다. 여러 후보 중 하나가 손끝에서 딱 정해지는 순간이었다.`,
        ], `I will select the roundest cat key ring.`),
        manualStory([
          `작은 머그컵은 가격표가 조금 비쌌다. 정민이는 컵을 들었다가 내려놓고, 다시 들었다. 손잡이가 토끼 귀처럼 생긴 게 문제였다. 너무 귀여웠다.`,
          `가게 안에서는 조용한 음악이 흐르고, 점원은 포장지를 접고 있었다. 정민이는 지갑을 열기 전 마지막으로 컵 안쪽 그림을 확인했다.`,
          `"이거 살게요." 말하고 나니 오히려 마음이 편해졌다. 돈을 내고 자기 물건으로 데려오는 공식적인 순간이, 작은 쇼핑백 소리와 함께 완성됐다.`,
        ], `I want to purchase this mug, please.`),
        manualStory([
          `딸기 케이크는 마지막 쇼케이스 칸에서 반짝이고 있었다. 정민이는 번호표를 들고 순서를 기다렸다. 앞사람이 초코 케이크를 골라서 속으로 조용히 안도했다.`,
          `직원이 "다음 분" 하고 부르자 정민이는 한 걸음 앞으로 갔다. 메뉴 이름을 말하기 전부터 입꼬리가 올라갔다.`,
          `"딸기 케이크 한 조각이랑 아이스라떼 하나요." 원하는 것을 가게에 말하는 순간, 아직 손에 없던 달콤함이 벌써 자기 쪽으로 오기 시작했다.`,
        ], `Can I order one slice of strawberry cake?`),
        manualStory([
          `귀여운 파자마는 사진보다 조금 컸다. 정민이는 호텔 거울 앞에서 소매를 내려다봤다. 손등을 거의 덮는 길이였다. 색은 예뻤지만 입고 자기엔 불편할 것 같았다.`,
          `그녀는 영수증과 포장지를 챙겨 다시 매장으로 갔다. 직원은 상태를 확인하고 고개를 끄덕였다. 정민이는 괜히 미안한 표정을 지었다.`,
          `"사이즈가 안 맞아서요. 돈으로 돌려받을 수 있을까요?" 냈던 돈이 다시 돌아오는 절차는 조금 번거로웠지만, 마음에 맞지 않는 물건을 계속 붙잡는 것보다는 나았다.`,
        ], `Could I get a refund for this pajama set?`),
        manualStory([
          `정민이는 양말 세트 앞에서 멈췄다. 딸기, 체리, 작은 리본 무늬가 한 줄로 놓여 있었다. 귀여웠지만 가격이 살짝 애매했다.`,
          `그때 계산대 옆에 빨간 스티커가 보였다. 오늘만 적용되는 쿠폰이었다. 정민이는 휴대폰 쿠폰함을 열어 화면을 직원에게 보여주었다.`,
          `"이거 쓰면 가격이 내려가나요?" 원래 있던 숫자가 조금 낮아지는 순간, 양말 세트는 갑자기 더 사랑스러운 물건이 되었다.`,
        ], `Does this coupon give me a discount?`),
        manualStory([
          `푸딩을 먹고 나온 뒤에도 정민이는 종이 영수증을 버리지 못했다. 작게 접힌 종이에는 시간, 가게 이름, 딸기 푸딩 하나가 얌전히 찍혀 있었다.`,
          `다이어리 사이에 끼워두려다가, 혹시 잃어버릴까 봐 이메일로도 받고 싶어졌다. 그녀는 계산대로 돌아가 조심스럽게 말했다.`,
          `"혹시 영수증을 메일로도 보내주실 수 있을까요?" 산 내역을 증명하는 작은 기록이 종이와 화면 두 군데에 남자, 하루가 조금 더 단단하게 보관되는 느낌이었다.`,
        ], `Please send the receipt to my email.`),
        manualStory([
          `숙소 예약 메일 아래에는 금액이 여러 줄로 나뉘어 있었다. 객실 요금, 세금, 서비스 비용. 정민이는 총액은 알겠는데, 정리된 문서가 하나 더 필요했다.`,
          `여행 경비를 나중에 적으려면 깔끔한 금액표가 있어야 했다. 그녀는 프런트 데스크에 내려가 예약자 이름을 말했다.`,
          `"방 요금 내역서를 메일로 받을 수 있을까요?" 직원은 바로 확인해주겠다고 했다. 공식적인 금액표가 도착하면, 흐릿한 숫자들이 하나의 문서로 정리될 터였다.`,
        ], `Could you send me the invoice for the room?`),
        manualStory([
          `비 오는 밤, 정민이는 호텔 침대 위에서 야식 앱을 열었다. 라멘은 먹고 싶고 밖은 나가기 싫었다. 화면 속 가게들은 너무 유혹적이었다.`,
          `문제는 마지막 결제 화면이었다. 음식값 아래에 작은 추가 금액이 붙어 있었다. 어떤 가게는 있고, 어떤 가게는 없었다. 정민이는 눈을 가늘게 뜨고 비교했다.`,
          `"여기는 배달비 있어?" 친구가 묻자 정민이가 화면을 보여줬다. 서비스에 붙는 작은 비용 하나가 야식 후보를 조용히 갈라놓고 있었다.`,
        ], `Is there a delivery fee?`),
        manualStory([
          `정민이는 여행 지갑 계획을 다이어리 한쪽에 적었다. 카페, 소품샵, 교통비, 야식. 귀여운 스티커를 붙였지만 숫자는 꽤 진지했다.`,
          `가고 싶은 곳이 많을수록 돈도 같이 움직였다. 그녀는 딸기 케이크 옆에 작은 별을 그렸다가, 가격을 보고 별을 하나 지웠다.`,
          `"오늘은 여기 안에서 놀자." 정민이는 펜으로 동그라미를 쳤다. 쓸 수 있는 한도를 정하자 오히려 선택이 더 선명해졌다.`,
        ], `I need to stay within my travel budget.`),
        manualStory([
          `레이오버 중 택시를 탄 뒤 정민이는 바로 영수증 사진을 찍었다. 창밖 풍경이 예뻐서 멍하니 있고 싶었지만, 이런 건 나중에 꼭 헷갈렸다.`,
          `휴대폰 앨범에는 음식 사진 사이로 영수증이 끼어 있었다. 딸기 타르트, 골목 사진, 택시 금액. 여행의 즐거움과 기록할 돈이 이상하게 한 줄에 섞였다.`,
          `"이건 나중에 적어야 돼." 정민이는 사진에 별표를 눌렀다. 일 때문에 쓰거나 남겨야 하는 금액은 그냥 지나가면 안 되는 작은 흔적이었다.`,
        ], `I saved the taxi expense in my phone.`),
        manualStory([
          `케이크와 음료를 고른 뒤 정민이는 계산대 앞에서 멈췄다. 메뉴판에서 본 가격보다 화면의 숫자가 조금 더 컸다. 세금이 붙은 총액이었다.`,
          `그녀는 지갑을 열면서도 다시 한번 화면을 봤다. 케이크 하나, 라떼 하나, 그리고 작은 추가 금액. 달콤한 선택에도 정확한 숫자는 따라왔다.`,
          `"세금까지 하면 전부 얼마예요?" 점원이 화면을 돌려 보여주었다. 무언가를 얻기 위해 들어가는 전체 무게가 숫자로 조용히 드러났다.`,
        ], `What is the total cost with tax?`),
        manualStory([
          `디저트 가게 앞 줄은 느리게 줄어들었다. 정민이 앞에 선 손님은 쇼케이스를 오래 바라보다가 마지막 타르트를 가리켰다.`,
          `정민이는 속으로 아주 작게 아쉬워했다. 방금까지 자기 마음속에 있던 타르트가, 앞사람의 접시 위로 옮겨가는 장면을 봐버렸다.`,
          `"저분이 마지막 거 가져가셨네." 친구가 속삭였다. 물건을 사는 사람 하나가 줄 전체의 운명을 바꿀 때가 있었다.`,
        ], `The customer in front of me took the last tart.`),
        manualStory([
          `호텔 예약 메일에는 이름이 영어로 적혀 있었다. 그런데 한 글자가 묘하게 어색해 보였다. 정민이는 여권 이름과 메일을 번갈아 봤다.`,
          `프런트 직원은 차분하게 예약 화면을 열었다. 뒤에는 캐리어를 끄는 사람들이 지나갔고, 로비의 시계는 작게 초침 소리를 냈다.`,
          `"예약자 이름을 한 번만 확인해주실 수 있을까요?" 업무상 서비스를 받는 상대의 이름이 정확해야, 방 하나도 안전하게 자기 것이 될 수 있었다.`,
        ], `Could you check the client name on the reservation?`),
        manualStory([
          `카페 직원은 메뉴 설명을 정말 천천히 해주었다. 정민이가 일본어 메뉴 앞에서 멈칫하자, 그는 사진을 가리키며 하나씩 알려주었다.`,
          `딸기 크림은 오늘만 있고, 말차 케이크는 조금 쌉싸름하고, 포장은 10분 정도 걸린다고 했다. 정민이는 고개를 끄덕이며 계속 웃었다.`,
          `"친절하시다." 가게 밖으로 나오며 정민이가 말했다. 그곳에서 일하는 한 사람이 하루의 인상을 이렇게 부드럽게 바꿔놓을 수도 있었다.`,
        ], `That employee explained everything so kindly.`),
        manualStory([
          `품절이라고 적힌 작은 팻말 앞에서 정민이는 쉽게 떠나지 못했다. 사진으로 봤던 딸기 케이크가 너무 예뻤기 때문이다.`,
          `직원은 미안하다는 표정을 지었다가, 뒤쪽 주방을 한 번 바라봤다. "혹시 하나 남았는지 확인해볼게요." 정민이는 괜히 두 손을 모았다.`,
          `앞치마를 단정히 입은 책임자가 나와 냉장고 안쪽을 살폈다. 누가 전체 상황을 조율해주는 순간, 작은 기대가 다시 조용히 살아났다.`,
        ], `Could the manager check if one is left?`),
        manualStory([
          `호텔 조식당은 사람이 많았지만 이상하게 차분했다. 접시 부딪히는 소리와 커피 머신 소리가 낮게 섞였다. 정민이는 창가 자리가 있는지 둘러봤다.`,
          `직원 한 명이 다가와 미소를 지었다. 곧 다른 직원이 테이블을 닦고, 또 다른 직원이 물컵을 놓았다. 여러 사람이 한 공간을 부드럽게 움직이고 있었다.`,
          `"창가 쪽으로 안내해드릴게요." 그 한마디에 정민이는 아침이 조금 더 좋아질 거라고 느꼈다. 한 장소에서 일하는 사람들의 호흡이 그대로 보였다.`,
        ], `The hotel staff found me a quiet table.`),
        manualStory([
          `승무원 지원 페이지에는 제출해야 할 것들이 줄줄이 적혀 있었다. 사진, 연락처, 자기소개서, 경력란. 정민이는 화면을 내려보다가 숨을 고쳤다.`,
          `아직 합격도 아닌데, 이름을 올리는 순간부터 마음이 달라졌다. 자기 자신이 어떤 기회 앞에 줄을 서는 사람처럼 느껴졌다.`,
          `"사진도 올려야 하네." 정민이는 증명사진 파일을 찾았다. 기회에 손을 든 사람이라면, 빈칸 하나도 그냥 넘길 수 없었다.`,
        ], `Every applicant has to upload a photo.`),
        manualStory([
          `채용 공고의 한 줄이 정민이의 눈을 붙잡았다. cabin crew. 그녀는 화면을 조금 더 가까이 당겼다. 근무지, 조건, 필요한 역량이 차례로 이어졌다.`,
          `그냥 구경하려고 열어본 공고였는데, 읽을수록 마음이 조용히 앞으로 기울었다. 그 역할 안에 들어간 자기 모습을 아주 잠깐 상상했다.`,
          `"이건 해보고 싶다." 정민이는 별표를 눌렀다. 일자리나 역할의 빈자리 하나가 갑자기 자기 이름을 기다리는 것처럼 보였다.`,
        ], `I want to apply for this cabin crew position.`),
        manualStory([
          `면접 전날 밤, 정민이는 블라우스를 의자 등받이에 걸어두었다. 작은 향수를 한 번 뿌리고, 구두 앞코를 휴지로 닦았다.`,
          `침대에 누웠지만 잠이 바로 오지 않았다. 어떤 질문이 나올까. 목소리는 떨리지 않을까. 자기소개 첫 문장을 속으로 몇 번이나 다시 말했다.`,
          `"내일 아침이네." 그녀는 천장을 보며 중얼거렸다. 누군가를 만나 질문을 받고, 자기 마음과 준비를 보여줘야 하는 시간이 코앞에 와 있었다.`,
        ], `My interview is tomorrow morning.`),
        manualStory([
          `교육 첫날, 정민이는 새 노트 첫 장을 펼쳤다. 종이가 너무 깨끗해서 첫 글자를 쓰기가 살짝 아까웠다.`,
          `강사는 서비스 톤과 안전 안내 순서를 설명했다. 정민이는 중요한 부분마다 동그라미를 치고, 옆에는 작은 별을 그렸다.`,
          `"시작 시간이 9시 맞죠?" 그녀가 옆자리 동기에게 물었다. 일을 잘하기 위해 배우고 연습하는 시간이, 깨끗한 첫 장 위에서 천천히 시작되고 있었다.`,
        ], `The training starts at nine, right?`),
        manualStory([
          `첫 실습에서 정민이는 물컵을 조금 늦게 건넸다. 아무도 크게 뭐라고 하지 않았지만, 그녀는 그 장면을 계속 떠올렸다.`,
          `쉬는 시간에 초콜릿을 하나 먹으면서도 손의 순서를 다시 생각했다. 다음번엔 컵을 먼저 놓고, 말은 조금 더 낮게 해야겠다.`,
          `"이것도 지나면 남겠지." 정민이는 노트 귀퉁이에 작게 적었다. 해본 뒤 몸에 남는 기억은 부끄러움까지도 나중의 힘이 될 수 있었다.`,
        ], `I think this little mistake will become experience.`),
        manualStory([
          `카페에서 한 손님이 주문을 잘못 받았다고 목소리를 높였다. 정민이는 옆에서 그 장면을 보며 숨을 죽였다.`,
          `직원은 바로 변명하지 않았다. 먼저 끝까지 듣고, 주문서를 확인하고, 차분하게 다시 말했다. 이상하게 그게 제일 어려운 일처럼 보였다.`,
          `"잘 듣는 것도 능력이구나." 정민이는 작게 생각했다. 무언가를 잘 해내는 힘은 손이 빠른 것만이 아니라, 마음을 흔들리지 않게 두는 데서도 나왔다.`,
        ], `Listening calmly is a real skill.`),
        manualStory([
          `교육장 테이블 위에 체크리스트가 하나 놓였다. 오늘 정민이가 맡은 것은 실습 도구 확인이었다. 컵, 안내 카드, 펜, 이름표.`,
          `누가 시킨 작은 일이라고 생각하면 빨리 끝낼 수 있었지만, 빠뜨리면 다음 사람이 곤란해질 것 같았다. 그녀는 하나씩 손으로 짚었다.`,
          `"이건 내가 볼게." 정민이가 말했다. 자기에게 온 일을 끝까지 챙겨야 한다는 감각이, 얇은 종이 한 장보다 묵직하게 느껴졌다.`,
        ], `I am responsible for this checklist today.`),
        manualStory([
          `체크인 카운터 앞에서 정민이는 여권을 꺼내려다 잠깐 멈췄다. 가방 안쪽 지퍼가 잘 열리지 않았다. 뒤에는 사람이 두 명 더 서 있었다.`,
          `직원은 친절했지만 화면은 기다려주지 않는 것처럼 보였다. 필요한 것은 분명했다. 그 한 가지가 없으면 다음 단계로 넘어갈 수 없었다.`,
          `"잠시만요, 여기 있어요." 정민이는 여권을 꺼내며 안도의 숨을 쉬었다. 반드시 있어야 하는 물건은 작아도 상황 전체를 붙잡고 있었다.`,
        ], `A passport is required for check-in.`),
        manualStory([
          `역 앞 호텔은 정말 가까웠다. 정민이는 캐리어를 끌고 횡단보도 하나만 건넜다. 바퀴가 보도블록 사이에 걸릴 틈도 거의 없었다.`,
          `로비에 들어오자마자 그녀는 속으로 생각했다. 이번 선택은 성공이다. 비 오는 날이었으면 더 크게 느꼈을 것이다.`,
          `"여기 잡길 잘했다." 정민이는 엘리베이터 거울에 비친 자기 얼굴을 보고 웃었다. 쓰기 쉽고 이동하기 편한 장소는 피로를 먼저 덜어주었다.`,
        ], `This hotel is really convenient for the station.`),
        manualStory([
          `정민이는 지도 위에 소품샵, 카페, 약국을 차례로 찍었다. 처음에는 길이 엉켜 보였는데, 순서를 바꾸자 선이 깔끔해졌다.`,
          `먼저 약국, 그다음 카페, 마지막으로 소품샵. 돌아가는 길 없이 한 방향으로 걸을 수 있었다. 그녀는 화면을 보며 고개를 끄덕였다.`,
          `"이게 훨씬 낫다." 시간과 힘을 덜 쓰면서 더 많이 볼 수 있는 길. 정민이는 그런 동선을 찾으면 이상하게 게임을 이긴 기분이 들었다.`,
        ], `This route is much more efficient.`),
        manualStory([
          `낯선 골목에서 정민이는 잠깐 방향을 잃었다. 간판은 비슷비슷했고, 지도 속 파란 점은 자꾸 좁은 길 사이에서 흔들렸다.`,
          `그래도 늘 쓰던 지도 앱은 조금 기다리자 정확히 방향을 잡았다. 오른쪽 작은 다리, 그다음 왼쪽 골목. 화면의 선은 흔들리지 않았다.`,
          `"믿고 가볼까." 정민이는 휴대폰을 손에 쥐고 걸었다. 기대어도 되는 정보가 있다는 건 낯선 도시에서 생각보다 큰 안심이었다.`,
        ], `This map app is surprisingly reliable.`),
        manualStory([
          `카페 창가 자리에서 정민이는 푸딩 사진을 찍었다. 처음엔 숟가락 그림자가 이상했고, 두 번째는 컵 뒤에 사람이 지나갔다.`,
          `세 번째 사진에서 딸기 크림이 조명 아래 예쁘게 반짝였다. 배경의 나무 테이블도 따뜻하게 나왔다. 정민이는 화면을 보고 작게 웃었다.`,
          `"드디어 됐다." 원하던 결과가 손 안에 딱 들어온 순간이었다. 사진 하나가 잘 나왔을 뿐인데, 하루 전체가 조금 더 반듯하게 기억될 것 같았다.`,
        ], `The photo finally looks successful.`),
        manualStory([
          `관광객이 많은 거리를 지나자 조용한 빵집이 나왔다. 간판은 작았고, 안에는 동네 사람들이 자연스럽게 줄을 서 있었다.`,
          `정민이는 유리창 너머로 빵이 나오는 걸 보았다. 메뉴 이름을 다 읽지는 못했지만, 이 동네의 아침 냄새가 저 안에 있는 것 같았다.`,
          `"여기 들어가 보자." 유명한 곳보다 그 지역에 속한 작은 가게가 더 궁금한 날이었다.`,
        ], `I want to try the local bakery.`),
        manualStory([
          `호텔 방에 들어오자마자 정민이는 밴드가 필요하다는 걸 깨달았다. 새 구두 때문에 뒤꿈치가 살짝 까져 있었다.`,
          `밖으로 멀리 나가기는 싫었다. 그녀는 지도 앱을 열고 주변을 확대했다. 다행히 모퉁이 하나만 돌면 약국 표시가 있었다.`,
          `"가깝다. 살았다." 멀지 않은 곳에 필요한 장소가 있다는 사실만으로도, 아픈 발끝이 조금 덜 억울해졌다.`,
        ], `Is there a pharmacy nearby?`),
        manualStory([
          `크림빵 가게 앞 줄은 골목 밖까지 이어져 있었다. 정민이는 처음엔 그냥 지나가려 했지만, 사람들이 들고 나오는 봉투 냄새가 너무 좋았다.`,
          `앞사람은 세 박스를 샀고, 뒤에 선 학생들은 메뉴 이름을 외우듯 말하고 있었다. 많은 사람이 좋아하는 데는 이유가 있을 것 같았다.`,
          `"저기 유명한가 봐." 정민이는 줄 끝에 섰다. 기다림이 길수록 기대도 같이 부풀었다.`,
        ], `That place must be popular.`),
        manualStory([
          `빵집 안쪽에서 막 나온 롤빵이 철판째 나왔다. 직원이 장갑을 끼고 조심스럽게 진열대에 올렸다. 유리창에 김이 아주 얇게 맺혔다.`,
          `정민이는 방금까지 다른 빵을 고르려 했는데, 따뜻한 냄새를 맡자 생각이 바뀌었다. 새로 나온 것에는 설명하기 어려운 생기가 있었다.`,
          `"저거 하나 주세요." 봉투를 받아 든 손바닥이 살짝 따뜻해졌다. 갓 준비된 음식은 손끝부터 기분을 바꿔놓았다.`,
        ], `These rolls are still fresh.`),
        manualStory([
          `딸기 푸딩 첫 숟가락은 생각보다 조용하게 대단했다. 정민이는 숟가락을 입에 넣고 눈을 조금 크게 떴다.`,
          `크림은 부드럽고, 아래쪽 딸기 소스는 살짝 새콤했다. 하루 종일 걸어서 피곤했던 마음이 컵 안으로 천천히 녹아드는 것 같았다.`,
          `"와... 이건 진짜다." 먹는 순간 기분이 좋아지는 맛은 설명보다 표정이 먼저 나왔다.`,
        ], `This pudding is ridiculously delicious.`),
        manualStory([
          `호텔 침대는 보기보다 훨씬 폭신했다. 정민이는 씻고 나와 머리도 다 말리지 않은 채 침대 위에 누웠다.`,
          `발끝에서 힘이 빠지고, 어깨가 천천히 내려갔다. 하루 종일 들고 다닌 가방의 무게가 이제야 몸에서 떨어져 나가는 것 같았다.`,
          `"여기 좋다..." 몸과 마음이 덜 불편한 상태는 거창한 행복보다 조용했고, 그래서 더 오래 남았다.`,
        ], `This bed is so comfortable.`),
        manualStory([
          `욕실 타일은 반짝였고, 수건은 네모나게 접혀 있었다. 정민이는 문을 열자마자 괜히 안심했다.`,
          `긴 여행 뒤에는 작은 찝찝함도 크게 느껴졌다. 그런데 세면대에는 물자국 하나 없고, 거울도 맑았다.`,
          `"아, 여기 괜찮다." 먼지나 불쾌한 흔적 없이 정돈된 공간은 말없이 사람을 쉬게 했다.`,
        ], `The room is clean, and I can finally breathe.`),
        manualStory([
          `아침 골목 카페에는 손님이 거의 없었다. 의자가 바닥에 끌리는 소리도, 커피 내리는 소리도 작게 들렸다.`,
          `정민이는 창가에 앉아 라떼 잔을 두 손으로 감쌌다. 밖에서는 가게 셔터가 하나씩 올라가고 있었다.`,
          `"이 시간 좋다." 소리가 적은 공간에서는 생각도 조금 더 천천히 움직였다.`,
        ], `It is quiet here in the morning.`),
        manualStory([
          `점심시간 카페는 주문 벨 소리로 가득했다. 직원들은 컵을 들고 빠르게 움직였고, 사람들은 메뉴판 앞에서 서둘러 고개를 들었다.`,
          `정민이는 줄 한가운데에서 메뉴를 빨리 골라야 했다. 뒤에서 누군가 지갑을 여는 소리가 들리자 마음이 조금 급해졌다.`,
          `"여긴 지금 너무 정신없다." 사람과 일이 한꺼번에 움직이는 시간에는, 딸기 밀크티 하나 고르는 것도 작은 미션이 됐다.`,
        ], `The cafe is too busy right now.`),
        manualStory([
          `조식당이 열리기 10분 전, 정민이는 이미 엘리베이터 앞에 서 있었다. 머리는 아직 살짝 덜 말랐지만, 빵 냄새를 먼저 맡고 싶었다.`,
          `문이 열리자 직원들이 마지막으로 접시를 맞추고 있었다. 갓 나온 크루아상은 아직 아무도 손대지 않았다.`,
          `"첫 빵은 내가 먹어야지." 정해진 시간보다 조금 앞서 도착한 덕분에, 하루의 첫 장면을 가장 깨끗하게 받을 수 있었다.`,
        ], `I came early because I wanted the first batch.`),
        manualStory([
          `정민이는 소품샵 마감 5분 전에 도착했다. 숨이 조금 찼고, 앞머리는 바람에 헝클어져 있었다.`,
          `문 앞 직원이 닫을 준비를 하고 있었다. 정민이는 양손을 모으고 미안한 표정을 지었다. "정말 금방 볼게요."`,
          `마지막 손님처럼 들어간 가게 안은 조용했다. 정해진 시간보다 뒤에 온 마음은 괜히 더 조심스러웠다.`,
        ], `I am sorry I am late.`),
        manualStory([
          `쇼케이스 안에는 케이크가 딱 한 조각 남아 있었다. 딸기 크림 위에 작은 금박이 얹혀 있었다.`,
          `정민이는 다른 사람이 들어오기 전에 주문해야 할 것 같아 마음이 급해졌다. 끝이라는 느낌은 늘 선택을 빠르게 만들었다.`,
          `"이게 마지막 조각인가요?" 직원이 고개를 끄덕였다. 더 뒤가 없는 자리에서는 작은 케이크도 이상하게 소중해졌다.`,
        ], `Is this the final piece?`),
        manualStory([
          `정민이는 침대에 누워 디저트 가게 후기를 찾아봤다. 오래된 사진들 사이에 어제 올라온 글 하나가 있었다.`,
          `딸기 타르트가 새로 나왔고, 크림이 가볍다는 내용이었다. 지금과 가까운 시간에 남겨진 말이라 그런지 더 믿고 싶어졌다.`,
          `"내일 여기 가야겠다." 오래전 평점보다 방금 지나간 사람의 기록이 더 뜨겁게 느껴지는 밤이었다.`,
        ], `I saw a recent review about this tart.`),
        manualStory([
          `교통카드 충전기 앞에서 정민이는 잠깐 멈췄다. 화면에는 선택지가 많았고, 뒤에도 여행자들이 비슷한 얼굴로 서 있었다.`,
          `옆 안내판에는 자주 묻는 내용이 그림으로 정리되어 있었다. 정민이는 그걸 보고 웃었다. 나만 헷갈린 게 아니구나.`,
          `"이거 다들 물어보는 거였네." 많은 사람에게 반복되는 문제는 혼자만의 실수가 아니라, 그 장소의 익숙한 풍경이기도 했다.`,
        ], `Is this a common question?`),
        manualStory([
          `한정판 컵에는 작은 리본이 묶여 있었다. 그냥 컵이었다면 지나쳤을지도 모르는데, 그 리본 하나 때문에 정민이는 발을 멈췄다.`,
          `직원은 오늘만 판매하는 색이라고 했다. 정민이는 컵을 들고 빛에 비춰봤다. 평범한 물건이 갑자기 따로 챙겨진 것처럼 보였다.`,
          `"이 리본 때문에 못 지나가겠어요." 보통과 다른 작은 표시가 마음을 붙잡을 때가 있었다.`,
        ], `This ribbon makes it feel special.`),
        manualStory([
          `장바구니 안에는 토끼 접시 하나가 들어 있었다. 정민이는 다른 물건을 보면서도 자꾸 그 접시를 확인했다.`,
          `목록 속 물건 하나일 뿐인데, 이미 자기 집 식탁에 놓인 모습까지 상상했다. 너무 작고 귀여워서 빼기가 어려웠다.`,
          `"이건 꼭 살래." 많은 물건 사이에서 하나가 또렷하게 자기 얼굴을 갖는 순간이었다.`,
        ], `I want this item, the tiny rabbit plate.`),
        manualStory([
          `진열대 가운데 새 컵들이 놓여 있었다. 색 이름은 밀크핑크, 바닐라옐로, 스카이블루였다. 정민이는 이름만 보고도 웃었다.`,
          `직원은 오늘 들어온 물건이라고 했다. 아직 먼지도 타지 않은 듯 반짝이는 표면이, 막 세상에 나온 물건처럼 보였다.`,
          `"이거 새로 나온 거예요?" 팔기 위해 완성되어 놓인 물건 하나가 정민이의 손끝을 계속 부르고 있었다.`,
        ], `Is this product new?`),
        manualStory([
          `호텔 직원은 길 안내를 해주면서 우산까지 챙겨주었다. 정민이는 비가 오는 줄도 모르고 나가려던 참이었다.`,
          `지도에 표시를 해주고, 버스 번호를 적어주고, 마지막에는 "길 미끄러우니 조심하세요"라고 말했다. 그 말이 이상하게 오래 남았다.`,
          `"덕분에 오늘 기분이 좋아졌어요." 사람에게 제공되는 도움은 때때로 목적지보다 더 선명하게 기억됐다.`,
        ], `Your service made my whole day better.`),
        manualStory([
          `버스 정류장 안내판은 글자가 작고 노선이 많았다. 정민이는 목적지를 찾다가 눈이 조금 피곤해졌다.`,
          `옆에 있던 직원에게 물어보니, 그는 몇 번 버스를 타야 하는지와 내릴 곳을 천천히 알려주었다. 정민이는 휴대폰 메모장을 열었다.`,
          `"버스 정보 조금만 더 알려주실 수 있을까요?" 움직이기 전에 필요한 내용이 손에 들어오자, 낯선 도시가 조금 덜 낯설어졌다.`,
        ], `Could you give me more information about the bus?`),
        manualStory([
          `메뉴 아래에는 작은 글씨가 있었다. 딸기 소스에는 견과류가 들어갈 수 있다는 표시였다. 대부분은 그냥 지나칠 만큼 작은 문장이었다.`,
          `정민이는 그 줄을 보고 주문을 잠깐 멈췄다. 사소해 보였지만 누군가에게는 아주 중요한 차이일 수 있었다.`,
          `"여기 작은 설명도 봐야겠네." 큰 사진 뒤에 숨어 있는 구체적인 부분이 선택을 바꾸기도 했다.`,
        ], `I noticed one tiny detail on the menu.`),
        manualStory([
          `정민이는 여권 사본, 예약 확인서, 지원서 출력본을 투명 폴더에 넣었다. 종이가 서로 밀리지 않게 손끝으로 모서리를 맞췄다.`,
          `겉으로는 그냥 종이 몇 장이지만, 없으면 문 앞에서 멈출 수도 있는 것들이었다. 그녀는 폴더를 가방 안쪽에 넣고 지퍼를 닫았다.`,
          `"다 여기 넣어뒀어." 공식적으로 쓰이는 종이들이 한곳에 모이자, 마음도 조금 더 준비된 사람처럼 단단해졌다.`,
        ], `I put every document in this folder.`),
        manualStory([
          `지원서 화면에는 빈칸이 생각보다 많았다. 이름, 생년월일, 연락처, 주소, 경력. 정민이는 한 칸씩 채우다가 주소 칸에서 멈췄다.`,
          `영어 주소를 어떻게 적어야 하는지 헷갈렸다. 그녀는 안내 데스크에 가서 휴대폰 화면을 조심스럽게 보여주었다.`,
          `"이 양식 작성하는 것 좀 도와주실 수 있을까요?" 정해진 칸에 정보를 넣는 일은 단순해 보여도, 틀리지 않으려면 꽤 집중이 필요했다.`,
        ], `Could you help me fill out this form?`),
        manualStory([
          `파자마를 사기 전, 정민이는 교환 안내문을 읽었다. 세일 상품은 환불이 안 될 수도 있다는 문장이 작게 적혀 있었다.`,
          `색이 너무 예뻐서 바로 사고 싶었지만, 사이즈가 애매했다. 그녀는 안내문을 다시 읽고 직원에게 확인했다.`,
          `"환불 규정이 어떻게 되나요?" 어떤 상황에서 무엇이 가능한지 정해둔 기준은, 귀여운 물건 앞에서도 꽤 중요했다.`,
        ], `What is the refund policy?`),
        manualStory([
          `카페 문 앞에는 작은 종이가 붙어 있었다. 오늘은 오후 6시에 닫습니다. 글씨는 검은 펜으로 또박또박 적혀 있었다.`,
          `정민이는 문 앞에서 멈췄다. 평소처럼 늦게 왔다면 못 들어갈 뻔했다. 종이 한 장이 하루의 순서를 바꾸었다.`,
          `"이 안내문 못 봤으면 큰일 날 뻔했네." 사람들이 보도록 남겨진 알림은 조용하지만 분명하게 길을 바꿔놓았다.`,
        ], `There is a notice on the door.`),
        manualStory([
          `친구가 추천한 카페는 지도에서 잘 보이지 않았다. 이름을 검색해도 비슷한 곳이 여러 개 나왔다. 정민이는 채팅창을 열었다.`,
          `잠시 뒤 분홍 핀이 찍힌 지도가 도착했다. 골목 안쪽, 작은 다리 근처, 2층. 갑자기 흐릿하던 장소가 정확한 점 하나로 바뀌었다.`,
          `"위치 보내줘서 살았다." 어떤 장소가 있는 정확한 자리를 아는 것만으로도 발걸음은 훨씬 덜 헤맸다.`,
        ], `Could you send me the location?`),
        manualStory([
          `택시 앱에는 호텔 주소를 넣어야 했다. 정민이는 예약 메일을 열었지만, 영어와 숫자가 길게 이어져 있어서 눈이 살짝 피곤했다.`,
          `복사 버튼을 찾는 동안 기사님은 조용히 기다렸다. 정민이는 괜히 미안해져서 더 빨리 손가락을 움직였다.`,
          `"호텔 주소 복사해도 될까요?" 장소를 찾아갈 수 있게 적힌 정보 하나가, 낯선 밤의 방향을 정해주었다.`,
        ], `Can I copy the hotel address?`),
        manualStory([
          `지도 앱은 왼쪽으로 가라고 했지만, 골목은 두 갈래였다. 하나는 조명이 밝고, 하나는 작은 다리 아래로 이어졌다.`,
          `정민이는 잠깐 멈춰 화면을 돌려봤다. 파란 점이 천천히 방향을 잡았다. 뒤에서 자전거가 지나가며 작은 종을 울렸다.`,
          `"여기서 어느 쪽으로 가야 해요?" 어디로 움직여야 하는지 알게 되는 순간, 길은 갑자기 덜 복잡해졌다.`,
        ], `Which direction should I go from here?`),
        manualStory([
          `카페 간판은 보이지 않았고, 작은 나무문만 있었다. 정민이는 주소를 다시 확인했다. 분명 이 건물이었다.`,
          `문 옆에는 아주 작은 스티커가 붙어 있었다. 컵 그림과 화살표. 그녀는 손잡이를 잡았다가, 혹시 직원용 문이면 어쩌나 싶어 멈췄다.`,
          `"여기가 카페 들어가는 곳 맞나요?" 안으로 들어가는 시작 지점은 작아도, 찾고 나면 여행의 다음 장면이 열렸다.`,
        ], `Is this the entrance to the cafe?`),
        manualStory([

      const topProgress = document.querySelector("#topProgress");
      const progressText = document.querySelector("#progressText");
      const progressFill = document.querySelector("#progressFill");
      const resumeText = document.querySelector("#resumeText");
      const completedText = document.querySelector("#completedText");
      const dayLabel = document.querySelector("#dayLabel");
      const routeFrom = document.querySelector("#routeFrom");
      const routeTo = document.querySelector("#routeTo");
      const episodeTitle = document.querySelector("#episodeTitle");
      const sceneText = document.querySelector("#sceneText");
      const sentenceText = document.querySelector("#sentenceText");
      const sentenceButton = document.querySelector("#sentenceButton");
      const speakButton = document.querySelector("#speakButton");
      const speakLabel = document.querySelector("#speakLabel");
      const revealButton = document.querySelector("#revealButton");
      const revealPanel = document.querySelector("#revealPanel");
      const wordText = document.querySelector("#wordText");
      const koreanText = document.querySelector("#koreanText");
      const feelingText = document.querySelector("#feelingText");
      const phraseList = document.querySelector("#phraseList");
      const prevButton = document.querySelector("#prevButton");
      const nextButton = document.querySelector("#nextButton");
      const wordCount = document.querySelector("#wordCount");
      const speechApi = "speechSynthesis" in window ? window.speechSynthesis : null;
      let speechVoices = [];
      let isSpeaking = false;

      function refreshVoices() {
        speechVoices = speechApi ? speechApi.getVoices() : [];
      }

      function pickEnglishVoice() {
        refreshVoices();
        const englishVoices = speechVoices.filter((voice) => /^en([-_]|$)/i.test(voice.lang));
        const preferredVoice = englishVoices.find((voice) =>
          /samantha|ava|jenny|aria|natural|google us english|microsoft/i.test(voice.name),
        );

        return preferredVoice || englishVoices.find((voice) => /en-US/i.test(voice.lang)) || englishVoices[0] || null;
      }

      function stopSpeech(shouldRender = true) {
        if (speechApi) {
          speechApi.cancel();
        }

        isSpeaking = false;
        if (shouldRender) {
          render();
        }
      }

      function speakFinalLine() {
        if (!speechApi) {
          return;
        }

        if (isSpeaking) {
          stopSpeech();
          return;
        }

        state.sentenceShown = true;
        speechApi.cancel();

        const utterance = new SpeechSynthesisUtterance(episodes[state.index].sentence);
        const voice = pickEnglishVoice();
        utterance.lang = voice?.lang || "en-US";
        utterance.rate = 0.86;
        utterance.pitch = 1.02;
        if (voice) {
          utterance.voice = voice;
        }

        utterance.onend = () => {
          isSpeaking = false;
          render();
        };
        utterance.onerror = () => {
          isSpeaking = false;
          render();
        };

        isSpeaking = true;
        render();
        speechApi.speak(utterance);
      }

      if (speechApi) {
        refreshVoices();
        speechApi.onvoiceschanged = refreshVoices;
      }

      function moveToStoryTop() {
        requestAnimationFrame(() => {
          document.querySelector("#storyCard").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        });
      }

      function saveProgress() {
        const payload = {
          currentIndex: state.index,
          viewedIndexes: normalizeIndexes(state.viewedIndexes),
          revealedIndexes: normalizeIndexes(state.revealedIndexes),
          lastVisitedAt: new Date().toISOString(),
        };

        state.viewedIndexes = payload.viewedIndexes;
        state.revealedIndexes = payload.revealedIndexes;
        localStorage.setItem(progressStorageKey, JSON.stringify(payload));
        localStorage.setItem(legacyIndexStorageKey, String(state.index));
      }

      function markViewed(index) {
        if (!state.viewedIndexes.includes(index)) {
          state.viewedIndexes.push(index);
        }

        saveProgress();
      }

      function markRevealed(index) {
        if (!state.revealedIndexes.includes(index)) {
          state.revealedIndexes.push(index);
        }

        saveProgress();
      }

      function getCompletedCount() {
        return normalizeIndexes(state.revealedIndexes).length;
      }

      function selectEpisode(index) {
        stopSpeech(false);
        state.index = clampIndex(index);
        state.sentenceShown = false;
        state.revealed = state.revealedIndexes.includes(state.index);
        markViewed(state.index);
        render();
        moveToStoryTop();
      }

      function renderLevels() {
        const completedCount = getCompletedCount();

        levelShelf.innerHTML = "";
        levels.forEach((level) => {
          const button = document.createElement("button");
          const isActive = level.id === activeLevel.id;
          const isLocked = level.status === "locked";
          button.type = "button";
          button.disabled = isLocked;
          button.className = `level-card${isActive ? " active" : ""}${isLocked ? " locked" : ""}`;
          button.innerHTML = `
            <span class="level-label">${level.label}</span>
            <span class="level-title">${level.title}</span>
            <span class="level-status">${isLocked ? `잠김 · ${level.count} words` : `완료 ${completedCount} / ${level.episodes.length}`}</span>
          `;
          levelShelf.appendChild(button);
        });
      }

      function renderTabs() {
        episodeTabs.innerHTML = "";
        episodes.forEach((episode, index) => {
          const button = document.createElement("button");
          const isActive = index === state.index;
          const isViewed = state.viewedIndexes.includes(index);
          const isCompleted = state.revealedIndexes.includes(index);
          button.type = "button";
          button.className = `episode-tab${isActive ? " active" : ""}${isViewed ? " viewed" : ""}${isCompleted ? " completed" : ""}`;
          button.setAttribute(
            "aria-label",
            `${episode.day} ${episode.title}${isCompleted ? " 완료" : isViewed ? " 본 단어" : ""}`,
          );
          button.innerHTML = `
            <span class="tab-head">
              <span class="tab-day">${episode.day}</span>
              <span class="tab-plane${isActive ? "" : " empty"}" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <use href="#icon-plane"></use>
                </svg>
              </span>
            </span>
            <span class="tab-title">${episode.title}</span>
            <span class="tab-route">${episode.route[0]} → ${episode.route[1]}</span>
          `;
          button.addEventListener("click", () => selectEpisode(index));
          episodeTabs.appendChild(button);
        });
      }

      function render() {
        const episode = episodes[state.index];
        const current = state.index + 1;
        const completedCount = getCompletedCount();
        const progress = (completedCount / episodes.length) * 100;

        topProgress.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;
        progressText.textContent = `${current} / ${episodes.length}`;
        progressFill.style.setProperty("--progress", `${progress}%`);
        resumeText.textContent = `이어하기 ${episode.day}`;
        completedText.textContent = `완료 ${completedCount} / ${episodes.length}`;
        dayLabel.textContent = `${activeLevel.label} · ${episode.day}`;
        routeFrom.textContent = episode.route[0];
        routeTo.textContent = episode.route[1];
        episodeTitle.textContent = episode.title;
        sceneText.textContent = episode.scene;
        sentenceText.textContent = state.sentenceShown
          ? episode.sentence
          : "••••••••••••••••••••••••••••";
        sentenceText.className = state.sentenceShown ? "sentence-text" : "sentence-hidden";
        sentenceButton.textContent = state.sentenceShown ? "마지막 문장 숨기기" : "마지막 문장 보기";
        speakButton.hidden = !speechApi;
        speakButton.disabled = !speechApi;
        speakButton.setAttribute("aria-pressed", isSpeaking ? "true" : "false");
        speakLabel.textContent = isSpeaking ? "정지" : "듣기";
        revealButton.textContent = state.revealed ? "단어 숨기기" : "단어 공개";
        revealPanel.hidden = !state.revealed;
        wordText.textContent = episode.word;
        koreanText.textContent = episode.korean;
        feelingText.textContent = episode.feeling;
        wordCount.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;

        phraseList.innerHTML = "";
        episode.phrases.forEach((phrase) => {
          const item = document.createElement("li");
          item.textContent = phrase;
          phraseList.appendChild(item);
        });

        renderLevels();
        renderTabs();
      }

      sentenceButton.addEventListener("click", () => {
        state.sentenceShown = !state.sentenceShown;
        if (!state.sentenceShown) {
          stopSpeech(false);
        }
        render();
      });

      speakButton.addEventListener("click", speakFinalLine);

      revealButton.addEventListener("click", () => {
        state.revealed = !state.revealed;
        if (state.revealed) {
          markRevealed(state.index);
        } else {
          saveProgress();
        }
        render();
      });

      prevButton.addEventListener("click", () => {
        selectEpisode((state.index - 1 + episodes.length) % episodes.length);
      });

      nextButton.addEventListener("click", () => {
        selectEpisode((state.index + 1) % episodes.length);
      });

      menuButton.addEventListener("click", () => {
        episodeTabs.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      });

      markViewed(state.index);
      render();
    </script>
  </body>
</html>
