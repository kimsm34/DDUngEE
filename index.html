<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDungEE Cabin Diary</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%2314385f'/%3E%3Ctext x='10' y='31' fill='%23fffdf8' font-family='Georgia' font-size='17' font-weight='900'%3EDD%3C/text%3E%3C/svg%3E" />
    <meta
      name="description"
      content="정민이의 승무원 세계관으로 토익 단어를 긴 장면처럼 익히는 모바일 단어장"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #14243a;
        --muted: #687384;
        --paper: #fbf6ec;
        --paper-2: #fffdf8;
        --surface: #fffaf2;
        --line: #e6ddce;
        --navy: #14385f;
        --blue: #2f6b9e;
        --sky: #dfeff5;
        --coral: #e7745d;
        --gold: #b88939;
        --green: #2d7c6d;
        --shadow: 0 16px 44px rgba(27, 42, 61, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(223, 239, 245, 0.58), transparent 250px),
          var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.72;
      }

      button {
        font: inherit;
      }

      .app {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.92);
        backdrop-filter: blur(18px);
      }

      .topbar-inner {
        max-width: 1120px;
        min-height: 68px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        filter: drop-shadow(0 8px 14px rgba(20, 56, 95, 0.18));
      }

      .brand-title {
        margin: 0;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.15rem;
        font-weight: 900;
        line-height: 1.05;
        white-space: nowrap;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.2;
      }

      .top-progress {
        min-width: max-content;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.9rem;
        font-weight: 900;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .menu-button {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.74);
        color: var(--navy);
        cursor: pointer;
        padding: 0;
        border-radius: 8px;
      }

      .menu-button svg {
        width: 20px;
        height: 20px;
      }

      .menu-button:hover,
      .menu-button:focus-visible {
        outline: 3px solid rgba(231, 116, 93, 0.2);
        outline-offset: 2px;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 680px);
        justify-content: center;
        gap: 22px;
        padding: 18px 14px 42px;
      }

      .lesson-strip {
        display: grid;
        gap: 12px;
      }

      .level-shelf {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(132px, 1fr);
        gap: 10px;
        overflow-x: auto;
        padding: 2px 2px 6px;
        scrollbar-width: thin;
      }

      .level-card {
        min-height: 72px;
        border: 1px solid rgba(20, 56, 95, 0.13);
        background: rgba(255, 253, 248, 0.88);
        color: var(--ink);
        padding: 11px 12px;
        text-align: left;
        cursor: pointer;
        border-radius: 8px;
      }

      .level-card.active {
        background: var(--navy);
        color: #fff;
        border-color: transparent;
      }

      .level-card.locked {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .level-label,
      .level-status {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.74rem;
        font-weight: 900;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .level-title {
        display: block;
        margin-top: 4px;
        font-size: 0.9rem;
        font-weight: 900;
        line-height: 1.25;
      }

      .level-status {
        margin-top: 7px;
        color: var(--green);
      }

      .level-card.active .level-status {
        color: #f6d9a6;
      }

      .level-card.locked .level-status {
        color: var(--muted);
      }

      .reader-intro {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: end;
        padding: 4px 2px 0;
      }

      .day-label {
        margin: 0;
        color: var(--green);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.8rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .reader-title {
        margin: 4px 0 0;
        color: var(--navy);
        font-size: clamp(1.5rem, 7vw, 2.3rem);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .progress-chip {
        border: 1px solid rgba(20, 56, 95, 0.14);
        background: rgba(255, 253, 248, 0.8);
        padding: 8px 10px;
        color: var(--navy);
        font-weight: 900;
        border-radius: 8px;
      }

      .progress-track {
        height: 3px;
        background: rgba(20, 56, 95, 0.13);
      }

      .progress-fill {
        display: block;
        width: var(--progress, 20%);
        height: 100%;
        background: var(--navy);
      }

      .episode-tabs {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(176px, 1fr);
        gap: 10px;
        overflow-x: auto;
        padding: 2px 2px 8px;
        scrollbar-width: thin;
      }

      .episode-tab {
        position: relative;
        min-height: 74px;
        border: 1px solid rgba(20, 56, 95, 0.13);
        background: rgba(255, 253, 248, 0.86);
        color: var(--ink);
        padding: 12px 14px 12px 16px;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
        border-radius: 8px;
      }

      .episode-tab::before,
      .episode-tab::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 9px;
        height: 18px;
        background: var(--paper);
        border: 1px solid rgba(20, 56, 95, 0.08);
        transform: translateY(-50%);
      }

      .episode-tab::before {
        left: -1px;
        border-left: 0;
        border-radius: 0 12px 12px 0;
      }

      .episode-tab::after {
        right: -1px;
        border-right: 0;
        border-radius: 12px 0 0 12px;
      }

      .episode-tab.active {
        background: linear-gradient(135deg, var(--navy), #255f96);
        color: #fff;
        border-color: transparent;
      }

      .episode-tab:hover,
      .episode-tab:focus-visible {
        border-color: rgba(20, 56, 95, 0.45);
        outline: none;
      }

      .tab-day {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .tab-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .tab-plane {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.92);
      }

      .tab-plane.empty {
        color: rgba(20, 56, 95, 0.3);
      }

      .episode-tab:not(.active) .tab-plane {
        color: rgba(20, 56, 95, 0.32);
      }

      .tab-plane svg {
        width: 20px;
        height: 20px;
      }

      .tab-title {
        display: block;
        margin-top: 3px;
        font-weight: 900;
        line-height: 1.22;
      }

      .tab-route {
        display: block;
        margin-top: 3px;
        opacity: 0.72;
        font-size: 0.76rem;
      }

      .story-card {
        overflow: hidden;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.96);
        box-shadow: var(--shadow);
        border-radius: 8px;
      }

      .hero {
        position: relative;
        min-height: 210px;
        padding: 22px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.9), rgba(255, 253, 248, 0.24) 58%, rgba(255, 253, 248, 0.06)),
          url("assets/flight-sky-window.jpg");
        background-size: cover;
        background-position: center;
      }

      .stamp-svg {
        width: 112px;
        height: auto;
        transform: rotate(-8deg);
        color: var(--coral);
        filter: drop-shadow(0 8px 12px rgba(113, 51, 42, 0.08));
      }

      .route-card {
        width: max-content;
        max-width: 100%;
        display: flex;
        align-items: center;
        gap: 9px;
        border: 1px solid rgba(20, 56, 95, 0.12);
        background: rgba(255, 253, 248, 0.88);
        padding: 8px 10px;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.82rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .route-line {
        width: 62px;
        height: 18px;
        display: block;
        color: var(--coral);
      }

      .route-line svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .story-body {
        padding: 24px 20px 20px;
      }

      .section {
        padding: 22px 0;
        border-top: 1px dashed rgba(20, 56, 95, 0.16);
      }

      .section:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .section-label {
        margin: 0;
        color: var(--gold);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0 0 10px;
      }

      .section-icon {
        width: 18px;
        height: 18px;
        color: var(--gold);
        flex: 0 0 auto;
      }

      .episode-title {
        margin: 0 0 16px;
        color: var(--navy);
        font-size: clamp(1.7rem, 8.5vw, 2.75rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .scene {
        margin: 0;
        color: #2b3745;
        font-size: 1.03rem;
        line-height: 1.9;
        white-space: pre-line;
      }

      .sentence-panel,
      .reveal-panel {
        background: var(--surface);
        border: 1px solid rgba(20, 56, 95, 0.11);
        padding: 15px;
        border-radius: 8px;
      }

      .sentence-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .sentence-top .section-heading {
        margin-bottom: 0;
      }

      .sentence-text {
        margin: 0;
        color: var(--navy);
        font-size: 1.04rem;
        font-weight: 900;
      }

      .sentence-hidden {
        display: block;
        min-height: 36px;
        color: #2d638d;
        letter-spacing: 0.18em;
        overflow-wrap: anywhere;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        align-items: center;
      }

      .primary-button,
      .ghost-button {
        min-height: 44px;
        border: 1px solid var(--navy);
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.92rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .primary-button {
        background: var(--navy);
        color: #fff;
      }

      .ghost-button {
        background: #fff;
        color: var(--navy);
      }

      .primary-button:hover,
      .primary-button:focus-visible,
      .ghost-button:hover,
      .ghost-button:focus-visible {
        outline: 3px solid rgba(231, 116, 93, 0.24);
        outline-offset: 2px;
      }

      .reveal-panel[hidden] {
        display: none;
      }

      .word-reveal {
        margin: 0;
        color: var(--navy);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.9rem, 15vw, 5rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .word-meaning {
        margin: 10px 0 0;
        color: #4d6d8f;
        font-weight: 900;
      }

      .feeling {
        margin: 18px 0 0;
        color: #2d3746;
        font-size: 0.98rem;
        line-height: 1.78;
      }

      .phrases {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }

      .phrase-heading {
        margin-top: 20px;
      }

      .phrases li {
        background: #edf5f8;
        color: #315a7a;
        padding: 7px 10px;
        font-size: 0.84rem;
        font-weight: 900;
        border-radius: 8px;
      }

      .bottom-nav {
        position: sticky;
        bottom: 0;
        z-index: 10;
        margin: 24px -20px -20px;
        border-top: 1px solid rgba(20, 56, 95, 0.1);
        background: rgba(255, 253, 248, 0.94);
        backdrop-filter: blur(16px);
        padding: 12px 20px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .word-count {
        color: var(--muted);
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 900;
        text-align: center;
      }

      @media (min-width: 820px) {
        .page {
          grid-template-columns: 320px minmax(0, 740px);
          align-items: start;
          padding: 28px 22px 56px;
        }

        .reader-title {
          font-size: 1.82rem;
        }

        .lesson-strip {
          position: sticky;
          top: 92px;
          align-self: start;
        }

        .episode-tabs {
          grid-auto-flow: row;
          grid-auto-columns: unset;
          overflow: visible;
          max-height: calc(100vh - 284px);
          overflow-y: auto;
          padding-right: 6px;
        }

        .hero {
          min-height: 248px;
          padding: 28px;
        }

        .story-body {
          padding: 32px 34px 24px;
        }

        .scene {
          font-size: 1.07rem;
        }

        .bottom-nav {
          margin-left: -34px;
          margin-right: -34px;
          margin-bottom: -24px;
          padding-left: 34px;
          padding-right: 34px;
        }
      }

      @media (max-width: 420px) {
        .topbar-inner {
          padding-left: 14px;
          padding-right: 14px;
        }

        .brand-title {
          font-size: 0.95rem;
        }

        .page {
          padding-left: 12px;
          padding-right: 12px;
        }

        .hero {
          min-height: 188px;
          padding: 18px;
        }

        .story-body {
          padding: 22px 18px 18px;
        }

        .scene {
          font-size: 1rem;
          line-height: 1.86;
        }

        .episode-title {
          font-size: clamp(1.55rem, 8vw, 2.2rem);
        }
      }
    </style>
  </head>
  <body>
    <svg aria-hidden="true" focusable="false" style="position: absolute; width: 0; height: 0; overflow: hidden">
      <symbol id="icon-menu" viewBox="0 0 24 24">
        <path d="M5 7.5h14M5 12h14M5 16.5h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

    <div class="app">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <svg class="brand-logo" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="3" y="3" width="42" height="42" rx="11" fill="#14385f" />
              <path d="M9 30c9-10 20-13 30-9" fill="none" stroke="#f6d9a6" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="2.5 3.8" />
              <circle cx="38.4" cy="20.7" r="2" fill="#e7745d" />
              <text x="9" y="31.5" fill="#fffdf8" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="900" letter-spacing="0">DD</text>
            </svg>
            <div>
              <p class="brand-title">DDungEE Cabin Diary</p>
              <p class="brand-subtitle">정민이의 승무원 토익 단어장</p>
            </div>
          </div>
          <div class="header-actions">
            <div class="top-progress" id="topProgress">01 / 05</div>
            <button class="menu-button" id="menuButton" type="button" aria-label="에피소드 목록으로 이동">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-menu"></use>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="page">
        <aside class="lesson-strip" aria-label="episode navigation">
          <nav class="level-shelf" id="levelShelf" aria-label="레벨 선택"></nav>
          <div class="reader-intro">
            <div>
              <p class="day-label" id="dayLabel">DAY 01</p>
              <h1 class="reader-title">정민이의 오늘 비행 장면</h1>
            </div>
            <div class="progress-chip" id="progressText">1 / 5</div>
          </div>
          <div class="progress-track">
            <span class="progress-fill" id="progressFill"></span>
          </div>
          <nav class="episode-tabs" id="episodeTabs" aria-label="에피소드 목록"></nav>
        </aside>

        <article class="story-card" id="storyCard">
          <div class="hero">
            <svg class="stamp-svg" viewBox="0 0 128 84" aria-hidden="true">
              <ellipse cx="64" cy="42" rx="55" ry="30" fill="rgba(255, 253, 248, 0.32)" stroke="currentColor" stroke-width="3" />
              <ellipse cx="64" cy="42" rx="45" ry="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.78" />
              <path d="M31 31c18-9 42-9 66 0M31 53c18 9 42 9 66 0" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" opacity="0.7" />

sure|확실한|다시 확인한 시간|Are you sure about the gate number?|흔들림 없이 맞다고 느끼는 상태|make sure;be sure;sure about it|정민은 숫자를 한 번 더 보고서야 승객에게 고개를 끄덕인다
possible|가능한|열려 있는 방법|Is it possible to change seats?|상황상 할 수 있는 길이 남아 있는 느낌|possible delay;possible option;if possible|좌석표를 보던 정민은 아직 작은 가능성이 남아 있음을 발견한다
important|중요한|빨간 표시|This is an important safety notice.|놓치면 안 되는 큰 의미가 있는 느낌|important notice;important document;important information|안전 안내가 시작되자 정민은 장난스럽던 표정까지 잠시 거둔다
special|특별한|따로 붙은 라벨|She ordered a special meal.|보통과 다르게 따로 챙겨야 하는 느낌|special meal;special request;special assistance|카트 한쪽에 붙은 작은 라벨이 정민의 눈에 먼저 들어온다
common|흔한, 공통의|자주 받는 질문|This is a common question.|많은 사람에게 자주 나타나는 느낌|common problem;common question;common area|같은 질문이 반복되자 정민은 더 쉬운 설명을 찾아낸다
personal|개인의|작은 파우치|Keep your personal items with you.|한 사람에게 속한 사적인 물건이나 정보|personal item;personal information;personal bag|승객은 여권과 지갑이 든 작은 가방을 품에서 놓지 않는다
extra|추가의|하나 더 꺼낸 담요|Can I have an extra blanket?|기본에 하나 더 붙는 느낌|extra blanket;extra fee;extra time|정민은 카트 아래칸에서 담요 하나를 더 꺼낸다
free|무료의, 자유로운|비용 없는 셔틀|The shuttle service is free.|돈을 내지 않아도 되거나 묶이지 않은 상태|free service;free seat;free of charge|호텔 셔틀이 무료라는 말에 승객의 표정이 조금 밝아진다
lost|잃어버린|사라진 여권|I lost my passport.|가지고 있던 것이 보이지 않게 된 상태|lost baggage;lost item;lost passport|승객의 손이 주머니와 가방을 반복해서 뒤지기 시작한다
found|발견된|돌아온 물건|The passport was found near the counter.|찾고 있던 것이 발견된 상태|found item;lost and found;found near the gate|카운터 아래에서 작은 여권이 발견되자 긴장이 풀린다
fragile|깨지기 쉬운|빨간 스티커|This item is fragile.|조심하지 않으면 쉽게 깨지는 상태|fragile item;fragile sticker;handle with care|상자 위 빨간 스티커를 본 정민은 손의 힘을 낮춘다
heavy|무거운|선반 앞 캐리어|This bag is too heavy.|들거나 옮기기에 무게가 큰 상태|heavy bag;heavy luggage;too heavy|캐리어가 선반 앞에서 멈추자 정민이 주변을 살핀다
light|가벼운|작은 손가방|This bag is light enough to carry.|무게가 적어 들기 쉬운 상태|light bag;light meal;light jacket|작은 가방은 손목에 걸릴 만큼 가벼워 승객이 안심한다
boarding pass|탑승권|화면 속 QR 코드|Please show your boarding pass at the gate.|비행기에 탈 권리를 보여주는 표|digital boarding pass;show a boarding pass;boarding pass number|승객이 휴대폰 밝기를 올리자 QR 코드가 게이트 불빛에 선명해진다
passport|여권|남색 작은 책자|Please keep your passport ready.|국경을 넘을 때 나를 증명하는 책자|valid passport;passport control;show a passport|정민은 승객에게 여권을 바로 꺼낼 수 있게 준비해 달라고 말한다
visa|비자|작은 승인 표시|Some passengers need a visa.|입국 허가를 보여주는 공식 표시|visa application;valid visa;need a visa|서류 한 칸의 작은 표시가 여행 가능 여부를 가른다
hotel|호텔|도착 후의 불빛|The hotel is near the airport.|여행 중 머무는 숙소|hotel room;hotel lobby;hotel reservation|긴 비행 후 로비 불빛이 보이자 정민의 어깨가 조금 내려간다
airport|공항|유리천장 아래|The airport is crowded today.|비행기가 오가고 여행이 시작되는 장소|airport staff;airport shuttle;airport terminal|커다란 유리천장 아래에서 캐리어 바퀴 소리가 겹쳐진다
counter|카운터|직원이 있는 자리|Please go to the check-in counter.|직원이 서류와 요청을 처리하는 자리|ticket counter;check-in counter;service counter|정민은 승객을 가장 가까운 카운터 쪽으로 안내한다
lounge|라운지|조용한 대기실|You can wait in the lounge.|조금 더 편하게 기다리는 공간|airport lounge;lounge access;wait in the lounge|지연 안내 뒤 정민은 지친 승객에게 조용한 라운지 위치를 알려준다
carousel|수하물 벨트|돌아가는 벨트|Your baggage will arrive at carousel 5.|도착한 짐이 빙글빙글 나오는 벨트|baggage carousel;carousel number;at the carousel|검은 캐리어들이 같은 얼굴로 벨트 위를 천천히 돈다
aisle|통로|카트가 지나는 길|Please keep the aisle clear.|좌석 사이 사람들이 지나는 길|aisle seat;aisle clear;walk down the aisle|작은 카트가 지나가려면 aisle 위 가방 하나도 조심해야 한다
window|창문|구름 옆 자리|She prefers a window seat.|밖을 볼 수 있는 유리 쪽 자리|window seat;window shade;near the window|구름이 가까워지자 아이가 창문 쪽으로 몸을 기울인다
overhead bin|머리 위 선반|찰칵 닫힌 선반|Please put your bag in the overhead bin.|좌석 위 짐을 넣는 공간|close the overhead bin;overhead bin space;store in the overhead bin|정민은 선반 문이 끝까지 닫히는 소리를 기다린다
tray table|좌석 테이블|접힌 작은 식탁|Please fold your tray table.|좌석 앞에 접었다 펴는 작은 테이블|fold the tray table;open the tray table;tray table up|착륙 전 정민은 접히지 않은 작은 테이블을 하나씩 확인한다
seat belt|좌석벨트|허리 위 버클|Please fasten your seat belt.|몸을 좌석에 안전하게 고정하는 벨트|fasten your seat belt;seat belt sign;seat belt check|벨트 표시등이 켜지자 정민은 aisle을 따라 버클을 살핀다
`.trim();

      const storyRoutes = [
        ["ICN", "FUK"],
        ["ICN", "NRT"],
        ["ICN", "TPE"],
        ["ICN", "BKK"],
        ["ICN", "SIN"],
        ["ICN", "HKG"],
        ["ICN", "LAX"],
        ["ICN", "CDG"],
      ];

      const storyTextures = [
        {
          opening:
            "이른 아침 공항은 아직 완전히 깨어나지 않았지만, 전광판과 캐리어 바퀴 소리는 이미 하루를 시작하고 있었다.",
          middle:
            "정민은 유니폼 소매를 한 번 정리하고 그 장면을 조금 오래 바라봤다.",
          ending:
            "그 순간 영어 단어는 뜻풀이가 아니라, 사람 하나가 다음 장소로 넘어가기 위해 꼭 붙잡는 작은 장면처럼 남았다.",
        },
        {
          opening:
            "밤비행의 기내는 조용했지만 완전히 잠들지는 않았다. 호출등 하나, 접힌 담요 하나, 작은 기침 소리 하나가 계속 정민의 시선을 불렀다.",
          middle:
            "정민은 서두르지 않으려고 숨을 한 번 고르고, 필요한 것을 먼저 눈으로 찾았다.",
          ending:
            "그 장면이 지나간 뒤에도 단어의 느낌은 기내 조명처럼 은근하게 남았다.",
        },
        {
          opening:
            "도착지의 공기는 낯설었다. 공항 안내 방송은 익숙한 듯 다르게 울렸고, 사람들은 각자의 다음 목적지를 향해 흩어지고 있었다.",
          middle:
            "정민은 표지판과 승객의 얼굴을 번갈아 보며 가장 자연스러운 길을 찾았다.",
          ending:
            "그때 단어는 사전 속 한 줄이 아니라, 낯선 곳에서 방향을 잃지 않게 해주는 표식처럼 느껴졌다.",
        },
        {
          opening:
            "비행 전 briefing room의 공기는 늘 조금 팽팽했다. 아직 아무 일도 일어나지 않았지만, 오늘 생길 작은 일들이 이미 문밖에서 기다리는 것 같았다.",
          middle:
            "정민은 노트 가장자리에 작은 표시를 남기며 그 순간을 머릿속에 고정했다.",
          ending:
            "그래서 그 단어는 외워야 할 글자가 아니라, 일이 시작되기 전에 마음속에 미리 놓아두는 장면이 되었다.",
        },
      ];

      function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function storyNumber(number) {
        return String(number).padStart(3, "0");
      }

      function buildScene(entry, index) {
        const texture = storyTextures[index % storyTextures.length];
        return `${texture.opening}\n\n${entry.sceneSeed}. ${texture.middle} 손님은 그냥 지나가는 사람이 아니라, 자기 일정과 걱정과 기대를 품고 이 작은 공간에 들어온 사람이었다.\n\n정민은 그 상황에서 '${entry.korean}'라는 한국어 뜻보다 먼저 이런 이미지를 떠올렸다. ${entry.feel}. 머리로 번역하기 전에 눈앞의 물건, 손짓, 표정, 움직임이 먼저 잡히는 느낌이었다.\n\n${texture.ending}`;
      }

      function makeQuiz(sentence, answer) {
        return sentence.replace(new RegExp(escapeRegExp(answer), "i"), "_____");
      }

      function parseSeed(line) {
        const [word, korean, title, sentence, feel, phraseText, sceneSeed] = line.split("|");
        return {
          word,
          korean,
          title,
          sentence,
          feel,
          sceneSeed,
          phrases: phraseText.split(";"),
        };
      }

      const generatedEpisodes = levelOneSeedText.split("\n").map((line) => parseSeed(line));
      const levelOneRawEpisodes = [...featuredEpisodes, ...generatedEpisodes];
      const answerPool = levelOneRawEpisodes.map((episode) => episode.answer || episode.word);

      function buildOptions(answer, index) {
        const decoys = answerPool.filter((item) => item !== answer);
        return [
          answer,
          decoys[(index + 11) % decoys.length],
          decoys[(index + 37) % decoys.length],
          decoys[(index + 61) % decoys.length],
        ];
      }

      const levelOneEpisodes = levelOneRawEpisodes.map((episode, index) => {
        const answer = episode.answer || episode.word;
        return {
          ...episode,
          day: `WORD ${storyNumber(index + 1)}`,
          route: episode.route || storyRoutes[index % storyRoutes.length],
          scene: episode.scene || buildScene(episode, index),
          quiz: episode.quiz || makeQuiz(episode.sentence, answer),
          options: episode.options || buildOptions(answer, index),
          answer,
          feeling:
            episode.feeling ||
            `${episode.word}는 이런 장면으로 잡으면 좋아요. ${episode.feel}. 뜻을 먼저 외우기보다, 정민이가 실제로 보고 만지는 장면 안에서 잡으면 독해할 때 훨씬 빨리 살아납니다.`,
        };
      });

      const levels = [
        {
          id: "level-1",
          label: "Level 1",
          title: "첫 비행 기본 단어",
          status: "open",
          episodes: levelOneEpisodes,
        },
        {
          id: "level-2",
          label: "Level 2",
          title: "기내 서비스 심화",
          status: "locked",
          count: 100,
        },
        {
          id: "level-3",
          label: "Level 3",
          title: "공항 문제 해결",
          status: "locked",
          count: 100,
        },
        {
          id: "level-4",
          label: "Level 4",
          title: "면접과 실무 표현",
          status: "locked",
          count: 100,
        },
      ];

      const activeLevel = levels[0];
      const episodes = activeLevel.episodes;

      const state = {
        index: Math.min(
          Number(localStorage.getItem("ddungee-level-1-index") || 0),
          episodes.length - 1,
        ),
        sentenceShown: false,
        revealed: false,
      };

      const levelShelf = document.querySelector("#levelShelf");
      const episodeTabs = document.querySelector("#episodeTabs");
      const menuButton = document.querySelector("#menuButton");
      const topProgress = document.querySelector("#topProgress");
      const progressText = document.querySelector("#progressText");
      const progressFill = document.querySelector("#progressFill");
      const dayLabel = document.querySelector("#dayLabel");
      const routeFrom = document.querySelector("#routeFrom");
      const routeTo = document.querySelector("#routeTo");
      const episodeTitle = document.querySelector("#episodeTitle");
      const sceneText = document.querySelector("#sceneText");
      const sentenceText = document.querySelector("#sentenceText");
      const sentenceButton = document.querySelector("#sentenceButton");
      const revealButton = document.querySelector("#revealButton");
      const revealPanel = document.querySelector("#revealPanel");
      const wordText = document.querySelector("#wordText");
      const koreanText = document.querySelector("#koreanText");
      const feelingText = document.querySelector("#feelingText");
      const phraseList = document.querySelector("#phraseList");
      const prevButton = document.querySelector("#prevButton");
      const nextButton = document.querySelector("#nextButton");
      const wordCount = document.querySelector("#wordCount");

      function moveToStoryTop() {
        requestAnimationFrame(() => {
          document.querySelector("#storyCard").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        });
      }

      function selectEpisode(index) {
        state.index = Math.max(0, Math.min(index, episodes.length - 1));
        state.sentenceShown = false;
        state.revealed = false;
        localStorage.setItem("ddungee-level-1-index", String(state.index));
        render();
        moveToStoryTop();
      }

      function renderLevels() {
        levelShelf.innerHTML = "";
        levels.forEach((level) => {
          const button = document.createElement("button");
          const isActive = level.id === activeLevel.id;
          const isLocked = level.status === "locked";
          button.type = "button";
          button.disabled = isLocked;
          button.className = `level-card${isActive ? " active" : ""}${isLocked ? " locked" : ""}`;
          button.innerHTML = `
            <span class="level-label">${level.label}</span>
            <span class="level-title">${level.title}</span>
            <span class="level-status">${isLocked ? `잠김 · ${level.count} words` : `${level.episodes.length} words open`}</span>
          `;
          levelShelf.appendChild(button);
        });
      }

      function renderTabs() {
        episodeTabs.innerHTML = "";
        episodes.forEach((episode, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `episode-tab${index === state.index ? " active" : ""}`;
          button.innerHTML = `
            <span class="tab-head">
              <span class="tab-day">${episode.day}</span>
              <span class="tab-plane${index === state.index ? "" : " empty"}" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <use href="#icon-plane"></use>
                </svg>
              </span>
            </span>
            <span class="tab-title">${episode.title}</span>
            <span class="tab-route">${episode.route[0]} → ${episode.route[1]}</span>
          `;
          button.addEventListener("click", () => selectEpisode(index));
          episodeTabs.appendChild(button);
        });
      }

      function render() {
        const episode = episodes[state.index];
        const current = state.index + 1;
        const progress = (current / episodes.length) * 100;

        topProgress.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;
        progressText.textContent = `${current} / ${episodes.length}`;
        progressFill.style.setProperty("--progress", `${progress}%`);
        dayLabel.textContent = `${activeLevel.label} · ${episode.day}`;
        routeFrom.textContent = episode.route[0];
        routeTo.textContent = episode.route[1];
        episodeTitle.textContent = episode.title;
        sceneText.textContent = episode.scene;
        sentenceText.textContent = state.sentenceShown
          ? episode.sentence
          : "••••••••••••••••••••••••••••";
        sentenceText.className = state.sentenceShown ? "sentence-text" : "sentence-hidden";
        sentenceButton.textContent = state.sentenceShown ? "문장 숨기기" : "문장 보기";
        revealButton.textContent = state.revealed ? "단어 숨기기" : "단어 공개";
        revealPanel.hidden = !state.revealed;
        wordText.textContent = episode.word;
        koreanText.textContent = episode.korean;
        feelingText.textContent = episode.feeling;
        wordCount.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;

        phraseList.innerHTML = "";
        episode.phrases.forEach((phrase) => {
          const item = document.createElement("li");
          item.textContent = phrase;
          phraseList.appendChild(item);
        });

        renderLevels();
        renderTabs();
      }

      sentenceButton.addEventListener("click", () => {
        state.sentenceShown = !state.sentenceShown;
        render();
      });

      revealButton.addEventListener("click", () => {
        state.revealed = !state.revealed;
        render();
      });

      prevButton.addEventListener("click", () => {
        selectEpisode((state.index - 1 + episodes.length) % episodes.length);
      });

      nextButton.addEventListener("click", () => {
        selectEpisode((state.index + 1) % episodes.length);
      });

      menuButton.addEventListener("click", () => {
        episodeTabs.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      });

      render();
    </script>
  </body>
</html>
