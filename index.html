      const storyRevisions = new Map([
        [20, manualStory([
          `인천공항 한쪽에 작은 향수 만들기 체험 부스가 열려 있었다. 정민이는 원래 커피만 사서 게이트로 가려 했는데, 유리병들이 햇빛을 받아 반짝이는 걸 보고 발이 멈췄다. 부스 앞에는 탑승객들이 조용히 줄을 서 있었고, 테이블 위에는 작은 시향지가 부채처럼 펼쳐져 있었다.`,
          `정민이는 구경만 할 생각이었다. 그런데 직원이 빈 병 하나를 건네며 직접 향을 골라볼 수 있다고 했다. 라벤더, 복숭아, 비누 향이 차례로 올라왔다. 정민이는 복숭아 향을 맡자마자 편의점 젤리 생각이 나서 혼자 웃었다.`,
          `옆에 있던 아이가 병 뚜껑을 떨어뜨려서 데굴데굴 굴러갔다. 정민이는 얼른 주워주었다. 아이 엄마가 고맙다고 하자, 정민이는 괜히 더 씩씩한 참가자가 된 기분으로 시향지를 골랐다.`,
          `마지막에는 자기 이름이 적힌 작은 라벨을 병에 붙였다. 그냥 지나쳤으면 예쁜 부스였겠지만, 직접 손을 움직이고 향을 고르고 라벨을 붙이자 그 장면은 여행 속 작은 사건이 되었다.`,
        ], `I participated in the perfume-making workshop at the airport.`)],
        [21, manualStory([
          `방콕 호텔 조식당은 아침부터 분주했다. 창가 쪽 테이블에는 가족 손님들이 몰려 있었고, 가운데에는 의자들이 조금 삐뚤게 놓여 있었다. 정민이는 쟁반을 들고 빈자리를 찾다가 직원이 혼자 의자를 옮기는 걸 보았다.`,
          `직원은 작은 생일 케이크를 숨겨둔 테이블을 준비하는 중이었다. 문제는 의자가 너무 제멋대로였다. 한쪽은 벽에 붙어 있고, 한쪽은 통로를 막고 있었다. 정민이는 물 한 잔을 내려놓고 잠깐 도와도 되는지 눈짓으로 물었다.`,
          `직원은 웃으며 고개를 끄덕였다. 정민이는 의자를 둥글게 돌려놓고, 아이가 앉을 자리 앞에는 작은 접시를 놓았다. 리본 달린 케이크 상자가 테이블 밑에서 살짝 보였고, 생일 주인공은 아직 아무것도 모르는 얼굴로 입구에 서 있었다.`,
          `잠시 뒤 가족들이 앉자 테이블이 딱 맞게 모였다. 누군가를 놀라게 하려는 마음은 의자 하나의 방향까지 신경 쓰게 만들었다. 정민이는 자기 쟁반을 들고 돌아서며, 잘 놓인 물건들이 사람의 기분까지 정리해준다고 생각했다.`,
        ], `Could you arrange the chairs around this table?`)],
        [22, manualStory([
          `승무원 면접 전날 밤, 정민이의 책상은 작은 공항 같았다. 여권 사본, 증명사진, 출력한 지원서, 볼펜, 머리망이 각자 자기 자리 없이 펼쳐져 있었다. 침대 위에는 다림질한 블라우스가 조용히 누워 있었다.`,
          `정민이는 처음에는 괜찮다고 생각했다. 그런데 서류 한 장이 보이지 않는 순간, 가슴이 훅 내려앉았다. 투명 폴더를 뒤지고, 파우치를 열고, 캐리어 앞주머니까지 뒤졌지만 없었다.`,
          `거의 울상으로 의자 밑을 봤을 때, 사진 봉투 아래에 서류가 끼어 있었다. 정민이는 바닥에 앉은 채로 한참 웃었다. 너무 긴장해서 눈앞에 있는 것도 못 본 것이다.`,
          `그녀는 서류를 종류별로 다시 넣고, 면접장까지 가져갈 가방에 차례로 담았다. 내일의 떨림을 없앨 수는 없지만, 오늘 밤 필요한 것을 갖춰두면 적어도 아침의 혼란은 줄일 수 있었다.`,
        ], `I need to prepare my documents before the interview.`)],
        [23, manualStory([
          `정민이는 오사카 호텔 방 바닥에 캐리어를 활짝 펼쳤다. 왼쪽에는 옷, 오른쪽에는 선물, 가운데에는 간식이 섞여 있었다. 처음에는 귀여운 물건을 살 때마다 행복했는데, 돌아갈 시간이 가까워지자 전부 작은 숙제가 되었다.`,
          `토끼 접시는 양말 사이에 넣고, 머그컵은 파자마로 감쌌다. 녹차 과자는 모서리가 눌리지 않게 맨 위에 올렸다. 그런데 딸기 키링 하나가 계속 사라졌다 나타났다 했다. 정민이는 결국 웃으면서 키링을 화장품 파우치 손잡이에 걸어버렸다.`,
          `캐리어 안쪽은 점점 질서가 생겼다. 입을 옷끼리, 깨질 수 있는 물건끼리, 바로 꺼낼 것끼리 모이자 머릿속도 같이 조용해졌다. 흩어진 물건들이 각자 들어갈 칸을 찾는 느낌이었다.`,
          `지퍼를 닫기 전, 정민이는 한 번 더 손바닥으로 옷을 눌렀다. 꽉 찬 캐리어였지만 이상하게 덜 불안했다. 물건들이 제자리를 찾으면 마음도 같이 여행을 마칠 준비를 했다.`,
        ], `I organized my suitcase by outfit.`)],
        [24, manualStory([
          `서비스 교육장 거울 앞에서 정민이는 같은 인사를 다섯 번째 연습하고 있었다. 고개 각도는 괜찮은데 표정이 조금 딱딱했다. 강사는 아무 말 없이 종이컵 하나를 건넸다.`,
          `정민이는 이유를 몰라 컵을 받아 들었다. 강사는 손님이 뜨거운 물을 들고 있다고 생각해보라고 했다. 그러자 정민이의 손과 목소리가 저절로 조심스러워졌다. 그냥 웃는 얼굴이 아니라, 상대가 다치지 않게 살피는 얼굴이 되었다.`,
          `옆자리 동기가 작게 박수를 쳤다. 정민이는 부끄러워서 귀 끝이 빨개졌지만, 조금 전과 다른 느낌을 스스로도 알 수 있었다. 같은 문장인데 마음이 먼저 가니 목소리가 둥글어졌다.`,
          `연습이 끝나고 거울에 비친 자기 얼굴을 봤다. 대단한 변화는 아니었다. 하지만 작은 방향 하나를 바꾸자 인사가 훨씬 진짜 같아졌다.`,
        ], `This practice will improve my greeting.`)],
        [25, manualStory([
          `정민이가 좋아하던 푸딩 가게 앞에는 새 가격표가 붙어 있었다. 분명 지난달에는 조금 더 쌌던 것 같은데, 딸기 푸딩 옆 숫자가 얌전히 올라가 있었다. 정민이는 문 앞에서 잠깐 멈췄다.`,
          `가게 안에서는 우유 냄새와 바닐라 향이 났고, 사장님은 유리병을 하나씩 닦고 있었다. 벽에는 재료값이 올라 부득이하게 가격이 바뀐다는 손글씨 안내가 붙어 있었다. 글씨 끝에는 작은 미안한 얼굴까지 그려져 있었다.`,
          `정민이는 살짝 아쉬웠지만, 쇼케이스 안 푸딩을 보자 마음이 금방 약해졌다. 표면이 너무 매끈했고, 위에 올라간 딸기는 너무 빨갰다. 가격이 오른 사실과 먹고 싶은 마음이 동시에 진지했다.`,
          `계산을 마치고 작은 병을 받아 들며 정민이는 생각했다. 숫자가 올라간다는 건 단순히 비싸졌다는 말만은 아니었다. 재료와 사람과 가게의 버티는 시간이 그 숫자 안으로 조금 더 들어온 느낌이었다.`,
        ], `The price will increase next week.`)],
        [26, manualStory([
          `출국장 저울 위에 캐리어를 올리는 순간, 정민이는 숫자를 보고 얼어붙었다. 제한 무게보다 조금 넘었다. 아주 조금이었지만, 저울 숫자는 냉정했다. 뒤에 선 사람의 캐리어 바퀴 소리까지 갑자기 크게 들렸다.`,
          `정민이는 줄 밖으로 나와 캐리어를 열었다. 두꺼운 니트, 잡지, 작은 유리병 세 개가 의심스럽게 보였다. 문제는 다 소중해 보인다는 것이었다. 니트는 귀엽고, 잡지는 추억이고, 유리병은 선물이었다.`,
          `결국 그녀는 잡지를 사진으로 찍고 분리수거함 앞에 섰다. 조금 슬펐지만, 캐리어 지퍼가 덜 힘들게 닫히는 걸 보니 현실감이 돌아왔다. 귀여운 여행에도 숫자와 무게는 따라왔다.`,
          `다시 저울에 올리자 이번에는 통과였다. 정민이는 캐리어 손잡이를 잡고 작게 한숨을 쉬었다. 덜어낸다는 건 포기처럼 느껴지지만, 가끔은 계속 가기 위해 필요한 선택이었다.`,
        ], `I need to reduce the weight of my bag.`)],
        [27, manualStory([
          `타이베이 숙소를 고르는 밤, 정민이는 침대에 엎드려 휴대폰 화면을 두 개씩 번갈아 봤다. 하나는 역에서 가까웠고, 하나는 욕조가 예뻤다. 둘 다 마음에 들어서 오히려 결정이 어려웠다.`,
          `첫 번째 숙소는 길 찾기가 쉬워 보였다. 두 번째 숙소는 창밖에 강이 보였다. 리뷰 사진을 넘기다 보니 어느 순간 둘 다 자기에게 와 달라고 하는 것 같았다. 정민이는 볼펜으로 장점과 단점을 노트에 적기 시작했다.`,
          `친구가 옆에서 말했다. "너 지금 거의 심사위원 같아." 정민이는 웃었지만 진지했다. 하루 종일 돌아다닌 뒤 캐리어를 끌고 돌아올 길, 아침에 나갈 때의 동선, 밤에 편의점까지 걸을 거리까지 생각해야 했다.`,
          `나란히 놓고 보니 답이 조금씩 보였다. 예쁜 욕조도 좋지만, 이번 일정에는 역 가까운 곳이 더 맞았다. 둘을 비교하자 마음이 감정에서 선택으로 천천히 내려왔다.`,
        ], `Let's compare the two rooms before we book.`)],
        [28, manualStory([
          `항공권 예약 화면에서 좌석 지도가 열렸다. 작은 네모들이 줄지어 있었고, 이미 고른 자리들은 회색으로 막혀 있었다. 정민이는 화면을 확대했다가 다시 줄였다.`,
          `창가도 좋고, 통로도 좋았다. 하지만 이번에는 비행 중에 화장실을 자주 갈 것 같아서 통로가 나을 것 같았다. 화면 속 빈자리 하나하나가 작은 가능성처럼 보였다.`,
          `뒤쪽 통로 좌석 하나가 눈에 들어왔다. 너무 뒤는 아니고, 화장실과도 너무 가깝지 않았다. 정민이는 손가락을 올렸다가 잠깐 멈췄다. 한번 누르면 그 자리가 자기 여정의 일부가 된다.`,
          `결국 그녀는 그 네모를 눌렀다. 화면 색이 바뀌자 이상하게 안심이 됐다. 여러 칸 중 하나를 콕 찍는 행동이, 흐릿한 여행을 조금 더 구체적으로 만들었다.`,
        ], `Please select a seat on the screen.`)],
        [29, manualStory([
          `공항철도 표 사는 기계 앞에서 정민이는 지갑을 열었다. 화면에는 여러 언어와 여러 노선이 한꺼번에 떠 있었다. 뒤에는 캐리어를 든 사람들이 차례를 기다리고 있었다.`,
          `그녀는 목적지를 다시 확인했다. 호텔은 시내 쪽이었고, 급행열차를 타면 빨랐다. 가격은 조금 더 나갔지만, 늦은 밤에 길에서 헤매는 것보다는 나았다.`,
          `카드를 대기 전, 정민이는 잠깐 망설였다. 표 하나 사는 일인데도 낯선 도시에서는 작은 결정들이 다 공식적으로 느껴졌다. 잘못 누르면 반대 방향으로 갈 것 같은 괜한 상상까지 했다.`,
          `결제음이 나고 표가 나왔다. 얇은 종이 한 장이 손에 들어오자, 이제 진짜 이동할 수 있다는 느낌이 왔다. 돈을 내고 얻은 건 표뿐 아니라 다음 장면으로 넘어갈 권리 같았다.`,
        ], `I want to purchase this ticket through the app.`)],
        [30, manualStory([
          `딸기 케이크가 쇼케이스 안에서 너무 반듯하게 빛나고 있었다. 정민이는 원래 커피만 마시려 했지만, 케이크 위 크림이 작은 구름처럼 올라간 걸 보고 마음이 바뀌었다.`,
          `앞사람이 마지막 초코 타르트를 가져가자 직원이 빈 접시를 치웠다. 정민이는 괜히 더 급해졌다. 딸기 케이크도 누군가 데려갈 것 같았다. 배가 그렇게 고픈 것도 아닌데 손이 먼저 지갑을 찾았다.`,
          `차례가 오자 그녀는 케이크를 가리켰다. 직원은 접시에 옮겨 담으며 포크를 하나 더 넣어주었다. 정민이는 그 작은 포크 소리에 이미 기분이 좋아졌다.`,
          `창가에 앉아 첫입을 먹자 크림이 생각보다 가벼웠다. 원하는 것을 말하고 받아드는 단순한 과정인데, 그 안에는 작은 기대와 기다림과 보상이 다 들어 있었다.`,
        ], `I'd like to order the strawberry cake.`)],
        [31, manualStory([
          `정민이는 여행지에서 산 파자마를 호텔 방에서 입어보고 조용히 거울 앞에 섰다. 색은 너무 예쁜데 소매가 애매하게 짧았다. 손목이 나오는 순간 귀여움보다 불편함이 먼저 보였다.`,
          `다음 날 매장에 다시 가는 길은 조금 민망했다. 이미 한 번 좋아해서 산 물건을 돌려보내는 일은 괜히 마음이 약해진다. 그래도 입지 않을 옷을 캐리어에 넣어 돌아가는 건 더 아까웠다.`,
          `직원은 영수증을 보고 상태를 확인했다. 정민이는 비닐봉투 손잡이를 꼭 쥐고 기다렸다. 뒤에서는 누군가 양말 색을 고르며 즐겁게 웃고 있었고, 그녀만 작은 심판을 기다리는 사람 같았다.`,
          `잠시 뒤 직원이 결제 취소 처리를 해주었다. 휴대폰에 금액이 돌아온다는 알림이 뜨자 마음이 가벼워졌다. 어떤 선택은 되돌리는 순간에야 제대로 끝난다.`,
        ], `I'd like to request a refund for these pajamas.`)],
        [32, manualStory([
          `공항 안 양말 가게에서 정민이는 발걸음을 멈췄다. 딸기 무늬 양말 세트가 작은 바구니에 담겨 있었고, 옆에는 빨간 표시가 붙어 있었다. 원래 가격보다 조금 내려간 금액이었다.`,
          `정민이는 이미 기념품을 많이 샀다고 생각했다. 그런데 양말은 작고 가볍고, 무엇보다 너무 귀여웠다. 가격표가 살짝 내려가 있으니 마음속 변명까지 완벽해졌다.`,
          `계산대 앞에서 직원이 쿠폰도 쓸 수 있다고 알려줬다. 정민이는 휴대폰 쿠폰함을 열다가 화면 잠금 비밀번호를 한 번 틀렸다. 뒤에 있던 사람이 웃음을 참는 것 같아 그녀도 같이 웃었다.`,
          `결국 작은 금액이 더 빠졌다. 큰돈은 아니었지만, 귀여운 물건을 조금 더 가볍게 데려온 기분이 들었다. 가격이 내려간 틈으로 기분이 살짝 올라갔다.`,
        ], `Can I use this discount coupon?`)],
        [33, manualStory([
          `정민이는 카페 계산대 앞에서 종이컵과 작은 레몬 쿠키를 받았다. 직원이 결제 완료 화면을 보여주고 바로 다음 손님을 보려 했다. 정민이는 순간 손을 들었다.`,
          `회사 교육비로 처리해야 하는 커피였다. 그냥 마시면 끝나는 커피가 아니라, 나중에 기록으로 남겨야 하는 커피였다. 이상하게 그 생각을 하니 평범한 컵이 조금 공식적인 물건처럼 보였다.`,
          `직원은 잠깐 포스기를 다시 눌렀다. 종이가 지직거리며 나오고, 작은 글씨들이 줄줄이 찍혔다. 정민이는 종이를 접어 다이어리 안쪽에 넣었다.`,
          `쿠키는 달았고, 종이는 얇았다. 그래도 그 얇은 종이 하나가 나중에 이 지출이 실제로 있었다는 증거가 되어줄 것이다. 먹고 사라지는 것에도 때로는 남는 꼬리가 필요했다.`,
        ], `Could I get a receipt, please?`)],
        [34, manualStory([
          `정민이는 숙소 로비 한쪽 테이블에 앉아 노트북을 열었다. 회사 이름으로 결제한 장기 숙박 비용을 정리해야 했다. 화면에는 금액, 세금, 숙박 날짜가 줄줄이 떠 있었다.`,
          `프런트 직원은 일반 영수증은 바로 줄 수 있지만, 회사 제출용 문서는 이메일로 보내야 한다고 했다. 정민이는 회사 담당자 이름을 떠올리며 메일 주소를 천천히 입력했다.`,
          `잠깐 뒤 직원이 화면을 돌려 확인시켜주었다. 숫자는 맞았고, 날짜도 맞았다. 정민이는 안도했다. 돈이 오가는 공식 문서는 작은 오타 하나만 있어도 다시 연락해야 하는 일이 된다.`,
          `메일이 도착하자 그녀는 파일을 열어 금액을 확인했다. 숙소에서 잔 밤들이 표 하나로 정리되어 있었다. 여행의 피곤함이 갑자기 회사 서류처럼 단정해졌다.`,
        ], `Could you send the invoice to my email?`)],
        [35, manualStory([
          `비행이 늦어져 정민이는 호텔 체크아웃 시간을 넘길 것 같았다. 프런트로 내려가는 엘리베이터 안에서 그녀는 머리끈을 다시 묶었다. 거울 속 얼굴은 조금 피곤했고, 캐리어는 아직 반쯤 열려 있었다.`,
          `프런트 직원은 친절했지만, 늦은 체크아웃은 규정이 있다고 했다. 정민이는 얼마가 더 붙는지 먼저 알아야 했다. 추가 금액이 크면 그냥 로비에서 기다리는 편이 나을 수도 있었다.`,
          `옆 소파에서는 아이가 인형을 떨어뜨리고 울기 시작했다. 정민이는 인형을 주워주고 다시 카운터를 바라봤다. 여행의 마지막 날은 늘 이렇게 사소한 변수가 한꺼번에 온다.`,
          `직원이 금액을 알려주자 정민이는 고개를 끄덕였다. 돈이 조금 더 들지만 샤워하고 짐을 정리할 시간이 생긴다면 그만한 가치가 있었다. 어떤 서비스에는 작은 꼬리표처럼 비용이 붙는다.`,
        ], `Is there an extra fee for late checkout?`)],
        [36, manualStory([
          `정민이는 여행 둘째 날 밤, 침대 위에 동전과 영수증을 펼쳐놓았다. 푸딩, 지하철, 약국, 양말, 라멘. 하루가 지나간 자리에 작은 숫자들이 남아 있었다.`,
          `처음에는 넉넉하다고 생각했다. 그런데 귀여운 물건 앞에서 마음이 자주 약해졌고, 맛있는 냄새 앞에서는 계산이 조금 느슨해졌다. 지갑 속 지폐가 생각보다 얇아져 있었다.`,
          `그녀는 다이어리 한쪽에 남은 금액을 적고, 내일 꼭 쓸 돈을 따로 빼두었다. 소품샵은 하나만 가기로 했다. 푸딩은 포기할 수 없었다. 그건 예산 문제가 아니라 마음의 문제에 가까웠다.`,
          `숫자를 정리하자 이상하게 여행이 더 자유로워졌다. 쓸 수 있는 선을 알고 나니, 그 안에서 마음껏 즐길 방법이 보였다.`,
        ], `I need to stay within my travel budget.`)],
        [37, manualStory([
          `레이오버 중 택시를 탄 뒤, 정민이는 영수증을 손에 꼭 쥐고 있었다. 비가 많이 와서 공항버스가 늦었고, 교육장에는 제시간에 도착해야 했다. 택시 창문에는 빗방울이 가로로 흘렀다.`,
          `평소라면 교통비 하나쯤 대충 넘겼을지도 모른다. 하지만 이번 이동은 업무 일정 때문에 생긴 것이었다. 나중에 보고할 때 금액과 이유를 적어야 했다.`,
          `호텔 방에 돌아와 신발을 벗자 발바닥이 살짝 아팠다. 정민이는 영수증 사진을 찍고, 날짜와 목적지를 메모했다. 재미있는 일은 아니었지만, 미래의 자신이 고마워할 정리였다.`,
          `작은 종이 한 장이 그날의 비와 서두름과 택시 안의 조용한 긴장을 증명해주었다. 돈이 어디에 쓰였는지 남기는 일은 가끔 하루를 다시 접는 일처럼 느껴졌다.`,
        ], `This taxi ride is a business expense.`)],
        [38, manualStory([
          `수플레 카페 메뉴판 아래에는 작은 글씨가 붙어 있었다. 세금과 서비스 요금이 포함된 가격인지 아닌지 정민이는 바로 알 수 없었다. 케이크 사진은 너무 예쁜데 숫자는 살짝 복잡했다.`,
          `정민이는 지갑 속 현금을 떠올렸다. 카드도 있었지만, 이 가게는 현금만 받을 수도 있었다. 여행지에서는 이런 작은 계산이 갑자기 중요한 문제가 된다.`,
          `직원에게 묻자 그는 계산서를 보여주며 설명해주었다. 기본 가격에 세금이 더해지고, 포장하면 상자 값이 붙는다고 했다. 정민이는 머릿속으로 숫자를 더하다가 결국 웃었다. 맛있는 걸 먹기 위해 이렇게 진지해질 줄은 몰랐다.`,
          `마지막 금액이 분명해지자 마음이 편해졌다. 무엇에 얼마가 들어가는지 알면, 달콤한 선택도 훨씬 덜 불안해진다.`,
        ], `Does the total cost include tax?`)],
        [39, manualStory([
          `승무원 체험 교육 중, 정민이는 모의 기내식 테이블 옆에 서 있었다. 세 번째 자리 손님 역할을 맡은 교육생이 따뜻한 물을 부탁했다. 주변은 생각보다 진짜 비행기처럼 분주했다.`,
          `정민이는 컵을 들고 이동하다가 손잡이가 없는 쟁반에 살짝 당황했다. 물이 넘치지 않게 걷는 것만으로도 온 신경이 발끝까지 내려갔다. 교육장 바닥은 평평했지만 마음은 난기류 같았다.`,
          `자리에 도착하자 상대는 고맙다고 웃었다. 정민이는 그 웃음을 보고 긴장이 조금 풀렸다. 서비스를 받는 사람은 역할극 속 인물이었지만, 부탁을 듣고 챙기는 감각은 진짜였다.`,
          `한 사람의 요청이 생기면 그 순간부터 동선과 손의 속도와 목소리가 달라진다. 정민이는 그걸 몸으로 배웠다.`,
        ], `The customer at table three asked for warm water.`)],
        [40, manualStory([
          `호텔 프런트 뒤 사무실에서 정민이는 실습 담당자를 따라 예약 메일을 정리하고 있었다. 한 손님은 방을 바꿔달라고 여러 번 연락을 남겼다. 엘리베이터 옆 방이라 밤새 소음이 컸다고 했다.`,
          `정민이는 메일의 말투가 조금 날카로워서 처음엔 겁이 났다. 하지만 읽을수록 그 사람이 화난 이유가 보였다. 먼 길을 와서 잠을 못 잔 사람이라면 누구라도 예민해질 수 있었다.`,
          `담당자는 빈 방 목록을 확인하며 더 조용한 층을 찾았다. 정민이는 옆에서 이름과 예약 번호를 다시 확인했다. 한 사람의 요청이 그냥 불평이 아니라 해결해야 할 업무로 바뀌는 순간이었다.`,
          `새 방이 잡히자 메일 답장이 부드러워졌다. 누군가 서비스를 맡긴 상대라면, 그 사람이 불편함을 말할 때 끝까지 들어야 한다는 걸 정민이는 조용히 배웠다.`,
        ], `The client asked for a quieter room.`)],
        [41, manualStory([
          `첫 실습 날, 정민이는 이름표를 셔츠 왼쪽에 달았다. 작은 플라스틱 조각인데 이상하게 무게가 느껴졌다. 거울 앞에 서자 그냥 정민이가 아니라, 어떤 공간에서 일하는 사람처럼 보였다.`,
          `교육장 입구에서 담당자는 이름표 위치를 하나씩 확인했다. 삐뚤어진 사람은 다시 달았고, 뒤집힌 사람은 웃으며 고쳤다. 정민이는 손끝으로 자기 이름을 살짝 눌렀다.`,
          `쉬는 시간에 한 동기가 이름표를 두고 와서 급하게 뛰어갔다. 모두가 웃었지만, 담당자는 부드럽게 말했다. 손님은 이름을 보고 사람을 부르게 된다고. 그 말이 의외로 오래 남았다.`,
          `작은 이름표 하나가 책임과 역할을 앞에 걸어두는 느낌이었다. 정민이는 다시 거울을 보고 어깨를 폈다.`,
        ], `Every employee has to wear a name badge.`)],
        [42, manualStory([
          `디저트 가게 쇼케이스에서 딸기 케이크가 사라졌다. 정민이는 방금 전까지 분명 한 조각이 있었다고 생각했다. 직원은 진열대를 살펴보더니 재고를 확인해보겠다고 했다.`,
          `잠깐 뒤 앞치마를 단 사람이 안쪽에서 나왔다. 그는 냉장고 안쪽을 확인하고, 예약분과 판매분을 따로 세어보았다. 정민이는 숨을 죽이고 기다렸다. 케이크 한 조각에 이렇게 긴장할 일인가 싶었지만, 이미 마음은 케이크 쪽으로 기울어 있었다.`,
          `결국 뒤쪽 냉장고에 한 조각이 더 남아 있었다. 정민이는 표정 관리에 실패하고 활짝 웃었다. 담당자는 그 웃음을 보고 같이 웃었다.`,
          `가게가 바쁠 때 누가 책임지고 확인해주는지에 따라 손님의 마음이 달라졌다. 정민이는 케이크 상자를 받으며 그 단정한 확인의 힘을 느꼈다.`,
        ], `I'll ask the manager to check the stock.`)],
        [43, manualStory([
          `호텔 조식당에서 정민이는 혼자 창가 자리에 앉았다. 비행 다음 날이라 몸이 조금 무거웠고, 머릿속에는 아직 기내 방송 소리가 남아 있었다. 그런데 직원들이 이상하게 다정했다.`,
          `한 사람은 따뜻한 커피를 더 가져다주었고, 다른 한 사람은 빵이 새로 나왔다고 알려주었다. 정민이가 접시를 떨어뜨릴 뻔하자 멀리 있던 직원이 먼저 다가와 괜찮냐고 물었다.`,
          `별일 아닌 친절들이 계속 이어지자, 정민이는 갑자기 울컥했다. 낯선 도시에서 혼자 밥을 먹는 아침에는 누군가의 차분한 말투가 생각보다 크게 닿는다.`,
          `그녀는 식당을 나서기 전에 작게 고개 숙여 인사했다. 좋은 서비스는 한 사람만의 일이 아니라, 그곳에서 움직이는 사람들 전체의 공기처럼 느껴졌다.`,
        ], `The staff were incredibly kind.`)],
        [44, manualStory([
          `승무원 지원 설명회 입구에는 긴 줄이 있었다. 정민이는 투명 폴더를 품에 안고 서 있었다. 앞사람도, 뒷사람도, 모두 비슷하게 단정한 옷차림과 긴장한 얼굴이었다.`,
          `접수대에서는 신분증과 지원 번호를 확인했다. 누군가는 사진을 빠뜨려 다시 편의점으로 뛰어갔고, 누군가는 출력물이 접혀서 한숨을 쉬었다. 정민이는 폴더 안을 세 번이나 확인했다.`,
          `차례가 다가오자 손바닥이 조금 축축해졌다. 그녀는 자기 이름을 말하고 신분증을 내밀었다. 접수 담당자는 목록에서 이름을 찾고 고개를 끄덕였다.`,
          `줄에 선 수많은 사람들은 그냥 방문객이 아니었다. 모두 같은 문 앞에서 자기 가능성을 내밀고 있었다. 정민이는 그 안에 자기 이름이 있다는 사실이 새삼 떨렸다.`,
        ], `Every applicant needs to bring a photo ID.`)],
        [45, manualStory([
          `카페 창가 자리에서 정민이는 채용 공고를 다시 읽었다. 화면 속 문장은 짧았지만, 마음속에서는 아주 길게 울렸다. 객실승무원 모집. 지원 자격. 근무지. 전형 일정.`,
          `그녀는 공고를 저장해두고도 바로 지원하지 못했다. 멋져 보이는 일일수록 자기와 멀리 있는 것처럼 느껴질 때가 있다. 하지만 비행기 창밖 구름을 좋아하던 마음은 오래전부터 거기 있었다.`,
          `옆자리 손님이 캐리어를 끌고 지나가며 의자에 살짝 부딪혔다. 정민이는 괜찮다고 웃고 다시 화면을 봤다. 이상하게 그 작은 소음 덕분에 공고가 더 현실처럼 느껴졌다.`,
          `그녀는 메모장에 필요한 서류를 적기 시작했다. 화면 속 한 줄이 더 이상 남의 일이 아니었다. 자기 이름을 넣어볼 수 있는 자리 하나가 거기 열려 있었다.`,
        ], `I'm applying for the flight attendant position.`)],
        [46, manualStory([
          `면접 전날, 정민이는 블라우스를 옷걸이에 걸어두고 침대 끝에 앉았다. 방 안에는 다림질한 옷 냄새와 복숭아 립밤 향이 섞여 있었다. 휴대폰 알림에는 월요일 아침 일정이 떠 있었다.`,
          `그녀는 예상 질문을 읽다가 자꾸 창밖을 봤다. 자신 있게 말하고 싶은데, 머릿속 문장들은 가끔 줄을 잃고 흩어졌다. 그래도 포기하고 싶지는 않았다.`,
          `엄마에게 전화가 왔다. 밥은 먹었냐는 말부터 시작해서, 너무 떨지 말라는 말로 끝났다. 정민이는 대답하다가 괜히 목이 조금 잠겼다. 누군가 믿어주는 목소리는 긴장보다 오래 남는다.`,
          `전화를 끊고 그녀는 다시 노트를 펼쳤다. 정해진 날짜와 시간이 다가오고 있었다. 피하고 싶은 시험이 아니라, 직접 가서 자기 이야기를 말해야 하는 자리였다.`,
        ], `My interview is scheduled for Monday morning.`)],
        [47, manualStory([
          `교육 첫날 아침, 정민이는 새 노트를 펼쳤다. 첫 장에는 이름을 작게 쓰고, 옆에 하트 하나를 그렸다. 강의실 앞 스크린에는 오늘 배울 순서가 떠 있었다.`,
          `강사는 기내 상황을 하나씩 설명했다. 웃는 법, 듣는 법, 손님의 말을 다시 확인하는 법. 쉬워 보였던 것들이 막상 따라 해보니 생각보다 섬세했다.`,
          `정민이는 물컵을 나르는 연습에서 한 번 쏟을 뻔했다. 옆자리 동기가 얼른 손을 받쳐주었고, 둘은 동시에 웃음을 터뜨렸다. 긴장은 조금 녹았지만, 손끝에는 아직 조심스러움이 남았다.`,
          `노트 첫 장이 금방 빽빽해졌다. 배운다는 건 모르는 걸 채우는 일인 동시에, 몸이 새로운 리듬에 익숙해지는 일이었다.`,
        ], `The training session starts at nine.`)],
        [48, manualStory([
          `첫 모의 비행 실습에서 정민이는 예상보다 더 많이 당황했다. 손님 역할을 맡은 사람이 갑자기 담요를 더 달라고 했고, 다른 쪽에서는 아이가 물을 쏟았다. 연습인데도 공기가 바쁘게 흔들렸다.`,
          `정민이는 처음엔 순서를 놓쳤다. 물부터 닦아야 할지, 담요를 먼저 가져가야 할지, 강사의 눈치를 봤다. 그러다 아이가 미안한 얼굴로 휴지를 찾는 걸 보고 몸이 먼저 움직였다.`,
          `실습이 끝난 뒤 강사는 잘한 점과 아쉬운 점을 차분히 짚어줬다. 정민이는 얼굴이 뜨거웠지만, 이상하게 도망가고 싶지는 않았다. 방금 겪은 혼란이 머릿속에 선명하게 남아 있었기 때문이다.`,
          `다음 차례에는 조금 덜 흔들렸다. 한번 몸으로 겪은 일은 설명보다 오래 남는다. 정민이는 그날의 작은 실패가 자기 안에 조용히 쌓이는 걸 느꼈다.`,
        ], `That experience made me calmer.`)],
        [49, manualStory([
          `정민이는 불만을 말하는 손님 역할 앞에 섰다. 상대는 일부러 빠르게 말했고, 표정도 단단했다. 교육장이라는 걸 알면서도 정민이의 어깨가 살짝 굳었다.`,
          `처음에는 대답할 말을 찾느라 바빴다. 그런데 강사가 손짓으로 멈추게 했다. 먼저 다 들으라고 했다. 해결책을 꺼내기 전에, 상대가 무엇 때문에 불편한지 끝까지 들어야 한다고 했다.`,
          `정민이는 다시 시작했다. 이번에는 고개를 끄덕이고, 들은 내용을 자기 말로 천천히 되짚었다. 그러자 상대의 목소리가 조금 낮아졌다. 같은 상황인데 공기가 덜 날카로웠다.`,
          `그날 정민이는 말 잘하는 것보다 잘 듣는 것이 더 어렵다는 걸 알았다. 그리고 그 어려운 능력이야말로 서비스 안에서 진짜 힘이 된다는 것도 알았다.`,
        ], `Listening is an important skill for cabin crew.`)],
        [50, manualStory([
          `행사 전날, 정민이는 웰컴 키트 상자를 맡았다. 안에는 안내문, 볼펜, 작은 간식, 이름표가 들어 있었다. 보기에는 귀여웠지만 숫자를 맞추는 일은 꽤 엄격했다.`,
          `처음 세어보니 간식이 하나 모자랐다. 정민이는 순간 등 뒤가 서늘해졌다. 누군가는 키트를 받지 못할 수도 있었다. 그녀는 상자를 다시 열고 포장지 사이를 하나씩 뒤졌다.`,
          `결국 책상 아래로 굴러간 작은 과자 봉지를 찾았다. 정민이는 허리를 펴며 웃었다. 이렇게 사소한 것 하나 때문에 심장이 빨리 뛸 줄은 몰랐다.`,
          `맡은 일이 작아 보여도 빠뜨리면 누군가의 첫인상이 달라진다. 정민이는 마지막 상자까지 확인하고 나서야 손에서 힘을 풀었다.`,
        ], `I'm responsible for checking the welcome kits.`)],
        [51, manualStory([
          `교육 등록대 앞에서 정민이는 서류 봉투를 열었다. 담당자는 신분증과 여권 사본을 차례로 확인했다. 이름 옆에는 작은 체크 칸이 있었다.`,
          `앞사람은 사본을 깜빡해서 근처 인쇄소를 찾으러 뛰어갔다. 정민이는 그 뒷모습을 보고 자기 봉투를 더 꼭 잡았다. 준비해온 종이들이 갑자기 아주 든든하게 느껴졌다.`,
          `담당자가 여권 사본을 보자마자 고개를 끄덕였다. 정민이는 속으로 작게 안도했다. 반드시 필요한 것이 빠지지 않았다는 사실만으로도 마음이 반쯤 풀렸다.`,
          `어떤 문서는 있으면 좋고, 어떤 문서는 없으면 아예 다음 단계로 못 간다. 정민이는 봉투를 닫으며 그 차이를 몸으로 이해했다.`,
        ], `A passport copy is required for registration.`)],
        [52, manualStory([
          `이른 아침, 정민이는 호텔 문을 나서자마자 역 입구를 봤다. 캐리어를 오래 끌 필요가 없었다. 횡단보도 하나만 건너면 공항철도 표지판이 바로 보였다.`,
          `전날 숙소를 고를 때는 방 사진만 보고 싶었다. 하지만 막상 이동하는 아침이 되자 위치가 얼마나 중요한지 알 것 같았다. 비도 조금 내렸고, 손에는 커피까지 들려 있었다.`,
          `캐리어 바퀴가 보도블록 틈에 걸리지 않자 정민이는 괜히 기분이 좋아졌다. 복잡한 환승 없이 바로 갈 수 있다는 건 여행자를 매우 너그럽게 만든다.`,
          `예쁜 방도 좋지만, 피곤한 몸에게는 가까운 길이 최고의 친절일 때가 있다. 정민이는 역 계단 앞 엘리베이터를 보고 작게 박수를 치고 싶었다.`,
        ], `This hotel is convenient for the airport train.`)],
        [53, manualStory([
          `정민이의 여행 지도에는 별표가 너무 많았다. 소품샵, 푸딩 가게, 약국, 카페, 서점. 처음에는 전부 따로따로 좋아 보였는데, 실제로 걸어야 할 길을 보니 동선이 엉망이었다.`,
          `그녀는 카페 테이블에 앉아 지도를 돌려봤다. 같은 골목에 있는 곳끼리 묶고, 멀리 떨어진 곳은 내일로 미뤘다. 친구는 옆에서 빨대를 꽂으며 말했다. "너 지금 여행이 아니라 작전 짜는 것 같아."`,
          `정민이는 웃으면서도 계속 선을 그었다. 이렇게 걸으면 되돌아가지 않아도 되고, 점심 전에 푸딩을 살 수 있고, 약국도 닫기 전에 들를 수 있었다.`,
          `길이 정리되자 하루가 갑자기 덜 피곤해 보였다. 같은 장소를 가더라도 순서가 맞으면 시간과 힘이 훨씬 덜 든다.`,
        ], `This route is more efficient.`)],
        [54, manualStory([
          `공항버스 정류장에는 사람들이 조용히 줄을 서 있었다. 정민이는 휴대폰으로 도착 시간을 확인했다. 비가 조금씩 내렸지만, 안내판의 시간은 늘 거의 맞았다.`,
          `처음 오는 도시라 택시를 탈까 고민했다. 하지만 리뷰마다 이 버스가 시간표대로 잘 온다고 되어 있었다. 캐리어를 들고 헤매고 싶지 않은 아침이었다.`,
          `정해진 시간보다 1분 늦게 버스가 들어왔다. 사람들은 아무렇지 않게 움직였고, 기사님은 캐리어를 짐칸에 넣어주었다. 정민이는 그 단정한 흐름에 안심했다.`,
          `낯선 곳에서는 믿을 수 있는 것 하나가 마음의 중심이 된다. 길도 언어도 조금 낯설어도, 제때 오는 버스가 있으면 하루가 덜 흔들린다.`,
        ], `The airport bus is usually reliable.`)],
        [55, manualStory([
          `공항 작은 무대에서 승무원 체험 행사가 열렸다. 정민이는 안내를 도와주며 아이들에게 미니 탑승권을 나눠줬다. 처음에는 사람들이 별로 관심 없을까 봐 걱정했다.`,
          `하지만 첫 아이가 모자를 써보고 웃자 분위기가 바뀌었다. 부모들은 사진을 찍었고, 아이들은 줄을 다시 서고 싶어 했다. 한 아이는 정민이에게 자기도 나중에 비행기에서 일하고 싶다고 말했다.`,
          `행사 중간에 탑승권 종이가 부족해져 정민이는 급히 뒤쪽 창고로 뛰어갔다. 돌아오는 길에 발이 살짝 꼬였지만, 품에 든 종이는 무사했다. 다들 웃었고, 그녀도 숨을 고르며 웃었다.`,
          `마지막 아이가 손을 흔들고 나가자 무대 앞에는 스티커 조각과 웃음이 남았다. 계획대로 끝난 것보다, 사람들이 진짜 즐거워했다는 사실이 더 크게 느껴졌다.`,
        ], `The event was successful because everyone left smiling.`)],
        [56, manualStory([
          `나리타 골목 안쪽에서 정민이는 작은 빵집을 발견했다. 간판은 크지 않았고, 유리문 안쪽에는 동네 사람들이 줄을 서 있었다. 관광객보다 장바구니 든 사람들이 많은 곳이었다.`,
          `안으로 들어가자 버터 냄새가 바로 얼굴에 닿았다. 빵 이름은 낯설었지만, 앞사람들이 고르는 걸 보니 다 맛있어 보였다. 정민이는 괜히 가장 많이 팔리는 빵이 무엇인지 눈으로 맞혀보았다.`,
          `가게 할머니가 따뜻한 빵을 새로 꺼냈다. 줄에 있던 사람들이 동시에 조금씩 움직였다. 정민이는 그 작은 반응을 보고 여기서는 저 빵이 정답이구나 싶었다.`,
          `유명한 맛집보다 동네 사람들이 자연스럽게 들르는 곳이 더 믿음직할 때가 있다. 정민이는 종이봉투를 안고 골목 밖으로 나왔다.`,
        ], `A local bakery opens at seven.`)],
        [57, manualStory([
          `밤늦게 호텔 방에 들어오자 정민이는 목이 조금 칼칼했다. 약을 챙겨왔는지 파우치를 뒤졌지만 사탕만 나왔다. 비행기 안 건조한 공기 때문인지 목소리가 살짝 잠겨 있었다.`,
          `프런트에 내려가 근처 약국이 있는지 물었다. 직원은 지도 위에 손가락을 올려 호텔 뒤편 골목을 가리켰다. 걸어서 3분이면 된다고 했다.`,
          `정민이는 외투를 걸치고 나갔다. 밤공기는 차가웠지만 길은 밝았다. 약국 불빛이 모퉁이 너머에서 보이는 순간, 긴장이 풀렸다. 필요한 것이 멀지 않다는 사실은 생각보다 큰 위로였다.`,
          `목캔디와 따뜻한 차를 사서 돌아오는 길, 정민이는 내일 목소리를 지킬 수 있겠다고 생각했다. 가까이에 있다는 말 하나가 몸을 안심시켰다.`,
        ], `There's a pharmacy nearby.`)],
        [58, manualStory([
          `딤섬 가게 앞 줄은 골목을 따라 길게 이어져 있었다. 정민이는 처음엔 유명해서 관광객만 많은 줄 알았다. 그런데 줄 안에는 장바구니 든 할머니도 있고, 교복 입은 학생도 있었다.`,
          `가게 안쪽에서는 찜기 뚜껑이 열릴 때마다 김이 구름처럼 올라왔다. 기다리는 사람들은 익숙한 얼굴로 메뉴를 말했고, 직원은 누구에게 간장을 더 줄지 이미 아는 듯 움직였다.`,
          `정민이는 배가 고파서 줄을 포기할까 생각했다. 그때 앞에 있던 아주머니가 돌아보며 조금만 기다리면 금방 빠진다고 알려줬다. 말투가 너무 자연스러워서 믿음이 갔다.`,
          `첫 만두를 먹는 순간 왜 줄이 긴지 바로 알았다. 사람들이 많이 찾는 곳에는 이유가 있고, 그 이유는 입안에서 훨씬 빠르게 설명됐다.`,
        ], `That dumpling shop is popular with locals.`)],
        [59, manualStory([
          `아침 빵집 문을 열자 종소리보다 먼저 따뜻한 냄새가 나왔다. 정민이는 잠이 덜 깬 얼굴로 들어갔다가 진열대 앞에서 눈이 동그래졌다. 방금 나온 식빵들이 아직 김을 품고 있었다.`,
          `직원은 쟁반 위에 빵을 옮기며 조금 식힌 뒤 잘라주겠다고 했다. 정민이는 기다리는 동안 손을 코트 주머니에 넣고 유리창 밖을 봤다. 비 오는 아침이라 골목은 조용했다.`,
          `잠시 뒤 빵을 자르는 소리가 났다. 칼이 지나갈 때마다 속살이 하얗게 드러났고, 버터 냄새가 더 짙어졌다. 정민이는 아직 먹지도 않았는데 이미 행복해졌다.`,
          `빵 봉투는 손바닥을 따뜻하게 했다. 막 만들어진 음식은 맛보다 먼저 온도로 말한다. 정민이는 봉투를 품에 안고 호텔로 천천히 걸었다.`,
        ], `The bread is fresh out of the oven.`)],
        [60, manualStory([
          `후쿠오카의 작은 푸딩 가게는 의자가 세 개뿐이었다. 정민이는 마지막 남은 의자에 앉아 유리병 뚜껑을 조심스럽게 열었다. 숟가락은 너무 작아서 장난감 같았다.`,
          `첫 숟가락을 뜨기 전부터 달걀과 바닐라 냄새가 올라왔다. 표면은 매끈했고, 아래쪽 캐러멜은 진한 갈색으로 고여 있었다. 정민이는 괜히 자세를 고쳐 앉았다. 맛있는 순간을 대충 맞이하고 싶지 않았다.`,
          `입에 넣자 너무 부드러워서 잠깐 말이 안 나왔다. 옆자리 할머니가 정민이 표정을 보고 웃었다. 정민이도 숟가락을 든 채 웃었다. 언어가 달라도 맛있는 걸 먹은 얼굴은 금방 통한다.`,
          `그녀는 병 바닥까지 깨끗이 긁어 먹었다. 여행에서 기억에 남는 맛은 꼭 화려한 식당에서만 오는 게 아니었다. 작은 의자와 작은 숟가락, 그리고 첫입에 풀리는 얼굴이면 충분했다.`,
        ], `This pudding is delicious.`)],
        [61, manualStory([
          `교육 둘째 날, 정민이는 새 구두를 신고 갔다가 점심 전에 후회했다. 겉으로는 단정했지만 발뒤꿈치가 조금씩 따가웠다. 웃는 연습보다 참는 연습을 더 많이 하는 기분이었다.`,
          `쉬는 시간에 그녀는 화장실 칸에서 밴드를 붙였다. 파우치에 넣어둔 작은 밴드가 이렇게 고마울 줄 몰랐다. 거울 앞에서 다시 걸어보니 아직 아팠지만, 그래도 조금 나았다.`,
          `다음 날은 다른 신발을 신었다. 모양은 덜 예뻤지만 발을 감싸는 느낌이 훨씬 부드러웠다. 교육장까지 걸어가는 동안 정민이는 아무 생각 없이 걸을 수 있다는 게 얼마나 큰 일인지 깨달았다.`,
          `오래 서 있고 오래 웃어야 하는 날에는 예쁜 것보다 몸을 지켜주는 것이 더 중요했다. 발이 편하자 목소리까지 덜 긴장됐다.`,
        ], `These shoes are comfortable enough for a long shift.`)],
        [62, manualStory([
          `정민이는 늦은 밤 호텔 방 문을 열고 들어갔다. 비행과 이동으로 머리가 멍했고, 캐리어 손잡이를 놓는 순간 어깨가 내려앉았다. 방 안 불빛은 따뜻했다.`,
          `침대 시트에는 구김이 거의 없었고, 욕실 거울에는 물자국 하나 없었다. 세면대 옆 컵도 반듯하게 놓여 있었다. 정민이는 괜히 작은 수건 모서리를 손끝으로 만져봤다.`,
          `너무 피곤한 날에는 화려한 장식보다 깨끗한 바닥과 조용한 공기가 더 크게 다가온다. 그녀는 씻고 나와 침대에 앉자마자 마음이 천천히 풀렸다.`,
          `낯선 도시의 밤이라도 방이 단정하면 몸이 먼저 안심한다. 정민이는 커튼을 조금 닫고, 내일 입을 옷을 의자에 걸어두었다.`,
        ], `The room is clean and quiet.`)],
        [63, manualStory([
          `이른 아침 카페에는 손님이 거의 없었다. 정민이는 창가에 앉아 따뜻한 라떼를 두 손으로 감쌌다. 유리창 밖으로는 빗물이 얇게 흘러내렸고, 거리의 셔터들은 아직 반쯤 내려와 있었다.`,
          `어제는 줄 서고 뛰고 길을 잃느라 하루가 계속 소란스러웠다. 그래서인지 아무도 큰 소리로 말하지 않는 이 시간이 더 소중했다. 커피 머신 소리조차 낮게 들렸다.`,
          `정민이는 다이어리를 펼치고 오늘 갈 곳을 천천히 적었다. 펜 끝이 종이를 스치는 소리가 들릴 만큼 주변이 고요했다. 그 고요함 덕분에 머릿속 일정도 부드럽게 정리됐다.`,
          `여행에서 가장 기억나는 순간은 가끔 아무 일도 일어나지 않는 아침이다. 정민이는 라떼 거품 위 작은 하트를 오래 바라보았다.`,
        ], `The cafe is quiet in the morning.`)],
        [64, manualStory([
          `점심시간이 가까워지자 라멘집 앞 분위기가 달라졌다. 조금 전까지만 해도 한산했는데, 어느새 직장인들과 여행자들이 문 앞에 줄을 만들었다. 정민이는 메뉴판을 들고 눈을 크게 떴다.`,
          `가게 안쪽에서는 그릇 부딪히는 소리와 주문을 부르는 목소리가 빠르게 오갔다. 직원들은 뛰지는 않았지만, 거의 춤추듯 움직였다. 정민이는 물컵을 놓을 자리도 조심해서 찾아야 했다.`,
          `친구가 말했다. "우리 10분만 늦었으면 큰일 날 뻔했다." 정민이는 고개를 끄덕이며 웃었다. 맛집은 시계를 잘못 맞추면 기다림이 갑자기 길어진다.`,
          `라멘이 나오자 바쁜 공기 속에서도 국물 냄새가 선명했다. 붐비는 시간에는 모든 것이 빨라지지만, 첫 숟가락만큼은 천천히 먹고 싶었다.`,
        ], `The restaurant gets busy after noon.`)],
        [65, manualStory([
          `면접 당일 아침, 정민이는 알람보다 먼저 눈을 떴다. 아직 창밖은 푸르스름했고, 도시 소리도 덜 깨어 있었다. 침대 옆에는 전날 밤 준비해둔 폴더와 구두가 놓여 있었다.`,
          `너무 일찍 나가는 건 조금 유난스러워 보일 수도 있었다. 하지만 지하철이 늦거나 길을 잘못 찾으면 그 유난스러움이 바로 고마워질 것이다. 정민이는 따뜻한 물을 한 모금 마시고 머리를 묶었다.`,
          `역으로 가는 길에 빵집 문이 막 열리고 있었다. 갓 나온 냄새가 발목을 잡았지만, 그녀는 오늘만큼은 멈추지 않았다. 대신 마음속으로 면접 끝나고 꼭 오겠다고 약속했다.`,
          `면접장 근처에 도착했을 때도 시간은 넉넉했다. 기다림은 긴장을 키우기도 하지만, 뛰지 않아도 된다는 사실만으로 숨이 훨씬 편했다.`,
        ], `Let's leave early so we don't rush.`)],
        [66, manualStory([
          `정민이는 지하철 출구를 잘못 나왔다. 분명 지도는 오른쪽이라고 했는데, 막상 올라오니 낯선 건물들뿐이었다. 면접장까지 남은 시간은 빠르게 줄고 있었다.`,
          `그녀는 구두를 신고 거의 뛰었다. 머리카락이 한 가닥 빠져나왔고, 폴더 모서리가 손목을 계속 찔렀다. 숨이 차오르자 괜히 눈물이 날 것 같았다.`,
          `건물 로비에 도착했을 때 시계는 약속 시간을 조금 지나 있었다. 정민이는 엘리베이터 문 앞에서 숨을 고르고, 흐트러진 앞머리를 손으로 눌렀다. 완벽하게 도착하고 싶었지만 현실은 그렇지 않았다.`,
          `접수대 앞에서 그녀는 고개를 숙였다. 늦었다는 말은 가볍지 않았다. 기다린 사람의 시간을 건드렸다는 뜻이니까.`,
        ], `I'm sorry I'm late.`)],
        [67, manualStory([
          `채용 전형 안내 메일이 도착한 날, 정민이는 침대 위에 앉아 화면을 오래 바라봤다. 1차, 2차, 그리고 마지막 면접 일정이 차례로 적혀 있었다. 단어 하나가 유난히 크게 보였다.`,
          `여기까지 온 것도 믿기지 않았다. 처음 지원 버튼을 누를 때만 해도 자기소개서 문장 하나 때문에 밤새 뒤척였는데, 이제 정말 끝에 가까운 문 앞에 서 있었다.`,
          `엄마에게 말하자 전화기 너머가 잠깐 조용해졌다. 그리고 아주 조심스럽게 축하한다는 말이 들렸다. 정민이는 웃으려고 했는데 목소리가 조금 떨렸다.`,
          `마지막 단계라는 말은 무섭기도 하고, 그동안의 시간을 한꺼번에 데려오기도 했다. 그녀는 화면을 캡처하고 폴더에 저장했다. 이 문장은 오래 간직하고 싶었다.`,
        ], `I made it to the final interview.`)],
        [68, manualStory([
          `호텔을 고르던 밤, 정민이는 오래된 후기보다 최근에 올라온 글을 먼저 눌렀다. 사진 속 로비는 예뻤지만, 중요한 건 지금도 그렇게 관리되는지였다.`,
          `어제 날짜 후기에 엘리베이터 공사 이야기가 있었다. 또 다른 사람은 조식 빵이 바뀌었다고 적어두었다. 정민이는 예전 평점보다 방금 지나간 사람들의 말이 더 현실적으로 느껴졌다.`,
          `리뷰를 읽다가 한 장의 사진에서 창가 자리를 발견했다. 햇빛이 잘 들어오는 작은 테이블이었다. 그 사진 때문에 호텔이 갑자기 후보 안쪽으로 들어왔다.`,
          `가까운 시간에 남겨진 기록은 아직 온기가 있었다. 정민이는 오래된 칭찬보다 어제의 불편함과 오늘의 사진을 더 믿기로 했다.`,
        ], `I read a recent review of the hotel.`)],
        [69, manualStory([
          `역 자동발매기 앞에서 정민이는 세 번째로 같은 오류 화면을 봤다. 카드를 넣고 목적지를 고르면 마지막에 빨간 글씨가 떴다. 뒤에 선 사람들도 비슷한 표정으로 화면을 보고 있었다.`,
          `처음엔 자기가 뭘 잘못 누른 줄 알았다. 하지만 옆 기계 앞에서도 누군가 한숨을 쉬었다. 직원 한 명이 다가와 오늘 카드 인식이 조금 불안정하다고 설명했다.`,
          `정민이는 그 말을 듣고 이상하게 안심했다. 문제는 해결되지 않았지만, 적어도 자기만 헤매는 게 아니었다. 혼자만의 실수가 아니라 자주 생기는 상황이라면 당황이 조금 줄어든다.`,
          `직원은 현금 결제 방법을 알려주었다. 정민이는 표를 받고 나서야 어깨를 내렸다. 낯선 기계 앞에서 같은 문제를 겪는 사람들이 있다는 사실이 뜻밖의 위로가 됐다.`,
        ], `Is this a common issue with the ticket machine?`)],
        [70, manualStory([
          `카페 문 앞 작은 칠판에는 오늘만 파는 디저트가 적혀 있었다. 딸기 크림 위에 라벤더 설탕을 뿌린 케이크라고 했다. 정민이는 이름만 보고도 이미 지갑이 열리는 기분이었다.`,
          `직원은 하루에 여덟 조각만 만든다고 했다. 정민이는 쇼케이스 안 마지막에서 두 번째 조각을 보며 숨을 삼켰다. 평범한 메뉴였다면 그냥 지나쳤을 텐데, 오늘만이라는 말이 마음을 급하게 했다.`,
          `케이크가 접시에 올라오자 보라색 설탕이 반짝였다. 맛은 예상보다 은은했고, 딸기 향이 뒤에서 천천히 올라왔다. 정민이는 숟가락으로 모서리를 살짝 눌러보며 웃었다.`,
          `가끔은 특별하다는 말이 물건을 과하게 꾸미는 게 아니라, 그 순간에만 만날 수 있다는 사실을 알려준다. 그래서 더 천천히 먹게 된다.`,
        ], `This is a special menu for today.`)],
        [71, manualStory([
          `소품샵 계산대 옆에는 토끼 접시가 하나 남아 있었다. 정민이는 이미 장바구니에 넣으려 했는데, 직원이 조심스럽게 다가왔다. 방금 온라인 주문이 먼저 들어왔다고 했다.`,
          `정민이는 접시를 다시 내려놓았다. 너무 귀여워서 손에서 놓기 아쉬웠다. 접시 가장자리에는 작은 당근 그림이 있었고, 무게도 딱 좋았다.`,
          `직원은 다음 주에 다시 들어올 수 있다고 알려줬다. 정민이는 아쉬운 얼굴로 사진을 찍어두었다. 물건이 눈앞에 있어도 살 수 없는 순간이 있다는 게 조금 얄미웠다.`,
          `가게를 나와서도 그 접시가 계속 생각났다. 마음에 담은 물건이 품절이라는 말은 이상하게 오래 남는다.`,
        ], `This item is out of stock.`)],
        [72, manualStory([
          `공항 면세점 입구 쪽에는 새 립밤 진열대가 놓여 있었다. 포장은 작은 우유갑처럼 생겼고, 색마다 과일 그림이 달랐다. 정민이는 원래 지나가려다가 딸기 그림 앞에서 멈췄다.`,
          `직원은 오늘 들어온 신상품이라고 설명했다. 정민이는 손등에 살짝 발라보았다. 향이 너무 진하지 않고, 촉촉함도 오래 남았다. 이런 작은 물건은 여행 가방 안에서 은근히 자주 쓰인다.`,
          `옆에 있던 손님도 하나 집어 들었다. 정민이는 괜히 경쟁심이 생겨 딸기 맛 하나를 먼저 챙겼다. 작고 귀여운 물건 앞에서는 어른도 조금 어린 마음이 된다.`,
          `진열대가 입구 가까이에 놓인 이유를 알 것 같았다. 새로 나온 물건은 사람들의 발걸음을 붙잡는 힘이 있었다.`,
        ], `The new product is displayed near the entrance.`)],
        [73, manualStory([
          `비가 쏟아지던 저녁, 정민이는 호텔 로비에 젖은 우산을 들고 들어왔다. 머리끝에서 물방울이 떨어졌고, 캐리어 바퀴에는 빗물이 묻어 있었다.`,
          `직원은 말없이 수건을 먼저 건넸다. 이어서 따뜻한 차를 내주고, 젖은 우산을 넣을 비닐도 챙겨주었다. 정민이가 부탁하기 전에 필요한 것들이 차례로 도착했다.`,
          `그 다정함 때문에 정민이는 갑자기 피곤함이 풀렸다. 여행에서 좋은 방도 중요하지만, 지친 순간에 누군가가 먼저 알아채는 마음은 훨씬 오래 기억된다.`,
          `방으로 올라가는 엘리베이터 안에서 정민이는 손에 든 차를 내려다봤다. 오늘의 비가 그렇게 나쁘지만은 않았다고 생각했다.`,
        ], `The service here is excellent.`)],
        [74, manualStory([
          `공항 셔틀버스 안내판은 너무 작았다. 시간표도 있고, 타는 곳도 있고, 휴일 운행 안내도 있었지만 한 번에 들어오지 않았다. 정민이는 캐리어 옆에 서서 눈을 찡그렸다.`,
          `버스를 놓치면 택시를 타야 했다. 그러면 예산이 흔들리고, 저녁 예약 시간도 애매해질 수 있었다. 작은 안내 하나가 하루 전체를 좌우할 것 같았다.`,
          `안내 데스크 직원은 노선을 천천히 설명해주었다. 몇 번 출구로 나가야 하는지, 몇 분마다 오는지, 막차가 몇 시인지까지 알려줬다. 정민이는 휴대폰 메모장에 하나씩 적었다.`,
          `필요한 사실이 손에 들어오자 낯선 공항이 조금 덜 커 보였다. 정확한 설명은 길을 줄여주는 작은 지도 같았다.`,
        ], `Could you give me more information about the airport shuttle?`)],
        [75, manualStory([
          `예약 메일을 다시 읽던 정민이는 작은 문장 하나를 놓쳤다는 걸 깨달았다. 체크인은 본관이 아니라 별관에서 해야 한다고 적혀 있었다. 글씨가 너무 아래쪽에 있어서 처음엔 보이지 않았다.`,
          `이미 택시 기사님에게 본관 주소를 보여준 뒤였다. 정민이는 급하게 기사님에게 설명하고, 호텔에 전화를 걸었다. 차 안 공기가 갑자기 조금 뜨거워졌다.`,
          `다행히 별관은 멀지 않았다. 그래도 캐리어를 끌고 본관까지 갔다가 다시 돌아왔으면 꽤 고생했을 것이다. 정민이는 메일을 확대해서 다시 읽었다.`,
          `작은 부분 하나가 전체 동선을 바꿀 수 있다. 귀찮아도 끝까지 읽어야 하는 이유가 그날 택시 안에서 아주 선명해졌다.`,
        ], `I missed one small detail in the booking email.`)],
        [76, manualStory([
          `면접 접수대에서 담당자는 정민이에게 안내문 한 장을 건넸다. 종이는 얇았지만, 안에는 대기 순서와 입실 시간, 주의사항이 빽빽하게 적혀 있었다.`,
          `정민이는 처음엔 대충 가방에 넣으려 했다. 하지만 담당자가 여권과 함께 보관하라고 말했다. 중간에 다시 확인해야 할 수도 있다고 했다.`,
          `대기실에 앉아 보니 그 말이 맞았다. 몇 번 방으로 가야 하는지, 휴대폰은 언제 꺼야 하는지, 모든 답이 그 종이에 있었다. 정민이는 종이를 꺼내 여권 사이에 끼웠다.`,
          `중요한 종이는 작아도 길을 잃지 않게 해준다. 그녀는 모서리가 구겨지지 않게 손바닥으로 살짝 눌렀다.`,
        ], `Please keep this document with your passport.`)],
        [77, manualStory([
          `호텔 세탁실 이용 신청서는 생각보다 복잡했다. 이름, 방 번호, 맡기는 옷 종류, 받을 시간까지 적어야 했다. 정민이는 펜을 들고 첫 칸에서부터 잠깐 멈췄다.`,
          `방 번호는 알겠는데, 옷 종류를 영어식으로 어떻게 나눠야 하는지 헷갈렸다. 셔츠와 블라우스 사이에서 손이 멈췄고, 뒤에는 다른 손님이 기다리고 있었다.`,
          `프런트 직원은 친절하게 칸을 하나씩 설명해주었다. 정민이는 민망해서 웃었지만, 직원은 전혀 급하게 굴지 않았다. 종이 위 빈칸들이 천천히 채워졌다.`,
          `형식에 맞게 적는 일은 단순해 보여도 낯선 언어와 만나면 갑자기 어려워진다. 도움을 받고 나니 종이가 덜 무섭게 보였다.`,
        ], `Could you help me fill out this form?`)],
        [78, manualStory([
          `정민이는 비 오는 날 예약한 야외 투어를 취소할 수 있는지 확인하려고 안내문을 읽었다. 날짜 변경, 환불 가능 시간, 수수료 조건이 작은 글씨로 적혀 있었다.`,
          `투어 사진은 너무 예뻤지만, 하늘은 계속 어두워지고 있었다. 우산을 쓰고 강가를 걷는 상상은 낭만보다 고생에 가까웠다. 문제는 언제까지 취소해야 돈이 돌아오는지였다.`,
          `그녀는 고객센터에 전화를 걸었다. 상담원은 전날 오후까지는 전액 환불이 가능하지만 당일에는 어렵다고 설명했다. 정민이는 시간을 확인하고 바로 결정했다.`,
          `규칙은 가끔 차갑게 느껴지지만, 미리 알면 덜 다친다. 정민이는 아쉬움을 접고 대신 실내 디저트 코스를 찾기 시작했다.`,
        ], `What is the cancellation policy?`)],
        [79, manualStory([
          `카페 문 앞에 작은 종이가 붙어 있었다. 오늘은 재료 소진으로 일찍 닫는다는 글씨였다. 정민이는 문고리를 잡기 직전 그 종이를 보고 멈췄다.`,
          `안쪽 조명은 켜져 있었고, 직원은 정리 중이었다. 닫힌 가게 앞에 서면 이상하게 조금 차인 기분이 든다. 정민이는 유리창 안쪽의 빈 쇼케이스를 보고 한숨을 쉬었다.`,
          `하지만 종이 아래에는 내일 여는 시간이 함께 적혀 있었다. 정민이는 휴대폰 일정에 바로 저장했다. 오늘은 놓쳤지만, 내일 다시 올 수 있다는 정보가 작은 위로가 됐다.`,
          `문 앞의 한 장짜리 알림은 말없이 하루의 계획을 바꿨다. 정민이는 대신 근처 와플 가게를 찾아보기로 했다.`,
        ], `There is a notice on the door.`)],
        [80, manualStory([
          `친구가 추천한 푸딩 가게는 지도에서 쉽게 나오지 않았다. 이름이 비슷한 가게가 세 개나 있었고, 사진도 전부 작은 골목 안이었다. 정민이는 채팅창을 열었다.`,
          `친구는 잠시 뒤 지도 핀을 보내줬다. 역 뒤편, 꽃집 옆, 2층. 설명을 듣고 보니 방금 지나친 건물이었다. 정민이는 자기 방향 감각을 잠깐 의심했다.`,
          `계단을 올라가자 정말 작은 간판이 보였다. 분홍색 커튼과 나무문이 사진 속 그대로였다. 정확한 위치 하나가 흐릿하던 도시를 갑자기 선명하게 만들었다.`,
          `정민이는 가게 앞에서 친구에게 고맙다고 답장을 보냈다. 맛집보다 먼저 도착한 건, 길을 잃지 않게 해준 작은 점 하나였다.`,
        ], `Could you send me the exact location?`)],
        [81, manualStory([
          `택시를 타려던 정민이는 호텔 주소를 찾느라 예약 메일을 뒤졌다. 글자가 길고 숫자가 많아서 눈이 조금 피곤했다. 기사님은 백미러로 조용히 기다리고 있었다.`,
          `처음엔 호텔 이름만 말하면 될 줄 알았다. 그런데 같은 이름의 지점이 두 곳 있다고 했다. 정민이는 순간 등 뒤가 서늘해졌다. 잘못 가면 밤길에 캐리어를 끌고 다시 이동해야 했다.`,
          `프런트에 전화하자 직원이 정확한 주소를 문자로 보내주었다. 정민이는 화면을 기사님에게 보여줬다. 그제야 차가 부드럽게 출발했다.`,
          `장소를 설명하는 한 줄이 이렇게 중요할 줄 몰랐다. 낯선 밤에는 정확한 주소가 안전벨트처럼 느껴진다.`,
        ], `Can you send me the hotel's address?`)],
        [82, manualStory([
          `지도 앱은 오른쪽으로 가라고 했지만, 실제 골목은 세 갈래였다. 정민이는 횡단보도 앞에서 멈춰 섰다. 작은 비가 내려 화면에 물방울이 맺혔다.`,
          `왼쪽 길에는 편의점이 있었고, 가운데 길에는 어두운 계단이 있었다. 오른쪽 길은 좁았지만 사람들은 그쪽으로 많이 걸어갔다. 파란 점은 자꾸 빙글빙글 돌았다.`,
          `지나가던 직원에게 물어보자 그는 손으로 길을 가리켰다. 두 번째 신호등에서 오른쪽, 그리고 작은 다리를 건너라고 했다. 말이 방향을 얻자 몸도 바로 움직였다.`,
          `어디로 가야 하는지 모를 때 사람은 아주 작아진다. 하지만 방향 하나를 알게 되는 순간, 도시가 다시 길의 모양을 갖춘다.`,
        ], `Which direction should I walk from here?`)],
        [83, manualStory([
          `공항 라운지를 찾던 정민이는 유리문 앞에서 멈췄다. 문에는 작은 금색 표지가 붙어 있었지만, 안쪽은 너무 조용해서 들어가도 되는 곳인지 헷갈렸다.`,
          `옆에는 직원용 문처럼 보이는 회색 문도 있었다. 정민이는 괜히 잘못 들어갔다가 모두가 돌아볼 장면을 상상했다. 손잡이를 잡았다가 다시 놓았다.`,
          `지나가던 직원에게 물어보니 금색 표지 쪽이 맞다고 했다. 직원은 미소를 지으며 탑승권을 준비해달라고 했다. 정민이는 안도의 숨을 내쉬었다.`,
          `들어가는 문을 찾는 일은 별것 아닌데, 틀리면 시작부터 당황스럽다. 정확한 입구를 알자 라운지 안 조용한 불빛이 조금 더 반갑게 보였다.`,
        ], `Is this the entrance to the lounge?`)],
        [84, manualStory([
          `호텔 프런트 뒤 보관 선반에는 여러 상자가 놓여 있었다. 정민이는 온라인으로 주문한 쿠키 세트가 도착했는지 물어보러 내려왔다. 선물용이라 상자가 찌그러지면 안 됐다.`,
          `직원은 이름을 확인하고 선반을 하나씩 살폈다. 비슷한 갈색 상자가 많아서 정민이는 괜히 긴장했다. 혹시 다른 지점으로 갔으면 어쩌나 싶었다.`,
          `마침내 리본이 묶인 작은 상자가 나왔다. 송장에는 정민이 이름과 방 번호가 적혀 있었다. 그녀는 상자를 받자마자 모서리부터 확인했다. 멀리서 온 쿠키는 무사했다.`,
          `자기 앞으로 도착한 물건을 받는 순간은 늘 조금 설렌다. 누군가 보낸 작은 상자가 여행지의 하루 안으로 들어왔다.`,
        ], `Did my package arrive at the front desk?`)],
        [85, manualStory([
          `비 오는 밤, 정민이는 호텔 밖으로 나가기 싫었다. 하지만 휴대폰 속 닭꼬치 사진은 너무 위험하게 맛있어 보였다. 침대 위에 앉아 배달 앱을 열자 가게들이 지도 위에 떠올랐다.`,
          `주소를 넣는 순간 몇몇 가게는 사라지고, 몇몇 가게만 남았다. 호텔까지 올 수 있는 곳과 올 수 없는 곳이 조용히 갈렸다. 정민이는 그 차이가 오늘 밤의 행복을 결정한다는 걸 느꼈다.`,
          `프런트에 문의하니 배달 음식은 로비에서 받을 수 있다고 했다. 정민이는 슬리퍼를 신고 내려갈 준비를 했다. 밖에 나가지 않아도 따뜻한 음식이 올 수 있다는 사실만으로 이미 기분이 좋아졌다.`,
          `잠시 뒤 로비에서 종이봉투를 받았다. 비 냄새가 묻은 봉투 안에서 매콤한 냄새가 올라왔다. 방 안의 밤이 갑자기 훨씬 풍성해졌다.`,
        ], `Is delivery available to the hotel?`)],
        [86, manualStory([
          `기내 실습 중 갑자기 출발이 지연되는 상황이 주어졌다. 손님 역할을 맡은 사람들이 하나둘 배고픈 표정을 지었다. 정민이는 뒤쪽 준비 공간에서 간식 바구니를 확인했다.`,
          `바구니에는 작은 크래커와 사탕, 물티슈가 들어 있었다. 많지는 않았지만, 기다리는 사람들에게 잠깐의 위로가 될 수 있었다. 정민이는 개수를 세고, 아이가 있는 줄부터 챙기기로 했다.`,
          `한 아이가 사탕을 받고 울음을 그쳤다. 정민이는 그 작은 변화에 마음이 놓였다. 지연 자체를 없앨 수는 없지만, 기다림을 조금 덜 힘들게 만들 수는 있었다.`,
          `준비해둔 작은 물건들은 위기 때 갑자기 빛난다. 평소에는 바구니 한쪽에 조용히 있다가, 필요한 순간 사람들의 표정을 바꾼다.`,
        ], `The crew kept a small supply of snacks in the galley.`)],
        [87, manualStory([
          `호텔 조식당 커피 머신 앞에 줄이 생겼다. 버튼을 눌러도 커피가 나오지 않았고, 화면에는 작은 경고 표시가 떠 있었다. 정민이는 빈 컵을 들고 멀뚱히 서 있었다.`,
          `직원 한 명이 다가와 물통을 확인하고 원두 통을 열었다. 기계 안쪽에서는 낮은 소리만 났다. 평소에는 아무도 신경 쓰지 않던 장치가 멈추자 아침 전체가 잠깐 멈춘 것 같았다.`,
          `기다리던 사람들은 서로 눈치를 보며 웃었다. 누군가는 오늘은 차를 마셔야겠다고 했고, 정민이는 커피를 향한 자기 마음이 이렇게 진지했나 싶어 웃음이 났다.`,
          `잠시 뒤 직원은 점검이 필요하다고 말했다. 도구 하나가 제대로 작동해야 사람들이 자연스럽게 하루를 시작할 수 있다는 걸 모두가 그 앞에서 배웠다.`,
        ], `The coffee equipment needs to be checked.`)],
        [88, manualStory([
          `장기 레이오버 숙소 안내판에는 여러 아이콘이 있었다. 세탁실, 헬스장, 라운지, 작은 수영장. 정민이는 세탁실 그림 앞에서 눈이 멈췄다.`,
          `캐리어 안에는 입을 옷이 애매하게 남아 있었다. 특히 교육 때 입은 셔츠는 다시 입기 민망할 정도로 구겨져 있었다. 밖에 빨래방을 찾으러 나가기는 너무 피곤했다.`,
          `프런트 직원은 지하 1층에 세탁실이 있다고 알려줬다. 세제는 자판기에서 살 수 있고, 건조기도 있다고 했다. 정민이는 그 말을 듣고 거의 구원받은 표정을 지었다.`,
          `여행지에서 필요한 공간이 건물 안에 있다는 사실은 큰 안도감을 준다. 몸의 불편함 하나가 조용히 해결될 길이 생겼다.`,
        ], `Does this facility have a laundry room?`)],
        [89, manualStory([

        [93, manualStory([

      function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

      function storyNumber(number) {
        return String(number).padStart(3, "0");

      function polishSceneSeed(seed) {
        return seed

          .replace(/부드러워진다$/, "부드러워졌다")
          .replace(/본다$/, "보았다")
          .replace(/고민한다$/, "고민했다")
          .replace(/고른다$/, "골랐다")
          .replace(/든다$/, "들었다")
          .replace(/주문한다$/, "주문했다")
          .replace(/받는다$/, "받았다")
          .replace(/둔다$/, "두었다")
          .replace(/확인한다$/, "확인했다")
          .replace(/본다$/, "보았다")
          .replace(/읽는다$/, "읽었다")
          .replace(/발견한다$/, "발견했다")
          .replace(/걷는다$/, "걸었다")
          .replace(/바라본다$/, "바라보았다")
          .replace(/나눈다$/, "나누었다")
          .replace(/멈춘다$/, "멈췄다")
          .replace(/붙인다$/, "붙였다")
          .replace(/쥔다$/, "쥐었다")
          .replace(/꺼낸다$/, "꺼냈다")

          .replace(/느낀다$/, "느꼈다");

      function buildScene(entry, index) {
        const frame = storyFrames[index % storyFrames.length];
        return `${frame.place}\n\n${polishSceneSeed(entry.sceneSeed)}. ${frame.detail}\n\n${frame.dialogue}\n\n${frame.ending}\n\n나중에 이 장면을 떠올리면, 정민이에게 남는 건 설명이 아니라 감각이었다. ${entry.feel}. 손에 잡힌 물건, 사람의 말투, 잠깐의 망설임, 그리고 그 뒤에 따라온 작은 표정까지 같이 붙어 있었다.`;
      }

      function makeQuiz(sentence, answer) {
        return sentence.replace(new RegExp(escapeRegExp(answer), "i"), "_____");
      }

      function parseSeed(line) {
        const [word, korean, title, sentence, feel, phraseText, sceneSeed] = line.split("|");
        return {
          word,
          korean,
          title,
          sentence,
          feel,
          sceneSeed,
          phrases: phraseText.split(";"),
        };
      }

      const generatedEpisodes = toeicLevelOneSeedText.split("\n").map((line) => parseSeed(line));
      const levelOneRawEpisodes = generatedEpisodes;
      const answerPool = levelOneRawEpisodes.map((episode) => episode.answer || episode.word);

      function buildOptions(answer, index) {
        const decoys = answerPool.filter((item) => item !== answer);
        return [
          answer,
          decoys[(index + 11) % decoys.length],
          decoys[(index + 37) % decoys.length],
          decoys[(index + 61) % decoys.length],
        ];
      }

      const levelOneEpisodes = levelOneRawEpisodes.map((episode, index) => {
        const answer = episode.answer || episode.word;
        const manualScene = storyRevisions.get(index) || manualScenes[index];
        const finalLine = manualScene?.sentence || episode.sentence;
        return {
          ...episode,
          day: `WORD ${storyNumber(index + 1)}`,
          route: episode.route || storyRoutes[index % storyRoutes.length],
          scene: manualScene?.scene || episode.scene || buildScene(episode, index),
          sentence: finalLine,
          toeicSentence: episode.sentence,
          quiz: episode.quiz || makeQuiz(finalLine, answer),
          options: episode.options || buildOptions(answer, index),
          answer,
          feeling:

        },
        {
          id: "level-3",
          label: "Level 3",
          title: "문서와 일정 관리",
          status: "locked",
          count: 100,
        },
        {
          id: "level-4",
          label: "Level 4",
          title: "면접과 긴 독해",
          status: "locked",
          count: 100,
        },
      ];

      const activeLevel = levels[0];
      const episodes = activeLevel.episodes;
      const legacyIndexStorageKey = "ddungee-toeic-level-1-index";
      const progressStorageKey = "ddungee-toeic-level-1-progress";
      const autoSpeakStorageKey = "ddungee-toeic-auto-speak";

      function clampIndex(index) {
        const numericIndex = Number(index);
        if (!Number.isFinite(numericIndex)) {
          return 0;
        }

        return Math.max(0, Math.min(Math.trunc(numericIndex), episodes.length - 1));
      }

      function normalizeIndexes(values) {
        if (!Array.isArray(values)) {
          return [];
        }

        return [...new Set(values
          .map(Number)
          .filter(Number.isFinite)
          .map((index) => Math.trunc(index)))]
          .filter((index) => index >= 0 && index < episodes.length)
          .sort((first, second) => first - second);
      }

      function readSavedProgress() {
        const fallbackIndex = clampIndex(localStorage.getItem(legacyIndexStorageKey) || 0);

        try {
          const savedProgress = JSON.parse(localStorage.getItem(progressStorageKey) || "{}");

          return {
            currentIndex:
              savedProgress && Number.isFinite(Number(savedProgress.currentIndex))
                ? clampIndex(savedProgress.currentIndex)
                : fallbackIndex,
            viewedIndexes: normalizeIndexes(savedProgress.viewedIndexes),
            revealedIndexes: normalizeIndexes(savedProgress.revealedIndexes),
          };
        } catch {
          return {
            currentIndex: fallbackIndex,
            viewedIndexes: [],
            revealedIndexes: [],
          };
        }
      }

      const savedProgress = readSavedProgress();

      const state = {
        index: savedProgress.currentIndex,
        autoSpeak: localStorage.getItem(autoSpeakStorageKey) === "true",
        autoSpokenIndex: null,
        viewedIndexes: savedProgress.viewedIndexes,
        revealedIndexes: savedProgress.revealedIndexes,
      };

      const levelShelf = document.querySelector("#levelShelf");
      const menuButton = document.querySelector("#menuButton");
      const sideDrawer = document.querySelector("#sideDrawer");
      const drawerBackdrop = document.querySelector("#drawerBackdrop");
      const drawerCloseButton = document.querySelector("#drawerCloseButton");
      const topProgress = document.querySelector("#topProgress");
      const progressFill = document.querySelector("#progressFill");
      const resumeText = document.querySelector("#resumeText");
      const completedText = document.querySelector("#completedText");
      const dayLabel = document.querySelector("#dayLabel");
      const routeFrom = document.querySelector("#routeFrom");
      const routeTo = document.querySelector("#routeTo");
      const episodeTitle = document.querySelector("#episodeTitle");
      const sceneText = document.querySelector("#sceneText");
      const sentencePanel = document.querySelector("#sentencePanel");
      const sentenceText = document.querySelector("#sentenceText");
      const speakButton = document.querySelector("#speakButton");
      const speakLabel = document.querySelector("#speakLabel");
      const autoSpeakToggle = document.querySelector("#autoSpeakToggle");
      const revealPanel = document.querySelector("#revealPanel");
      const wordText = document.querySelector("#wordText");
      const koreanText = document.querySelector("#koreanText");
      const feelingText = document.querySelector("#feelingText");
      const phraseList = document.querySelector("#phraseList");
      const prevButton = document.querySelector("#prevButton");
      const nextButton = document.querySelector("#nextButton");
      const wordCount = document.querySelector("#wordCount");
      const speechApi = "speechSynthesis" in window ? window.speechSynthesis : null;
      let speechVoices = [];
      let isSpeaking = false;

      function refreshVoices() {
        speechVoices = speechApi ? speechApi.getVoices() : [];
      }

      function pickEnglishVoice() {
        refreshVoices();
        const englishVoices = speechVoices.filter((voice) => /^en([-_]|$)/i.test(voice.lang));
        const preferredVoice = englishVoices.find((voice) =>
          /samantha|ava|jenny|aria|natural|google us english|microsoft/i.test(voice.name),
        );

        return preferredVoice || englishVoices.find((voice) => /en-US/i.test(voice.lang)) || englishVoices[0] || null;
      }

      function stopSpeech(shouldRender = true) {
        if (speechApi) {
          speechApi.cancel();
        }

        isSpeaking = false;
        if (shouldRender) {
          render();
        }
      }

      function speakFinalLine({ fromAuto = false } = {}) {
        if (!speechApi) {
          return;
        }

        if (isSpeaking) {
          if (fromAuto) {
            return;
          }
          stopSpeech();
          return;
        }

        speechApi.cancel();

        const utterance = new SpeechSynthesisUtterance(episodes[state.index].sentence);
        const voice = pickEnglishVoice();
        utterance.lang = voice?.lang || "en-US";
        utterance.rate = 0.86;
        utterance.pitch = 1.02;
        if (voice) {
          utterance.voice = voice;
        }

        utterance.onend = () => {
          isSpeaking = false;
          render();
        };
        utterance.onerror = () => {
          isSpeaking = false;
          render();
        };

        isSpeaking = true;
        render();
        speechApi.speak(utterance);
      }

      function maybeAutoSpeak() {
        if (!speechApi || !state.autoSpeak || isSpeaking || state.autoSpokenIndex === state.index) {
          return;
        }

        state.autoSpokenIndex = state.index;
        speakFinalLine({ fromAuto: true });
      }

      if (speechApi) {
        refreshVoices();
        speechApi.onvoiceschanged = refreshVoices;
      }

      function moveToStoryTop() {
        requestAnimationFrame(() => {
          document.querySelector("#storyCard").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        });
      }

      function openDrawer() {
        drawerBackdrop.hidden = false;
        sideDrawer.inert = false;
        requestAnimationFrame(() => {
          drawerBackdrop.classList.add("open");
          sideDrawer.classList.add("open");
        });
        sideDrawer.setAttribute("aria-hidden", "false");
        menuButton.setAttribute("aria-expanded", "true");
        drawerCloseButton.focus();
      }

      function closeDrawer() {
        drawerBackdrop.classList.remove("open");
        sideDrawer.classList.remove("open");
        sideDrawer.setAttribute("aria-hidden", "true");
        menuButton.setAttribute("aria-expanded", "false");

        window.setTimeout(() => {
          if (!sideDrawer.classList.contains("open")) {
            drawerBackdrop.hidden = true;
            sideDrawer.inert = true;
          }
        }, 220);
      }

      function saveProgress() {
        const payload = {
          currentIndex: state.index,
          viewedIndexes: normalizeIndexes(state.viewedIndexes),
          revealedIndexes: normalizeIndexes(state.revealedIndexes),
          lastVisitedAt: new Date().toISOString(),
        };

        state.viewedIndexes = payload.viewedIndexes;
        state.revealedIndexes = payload.revealedIndexes;
        localStorage.setItem(progressStorageKey, JSON.stringify(payload));
        localStorage.setItem(legacyIndexStorageKey, String(state.index));
      }

      function markViewed(index) {
        if (!state.viewedIndexes.includes(index)) {
          state.viewedIndexes.push(index);
        }

        saveProgress();
      }

      function markRevealed(index) {
        if (!state.revealedIndexes.includes(index)) {
          state.revealedIndexes.push(index);
        }

        saveProgress();
      }

      function getCompletedCount() {
        return normalizeIndexes(state.viewedIndexes).length;
      }

      function selectEpisode(index) {
        stopSpeech(false);
        state.index = clampIndex(index);
        state.autoSpokenIndex = null;
        markViewed(state.index);
        render();
        moveToStoryTop();
      }

      function renderLevels() {
        const completedCount = getCompletedCount();

        levelShelf.innerHTML = "";
        levels.forEach((level) => {
          const button = document.createElement("button");
          const isActive = level.id === activeLevel.id;
          const isLocked = level.status === "locked";
          button.type = "button";
          button.disabled = isLocked;
          button.className = `level-card${isActive ? " active" : ""}${isLocked ? " locked" : ""}`;
          button.innerHTML = `
            <span class="level-label">${level.label}</span>
            <span class="level-title">${level.title}</span>
            <span class="level-status">${isLocked ? `잠김 · ${level.count} words` : `읽음 ${completedCount} / ${level.episodes.length}`}</span>
          `;
          if (!isLocked) {
            button.addEventListener("click", closeDrawer);
          }
          levelShelf.appendChild(button);
        });
      }

      function render() {
        const episode = episodes[state.index];
        const current = state.index + 1;
        const completedCount = getCompletedCount();
        const progress = (completedCount / episodes.length) * 100;

        topProgress.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;
        progressFill.style.setProperty("--progress", `${progress}%`);
        resumeText.textContent = "진행률";
        completedText.textContent = `읽음 ${completedCount} / ${episodes.length}`;
        dayLabel.textContent = activeLevel.label;
        routeFrom.textContent = episode.route[0];
        routeTo.textContent = episode.route[1];
        episodeTitle.textContent = episode.title;
        sceneText.textContent = episode.scene;
        sentenceText.textContent = episode.sentence;
        sentenceText.className = "sentence-text";
        speakButton.hidden = !speechApi;
        speakButton.disabled = !speechApi;
        speakButton.setAttribute("aria-pressed", isSpeaking ? "true" : "false");
        speakLabel.textContent = isSpeaking ? "정지" : "듣기";
        autoSpeakToggle.checked = state.autoSpeak;
        autoSpeakToggle.disabled = !speechApi;
        revealPanel.hidden = false;
        wordText.textContent = episode.word;
        koreanText.textContent = episode.korean;
        feelingText.textContent = episode.feeling;
        wordCount.textContent = `${storyNumber(current)} / ${storyNumber(episodes.length)}`;

        phraseList.innerHTML = "";
        episode.phrases.forEach((phrase) => {
          const item = document.createElement("li");
          item.textContent = phrase;
          phraseList.appendChild(item);
        });

        renderLevels();
      }

      speakButton.addEventListener("click", speakFinalLine);

      autoSpeakToggle.addEventListener("change", () => {
        state.autoSpeak = autoSpeakToggle.checked;
        localStorage.setItem(autoSpeakStorageKey, String(state.autoSpeak));
        render();
        if (state.autoSpeak) {
          maybeAutoSpeak();
        }
      });

      if ("IntersectionObserver" in window) {
        const sentenceObserver = new IntersectionObserver(
          (entries) => {
            if (entries.some((entry) => entry.isIntersecting && entry.intersectionRatio >= 0.55)) {
              maybeAutoSpeak();
            }
          },
          { threshold: [0.55] },
        );
        sentenceObserver.observe(sentencePanel);
      }

      prevButton.addEventListener("click", () => {
        selectEpisode((state.index - 1 + episodes.length) % episodes.length);
      });

      nextButton.addEventListener("click", () => {
        selectEpisode((state.index + 1) % episodes.length);
      });

      menuButton.addEventListener("click", openDrawer);
      drawerCloseButton.addEventListener("click", closeDrawer);
      drawerBackdrop.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && sideDrawer.classList.contains("open")) {
          closeDrawer();
          menuButton.focus();
        }
      });

      markViewed(state.index);
      render();
    </script>
  </body>
</html>
